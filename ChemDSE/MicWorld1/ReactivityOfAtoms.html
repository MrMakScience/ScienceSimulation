<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionization Energy Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .radius-transition { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .analogy-label { filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icons = {
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            Layers: ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a2 2 0 0 0 0 3.46l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a2 2 0 0 0 0-3.46z"/><path d="m2.1 14.27 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/><path d="m2.1 10.27 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/></svg>,
            Target: ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            ArrowRightLeft: ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>,
            Zap: ({size=14}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.71 13 3l-2.09 7.84H20l-9 11.71L13.09 14.71z"/></svg>,
            BookOpen: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Settings2: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        };

        const { useState, useEffect } = React;

        const PaperClip = ({ x, y, rotation, size = 16, color = "#3b82f6" }) => (
            <g transform={`translate(${x-size/2}, ${y-size/2}) rotate(${rotation}, ${size/2}, ${size/2})`}>
                <path 
                    d="M13.85 5.5l-7.07 7.07a2.5 2.5 0 0 0 3.54 3.54l7.07-7.07a4.5 4.5 0 0 0-6.36-6.36l-7.07 7.07a6.5 6.5 0 0 0 9.19 9.19l7.07-7.07" 
                    fill="none" 
                    stroke={color} 
                    strokeWidth="1.5" 
                    strokeLinecap="round" 
                    strokeLinejoin="round"
                    transform={`scale(${size/24})`}
                />
            </g>
        );

        const MagnetIcon = ({ x, y, size = 40, label = "" }) => (
            <g transform={`translate(${x}, ${y})`}>
                <text 
                    x="0" 
                    y="0" 
                    textAnchor="middle" 
                    dominantBaseline="middle" 
                    fontSize={size}
                >
                    🧲
                </text>
                {label && (
                    <text x="0" y={size/2 + 10} textAnchor="middle" fontSize="9" fontWeight="900" fill="#ef4444" className="analogy-label">
                        {label}
                    </text>
                )}
            </g>
        );

        const IonizationEnergyLab = () => {
            const elements = [
                { z: 1, symbol: 'H', name: 'Hydrogen', period: 1, ie: 1312, shells: [1], radius: 37, relForce: 10.33 },
                { z: 2, symbol: 'He', name: 'Helium', period: 1, ie: 2372, shells: [2], radius: 31, relForce: 25.10 },
                { z: 3, symbol: 'Li', name: 'Lithium', period: 2, ie: 520, shells: [2, 1], radius: 152, relForce: 1.15 },
                { z: 4, symbol: 'Be', name: 'Beryllium', period: 2, ie: 900, shells: [2, 2], radius: 112, relForce: 1.83 },
                { z: 5, symbol: 'B', name: 'Boron', period: 2, ie: 801, shells: [2, 3], radius: 88, relForce: 3.42 },
                { z: 6, symbol: 'C', name: 'Carbon', period: 2, ie: 1086, shells: [2, 4], radius: 77, relForce: 4.88 },
                { z: 7, symbol: 'N', name: 'Nitrogen', period: 2, ie: 1402, shells: [2, 5], radius: 70, relForce: 7.12 },
                { z: 8, symbol: 'O', name: 'Oxygen', period: 2, ie: 1314, shells: [2, 6], radius: 66, relForce: 8.54 },
                { z: 9, symbol: 'F', name: 'Fluorine', period: 2, ie: 1681, shells: [2, 7], radius: 64, relForce: 11.20 },
                { z: 10, symbol: 'Ne', name: 'Neon', period: 2, ie: 2081, shells: [2, 8], radius: 58, relForce: 14.22 },
                { z: 11, symbol: 'Na', name: 'Sodium', period: 3, ie: 496, shells: [2, 8, 1], radius: 186, relForce: 1.00 },
                { z: 12, symbol: 'Mg', name: 'Magnesium', period: 3, ie: 738, shells: [2, 8, 2], radius: 160, relForce: 1.55 },
                { z: 13, symbol: 'Al', name: 'Aluminum', period: 3, ie: 578, shells: [2, 8, 3], radius: 143, relForce: 1.98 },
                { z: 14, symbol: 'Si', name: 'Silicon', period: 3, ie: 786, shells: [2, 8, 4], radius: 118, relForce: 3.12 },
                { z: 15, symbol: 'P', name: 'Phosphorus', period: 3, ie: 1012, shells: [2, 8, 5], radius: 110, relForce: 4.25 },
                { z: 16, symbol: 'S', name: 'Sulfur', period: 3, ie: 1000, shells: [2, 8, 6], radius: 104, relForce: 5.34 },
                { z: 17, symbol: 'Cl', name: 'Chlorine', period: 3, ie: 1251, shells: [2, 8, 7], radius: 99, relForce: 6.95 },
                { z: 18, symbol: 'Ar', name: 'Argon', period: 3, ie: 1521, shells: [2, 8, 8], radius: 88, relForce: 9.10 }
            ];

            const [currentIndex, setCurrentIndex] = useState(0); 
            const [history, setHistory] = useState([elements[0]]);
            const [showForce, setShowForce] = useState(true);
            const [showRadius, setShowRadius] = useState(true);
            const [analogyMode, setAnalogyMode] = useState(false);
            const [comparisonType, setComparisonType] = useState(null); 
            
            const currentAtom = elements[currentIndex];
            const previousAtom = history.length > 1 ? history[history.length - 2] : null;

            useEffect(() => {
                if (history[history.length - 1]?.z !== currentAtom.z) {
                    setHistory(prev => [...prev, currentAtom]);
                }
                
                const prevZ = previousAtom?.z;
                const currZ = currentAtom.z;
                if ((prevZ === 3 && currZ === 11) || (prevZ === 11 && currZ === 3)) {
                    setComparisonType('group1');
                } else if ((prevZ === 9 && currZ === 17) || (prevZ === 17 && currZ === 9)) {
                    setComparisonType('group7');
                } else {
                    setComparisonType(null);
                }
            }, [currentIndex, currentAtom, history, previousAtom]);

            const selectElement = (z) => {
                const idx = elements.findIndex(e => e.z === z);
                if (idx !== -1) setCurrentIndex(idx);
            };

            const triggerComparison = (z1, z2, type) => {
                const atom1 = elements.find(e => e.z === z1);
                const atom2 = elements.find(e => e.z === z2);
                if (atom1 && atom2) {
                    setHistory([atom1, atom2]);
                    setCurrentIndex(elements.indexOf(atom2));
                    setComparisonType(type);
                }
            };

            const BohrModel = ({ atom, size = 380, isSmall = false, compareAgainstAtom = null }) => {
                if (!atom) return null;
                
                const baseNucleusSize = isSmall ? 18 : 22;
                
                // Adjusted magnet scale: Reduced overall size by 30% as requested
                // Original scale was (0.8 + (atom.z / 20)), now using approx 0.7x factor
                const magnetScale = analogyMode ? (0.55 + (atom.z / 30)) : 1;
                const nucleusRadius = baseNucleusSize * magnetScale;
                
                const nucleusFontSize = isSmall ? 14 : 16;
                const electronRadius = isSmall ? 5 : 6.5;
                const maxRadiusValue = 186; 
                const baseScaling = (atom.radius / maxRadiusValue);
                const radiusFactor = 0.55 + (baseScaling * 0.45); 
                
                const shellSpacing = isSmall ? 45 : 55;
                const outermostShellIdx = atom.shells.length - 1;
                const outermostShellRadius = (baseNucleusSize + 25 + (outermostShellIdx * shellSpacing)) * radiusFactor;
                
                const angle = -Math.PI / 2; 
                const ex = 200 + outermostShellRadius * Math.cos(angle);
                const ey = 200 + outermostShellRadius * Math.sin(angle);

                const baseLen = 10;
                const magnitudeScale = (5 * Math.log2(atom.relForce + 1) + (atom.relForce * 2.5)) / 2;
                const forceArrowLength = baseLen + magnitudeScale;

                let magnetLabel = "";
                if (analogyMode && compareAgainstAtom !== null) {
                    const samePeriod = atom.period === compareAgainstAtom.period;
                    if (samePeriod && atom.z > compareAgainstAtom.z) {
                        magnetLabel = "STRONGER MAGNET";
                    }
                }

                return (
                    <div className="flex flex-col items-center w-full relative">
                        <svg viewBox="0 0 400 400" className={`w-full h-auto drop-shadow-md max-w-[${size}px]`}>
                            <defs>
                                <marker id="small-arrow-red" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto">
                                    <path d="M0,0 L4,2 L0,4 Z" fill="#ef4444" />
                                </marker>
                                <marker id="force-arrow-green" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto">
                                    <path d="M0,0 L4,2 L0,4 Z" fill="#22c55e" />
                                </marker>
                            </defs>

                            {analogyMode ? (
                                <MagnetIcon x={200} y={200} size={nucleusRadius * 2.2} label={magnetLabel} />
                            ) : (
                                <g>
                                    <circle cx="200" cy="200" r={nucleusRadius} fill="#ef4444" />
                                    <text x="200" y={200 + (nucleusFontSize / 3)} textAnchor="middle" fill="white" fontSize={nucleusFontSize} fontWeight="900">+{atom.z}</text>
                                </g>
                            )}
                            
                            {atom.shells.map((count, sIdx) => {
                                const shellRadius = (baseNucleusSize + 25 + (sIdx * shellSpacing)) * radiusFactor;
                                const isOutermost = sIdx === atom.shells.length - 1;
                                return (
                                    <g key={sIdx}>
                                        <circle cx="200" cy="200" r={shellRadius} fill="none" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="4 4" />
                                        {Array.from({ length: count }).map((_, eIdx) => {
                                            const eAngle = (eIdx / count) * 2 * Math.PI - Math.PI / 2;
                                            const e_x = 200 + shellRadius * Math.cos(eAngle);
                                            const e_y = 200 + shellRadius * Math.sin(eAngle);
                                            
                                            if (analogyMode) {
                                                const rot = (eAngle * 180) / Math.PI + 90;
                                                return <PaperClip key={eIdx} x={e_x} y={e_y} rotation={rot} size={isOutermost ? 22 : 16} color={isOutermost ? "#3b82f6" : "#94a3b8"} />;
                                            }
                                            return <circle key={eIdx} cx={e_x} cy={e_y} r={isOutermost ? electronRadius : electronRadius * 0.75} fill={isOutermost ? "#3b82f6" : "#94a3b8"} />;
                                        })}
                                    </g>
                                );
                            })}

                            {showForce && (
                                <g>
                                    <line 
                                        x1={ex} 
                                        y1={ey + (electronRadius - 1)} 
                                        x2={ex} 
                                        y2={ey + (electronRadius - 1) + forceArrowLength} 
                                        stroke="#22c55e" 
                                        strokeWidth="2.5"
                                        markerEnd="url(#force-arrow-green)"
                                    />
                                    <text x={ex + 6} y={ey + electronRadius + (forceArrowLength/2)} textAnchor="start" fontSize="11" fontWeight="900" fill="#166534">
                                        F = {atom.relForce.toFixed(2)}
                                    </text>
                                </g>
                            )}

                            {showRadius && (
                                <g className="radius-transition opacity-100">
                                    <line 
                                        x1="200" y1="360" 
                                        x2={200 + outermostShellRadius} y2="360" 
                                        stroke="#ef4444" 
                                        strokeWidth="2" 
                                        markerEnd="url(#small-arrow-red)"
                                    />
                                    <circle cx="200" cy="360" r="2.5" fill="#ef4444" />
                                    <text x="200" y={385} textAnchor="middle" fontSize="12" fontWeight="800" fill="#ef4444">
                                        r: {atom.radius} pm
                                    </text>
                                </g>
                            )}
                        </svg>
                        <div className="mt-1 text-center">
                            <div className="text-lg font-black text-slate-800 leading-none">{atom.symbol}</div>
                            <div className="flex gap-2 mt-2 justify-center">
                                <div className="px-2 py-0.5 bg-blue-50 rounded-md text-[10px] font-bold text-blue-600 border border-blue-100 tracking-tighter">r: {atom.radius} pm</div>
                                <div className="px-2 py-0.5 bg-green-50 rounded-md text-[10px] font-bold text-green-600 border border-green-100 tracking-tighter">Force: {atom.relForce.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>
                );
            };

            const ComparisonExplanation = () => {
                if (!comparisonType) return null;

                if (comparisonType === 'group1') {
                    return (
                        <div className="mt-6 bg-blue-50 border border-blue-100 rounded-xl p-6 text-left animate-in fade-in slide-in-from-bottom-4">
                            <h3 className="text-blue-800 font-bold flex items-center gap-2 mb-3">
                                <Icons.BookOpen size={18} /> Group I Comparison Explanation
                            </h3>
                            <ul className="space-y-2 text-sm text-blue-900 font-medium list-disc ml-5">
                                <li>Na has a lower position than Li in Group I</li>
                                <li>When going down the group, number of occupied electron shells increases</li>
                                <li>Distance between the outermost shell electron and the nucleus increases</li>
                                <li>Attraction between the outermost shell electron and the nucleus weakens</li>
                                <li>The tendency of Na losing the outermost shell electron to get a stable electronic arrangement increases.</li>
                            </ul>
                            <div className="mt-4 p-3 bg-blue-100 rounded-lg text-xs font-bold text-blue-800 italic">
                                Note: metal reacts by losing electrons.
                            </div>
                        </div>
                    );
                }

                if (comparisonType === 'group7') {
                    return (
                        <div className="mt-6 bg-purple-50 border border-purple-100 rounded-xl p-6 text-left animate-in fade-in slide-in-from-bottom-4">
                            <h3 className="text-purple-800 font-bold flex items-center gap-2 mb-3">
                                <Icons.BookOpen size={18} /> Group VII Comparison Explanation
                            </h3>
                            <ul className="space-y-2 text-sm text-purple-900 font-medium list-disc ml-5">
                                <li>Cl has a lower position than F in Group VII</li>
                                <li>When going down the group, number of occupied electron shells increases</li>
                                <li>Distance between the outermost shell electron and the nucleus increases</li>
                                <li>Attraction between the outermost shell electron and the nucleus weakens</li>
                                <li>The tendency of Cl gaining the outermost shell electron to get a stable electronic arrangement decreases.</li>
                            </ul>
                            <div className="mt-4 p-3 bg-purple-100 rounded-lg text-xs font-bold text-purple-800 italic">
                                Note: non-metal reacts by gaining electrons.
                            </div>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-800 text-center">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 text-left">
                            <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-2 tracking-tight">Ionization Energy Lab</h1>
                            <p className="text-slate-600 mt-1 text-sm font-medium">Relative Outermost Shell Electron Attraction (Sodium = 1.00)</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-left">
                                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-700"><Icons.Target size={20} /> Selection</h2>
                                    
                                    <div className="flex items-center justify-between gap-2 mb-6">
                                        <button onClick={() => selectElement(elements[Math.max(0, currentIndex - 1)].z)} disabled={currentIndex === 0} className="p-2 rounded-full bg-slate-100 hover:bg-slate-200 disabled:opacity-30 transition-colors"><Icons.ChevronLeft /></button>
                                        <div className="text-center">
                                            <div className="text-4xl font-black text-blue-600 tracking-tighter leading-none">{currentAtom.symbol}</div>
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{currentAtom.name}</div>
                                        </div>
                                        <button onClick={() => selectElement(elements[Math.min(elements.length-1, currentIndex + 1)].z)} disabled={currentIndex === elements.length - 1} className="p-2 rounded-full bg-slate-100 hover:bg-slate-200 disabled:opacity-30 transition-colors"><Icons.ChevronRight /></button>
                                    </div>

                                    <div className="mb-6">
                                        <label className="text-xs font-bold uppercase text-slate-400 block mb-2">Group Comparisons</label>
                                        <div className="grid grid-cols-1 gap-2">
                                            <button 
                                                onClick={() => triggerComparison(3, 11, 'group1')}
                                                className={`flex items-center justify-between px-3 py-2 border rounded-lg transition-all group ${comparisonType === 'group1' ? 'bg-blue-600 border-blue-600 text-white' : 'bg-slate-50 border-slate-200 hover:bg-blue-50 hover:border-blue-300'}`}
                                            >
                                                <span className={`text-sm font-semibold ${comparisonType === 'group1' ? 'text-white' : 'text-slate-600 group-hover:text-blue-700'}`}>Li vs Na</span>
                                                <Icons.Zap className={comparisonType === 'group1' ? 'text-blue-200' : 'text-slate-300 group-hover:text-blue-400'} />
                                            </button>
                                            <button 
                                                onClick={() => triggerComparison(9, 17, 'group7')}
                                                className={`flex items-center justify-between px-3 py-2 border rounded-lg transition-all group ${comparisonType === 'group7' ? 'bg-purple-600 border-purple-600 text-white' : 'bg-slate-50 border-slate-200 hover:bg-purple-50 hover:border-purple-300'}`}
                                            >
                                                <span className={`text-sm font-semibold ${comparisonType === 'group7' ? 'text-white' : 'text-slate-600 group-hover:text-purple-700'}`}>F vs Cl</span>
                                                <Icons.Zap className={comparisonType === 'group7' ? 'text-purple-200' : 'text-slate-300 group-hover:text-purple-400'} />
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="text-xs font-bold uppercase text-slate-400 block mb-1">Jump to Period</label>
                                        <div className="flex gap-2">
                                            {[1, 2, 3].map(p => (
                                                <button key={p} onClick={() => selectElement(elements.find(e => e.period === p).z)} className={`flex-1 py-1 rounded text-sm font-medium border transition-all ${currentAtom.period === p ? 'bg-blue-600 border-blue-600 text-white shadow-sm' : 'bg-white border-slate-200 hover:border-blue-400'}`}>{p}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-slate-100 space-y-3">
                                        <label className="text-xs font-bold uppercase text-slate-400 block mb-1 flex items-center gap-1"><Icons.Settings2 size={12}/> Display Options</label>
                                        <div className="flex flex-col gap-2">
                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded transition-colors group">
                                                <input type="checkbox" checked={analogyMode} onChange={() => setAnalogyMode(!analogyMode)} className="w-4 h-4 accent-blue-600 rounded" />
                                                <span className={`text-sm font-bold ${analogyMode ? 'text-blue-700' : 'text-slate-600'}`}>Analogy Mode (Magnet/Clip)</span>
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 rounded transition-colors">
                                                <input type="checkbox" checked={showForce} onChange={() => setShowForce(!showForce)} className="w-4 h-4 accent-green-600 rounded" />
                                                <span className="text-sm font-semibold text-slate-600">Show Force Arrow</span>
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 p-1 rounded transition-colors">
                                                <input type="checkbox" checked={showRadius} onChange={() => setShowRadius(!showRadius)} className="w-4 h-4 accent-red-600 rounded" />
                                                <span className="text-sm font-semibold text-slate-600">Show Radius Arrow</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-green-600 text-white p-5 rounded-2xl shadow-lg border border-green-700 text-left">
                                    <h3 className="text-base font-bold tracking-tight mb-2 opacity-90 text-green-50 leading-snug">Attraction between nucleus and outermost shell electrons (F)</h3>
                                    <div className="text-3xl font-black tracking-tighter">{currentAtom.relForce.toFixed(2)}</div>
                                    <p className="text-[10px] font-bold mt-1 opacity-90 leading-tight italic">How strongly the nucleus "pulls" the outermost shell electron compared to Sodium.</p>
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col text-left">
                                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-700"><Icons.Layers size={20} /> Comparative Visualization</h2>
                                    <div className="flex-grow flex flex-col gap-4 relative bg-slate-50 rounded-2xl border border-dashed border-slate-300 py-8 px-2 overflow-hidden min-h-[460px]">
                                        <div className="flex items-center justify-around w-full gap-4 relative z-10">
                                            {previousAtom && previousAtom.symbol !== currentAtom.symbol ? (
                                                <React.Fragment>
                                                    <div className="flex-1 flex flex-col items-center max-w-[45%]">
                                                        <div className="text-[10px] font-black text-slate-400 uppercase mb-2">Previous</div>
                                                        <BohrModel atom={previousAtom} size={280} isSmall={true} compareAgainstAtom={currentAtom} />
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-center text-slate-300">
                                                        <Icons.ArrowRightLeft size={28} />
                                                    </div>

                                                    <div className="flex-1 flex flex-col items-center max-w-[45%]">
                                                        <div className="text-[10px] font-black text-blue-500 uppercase mb-2">Current</div>
                                                        <BohrModel atom={currentAtom} size={280} isSmall={true} compareAgainstAtom={previousAtom} />
                                                    </div>
                                                </React.Fragment>
                                            ) : (
                                                <div className="flex flex-col items-center w-full max-w-lg mx-auto">
                                                    <BohrModel atom={currentAtom} size={360} />
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <ComparisonExplanation />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IonizationEnergyLab />);
    </script>
</body>
</html>
