<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Formula Cross Method Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .ion-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ion-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .selected-ion {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
        }

        .step-container {
            min-height: 400px;
        }

        .formula-subscript {
            vertical-align: sub;
            font-size: 0.6em;
            font-weight: bold;
            line-height: 0;
        }

        .formula-superscript {
            vertical-align: super;
            font-size: 0.6em;
            font-weight: bold;
            line-height: 0;
        }

        .moving-charge {
            position: absolute;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Bracket Fade-in Animation */
        .bracket-fade {
            opacity: 0;
            display: inline-block;
            transition: opacity 1s ease-in-out;
        }

        .bracket-visible {
            opacity: 1;
        }

        #visual-area {
            transition: gap 0.8s ease-in-out;
            max-width: 100%;
        }

        .merge-gap {
            gap: 0 !important;
        }

        .merged-style {
            padding-left: 0 !important;
            padding-right: 0 !important;
            border-color: transparent !important;
            background-color: transparent !important;
            background: none !important;
            min-width: 0 !important;
        }

        /* Strike-through animation */
        .strike-container {
            position: relative;
            display: inline-block;
        }

        .strike-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 0;
            height: 4px;
            background: #ef4444;
            transform: translateY(-50%) rotate(-15deg);
            transition: width 0.5s ease-out;
        }

        .strike-active .strike-line {
            width: 110%;
        }

        .simplify-fade {
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .simplify-visible {
            opacity: 1;
        }

        /* Fade out for subscript 1 */
        .subscript-fade-out {
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-hidden {
            opacity: 0 !important;
            transform: translateY(-5px);
        }

        @keyframes pulse-success {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .animate-success {
            animation: pulse-success 0.5s ease-in-out;
        }

        /* Mobile specific fixes */
        @media (max-width: 640px) {
            #visual-area {
                gap: 1rem;
                font-size: 2.25rem;
            }
            .ion-box-mobile {
                padding: 0.75rem !important;
                min-width: 80px !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- Language Toggle Button -->
    <div class="flex justify-end mb-2">
        <button id="lang-btn" class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span id="lang-text">繁體中文</span>
        </button>
    </div>

    <header class="text-center mb-8">
        <h1 id="main-title" class="text-3xl font-bold text-slate-800">Ionic Formula Builder</h1>
        <p id="main-subtitle" class="text-slate-600">Master the Cross Method step-by-step</p>
    </header>

    <!-- Selection View -->
    <div id="setup-view" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 id="title-cation" class="text-xl font-semibold mb-4 text-blue-700 border-b pb-2">Select a Cation</h2>
            <div id="cation-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[500px] overflow-y-auto pr-2"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 id="title-anion" class="text-xl font-semibold mb-4 text-red-700 border-b pb-2">Select an Anion</h2>
            <div id="anion-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[500px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="controls" class="mt-8 flex justify-center hidden">
        <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all transform hover:scale-105">
            Start Simulation
        </button>
    </div>

    <!-- Simulation View -->
    <div id="simulation-view" class="mt-8 bg-white p-4 md:p-8 rounded-2xl shadow-xl border border-slate-200 hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 id="step-title" class="text-2xl font-bold text-slate-800">Step 1: Identify Charges</h2>
            <button id="reset-btn" class="text-slate-500 hover:text-red-600 text-sm font-medium">Cancel & Reset</button>
        </div>

        <div class="step-container flex flex-col items-center justify-center relative overflow-visible">
            <div id="visual-area" class="flex items-center gap-12 md:gap-48 text-5xl md:text-7xl font-bold mb-12 relative w-full justify-center">
                <div id="v-cation" class="ion-box-mobile relative p-6 rounded-2xl bg-blue-50 border-2 border-blue-200 text-blue-800 transition-all duration-500 min-w-[100px] md:min-w-[120px] text-center"></div>
                <div id="v-operator" class="text-slate-300 transition-opacity duration-500">+</div>
                <div id="v-anion" class="ion-box-mobile relative p-6 rounded-2xl bg-red-50 border-2 border-red-200 text-red-800 transition-all duration-500 min-w-[100px] md:min-w-[120px] text-center"></div>
            </div>

            <div id="step-description" class="text-center w-full max-w-2xl bg-slate-50 p-6 rounded-xl border border-slate-100 min-h-[100px]">
                <p class="text-lg text-slate-700"></p>
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button id="back-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-lg font-semibold transition-all hidden">
                Back
            </button>
            <button id="next-btn" class="bg-slate-800 hover:bg-slate-900 text-white px-10 py-3 rounded-lg font-semibold transition-all">
                Next Step
            </button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'en';

    const translations = {
        en: {
            mainTitle: "Ionic Formula Builder",
            mainSubtitle: "Master the Cross Method step-by-step",
            selectCation: "Select a Cation",
            selectAnion: "Select an Anion",
            startBtn: "Start Simulation",
            resetBtn: "Cancel & Reset",
            backBtn: "Back",
            nextBtn: "Next Step",
            crossBtn: "Cross Charges",
            simplifyBtn: "Simplify Ratio",
            finalizeBtn: "Finalize & Merge",
            newBtn: "Start with a new compound",
            step1Title: "Step 1: Identify the Ions",
            step2Title: "Step 2: The Cross Method",
            step3Title: "Step 3: Simplify the Ratio",
            step4Title: "Step 4: Final Formula",
            reminder: "💡 Reminder: Added brackets for polyatomic ions with subscripts > 1.",
            step1Desc: (c, a) => `We have <strong>${c}</strong> and <strong>${a}</strong>. Let's look at their charges.`,
            step2Desc: "Watch the charge values move! They cross over to become subscripts for the opposite ion.",
            step3DescSimple: (r1, r2) => `The ratio <strong>${r1}:${r2}</strong> is shown. We keep the "1" to show the final balance.`,
            step3DescReduced: (r1, r2, s1, s2) => `The ratio <strong>${r1}:${r2}</strong> simplifies to <strong>${s1}:${s2}</strong>.`,
            step4Desc: "Final step: merge the ions and remove any subscripts of \"1\".",
            success: "Success!",
            resultText: (formula) => `The chemical formula is <span class="text-2xl font-bold text-slate-800">${formula}</span>.`
        },
        zh: {
            mainTitle: "離子化合物化學式建構器",
            mainSubtitle: "逐步掌握「交叉相乘法」",
            selectCation: "選擇陽離子",
            selectAnion: "選擇陰離子",
            startBtn: "開始模擬",
            resetBtn: "取消並重置",
            backBtn: "返回",
            nextBtn: "下一步",
            crossBtn: "交叉相乘電荷",
            simplifyBtn: "簡化比例",
            finalizeBtn: "合併化學式",
            newBtn: "建構新的化學式",
            step1Title: "第一步：辨認離子",
            step2Title: "第二步：交叉相乘法",
            step3Title: "第三步：簡化比例",
            step4Title: "第四步：最終化學式",
            reminder: "💡 提示：為下標大於 1 的多原子離子加上括號。",
            step1Desc: (c, a) => `我們有 <strong>${c}</strong> 和 <strong>${a}</strong>。讓我們觀察它們的電荷。`,
            step2Desc: "觀察電荷數值的移動！它們會交叉相乘成為另一方離子的下標。",
            step3DescSimple: (r1, r2) => `比例為 <strong>${r1}:${r2}</strong>。我們保留「1」以顯示最終的平衡。`,
            step3DescReduced: (r1, r2, s1, s2) => `比例 <strong>${r1}:${r2}</strong> 可簡化為 <strong>${s1}:${s2}</strong>。`,
            step4Desc: "最後一步：合併離子符號並隱藏數值為「1」的下標。",
            success: "成功！",
            resultText: (formula) => `化學式為 <span class="text-2xl font-bold text-slate-800">${formula}</span>。`
        }
    };

    const cations = [
        { name: {en: "Lithium ion", zh: "鋰離子"}, symbol: "Li", charge: 1, poly: false },
        { name: {en: "Sodium ion", zh: "鈉離子"}, symbol: "Na", charge: 1, poly: false },
        { name: {en: "Potassium ion", zh: "鉀離子"}, symbol: "K", charge: 1, poly: false },
        { name: {en: "Copper(I) ion", zh: "銅(I)離子"}, symbol: "Cu", charge: 1, poly: false },
        { name: {en: "Silver ion", zh: "銀離子"}, symbol: "Ag", charge: 1, poly: false },
        { name: {en: "Mercury(I) ion", zh: "汞(I)離子"}, symbol: "Hg", charge: 1, poly: false },
        { name: {en: "Ammonium ion", zh: "銨離子"}, symbol: "NH4", charge: 1, poly: true },
        { name: {en: "Magnesium ion", zh: "鎂離子"}, symbol: "Mg", charge: 2, poly: false },
        { name: {en: "Calcium ion", zh: "鈣離子"}, symbol: "Ca", charge: 2, poly: false },
        { name: {en: "Barium ion", zh: "鋇離子"}, symbol: "Ba", charge: 2, poly: false },
        { name: {en: "Zinc ion", zh: "鋅離子"}, symbol: "Zn", charge: 2, poly: false },
        { name: {en: "Iron(II) ion", zh: "鐵(II)離子"}, symbol: "Fe", charge: 2, poly: false },
        { name: {en: "Copper(II) ion", zh: "銅(II)離子"}, symbol: "Cu", charge: 2, poly: false },
        { name: {en: "Cobalt(II) ion", zh: "鈷(II)離子"}, symbol: "Co", charge: 2, poly: false },
        { name: {en: "Nickel(II) ion", zh: "鎳(II)離子"}, symbol: "Ni", charge: 2, poly: false },
        { name: {en: "Manganese(II) ion", zh: "錳(II)離子"}, symbol: "Mn", charge: 2, poly: false },
        { name: {en: "Mercury(II) ion", zh: "汞(II)離子"}, symbol: "Hg", charge: 2, poly: false },
        { name: {en: "Lead(II) ion", zh: "鉛(II)離子"}, symbol: "Pb", charge: 2, poly: false },
        { name: {en: "Aluminum ion", zh: "鋁離子"}, symbol: "Al", charge: 3, poly: false },
        { name: {en: "Iron(III) ion", zh: "鐵(III)離子"}, symbol: "Fe", charge: 3, poly: false },
        { name: {en: "Chromium(III) ion", zh: "鉻(III)離子"}, symbol: "Cr", charge: 3, poly: false }
    ];

    const anions = [
        { name: {en: "Fluoride ion", zh: "氟離子"}, symbol: "F", charge: -1, poly: false },
        { name: {en: "Chloride ion", zh: "氯離子"}, symbol: "Cl", charge: -1, poly: false },
        { name: {en: "Bromide ion", zh: "溴離子"}, symbol: "Br", charge: -1, poly: false },
        { name: {en: "Iodide ion", zh: "碘離子"}, symbol: "I", charge: -1, poly: false },
        { name: {en: "Nitrite ion", zh: "亞硝酸根離子"}, symbol: "NO2", charge: -1, poly: true },
        { name: {en: "Nitrate ion", zh: "硝酸根離子"}, symbol: "NO3", charge: -1, poly: true },
        { name: {en: "Hydroxide ion", zh: "氫氧根離子"}, symbol: "OH", charge: -1, poly: true },
        { name: {en: "Hydrogencarbonate ion", zh: "碳酸氫根離子"}, symbol: "HCO3", charge: -1, poly: true },
        { name: {en: "Hydrogensulphate ion", zh: "硫酸氫根離子"}, symbol: "HSO4", charge: -1, poly: true },
        { name: {en: "Cyanide ion", zh: "氰根離子"}, symbol: "CN", charge: -1, poly: true },
        { name: {en: "Permanganate Ion", zh: "高錳酸根離子"}, symbol: "MnO4", charge: -1, poly: true },
        { name: {en: "Hypochlorite ion", zh: "次氯酸根離子"}, symbol: "ClO", charge: -1, poly: true },
        { name: {en: "Chlorate ion", zh: "氯酸根離子"}, symbol: "ClO3", charge: -1, poly: true },
        { name: {en: "Oxide ion", zh: "氧化物離子"}, symbol: "O", charge: -2, poly: false },
        { name: {en: "Sulphide ion", zh: "硫化物離子"}, symbol: "S", charge: -2, poly: false },
        { name: {en: "Sulphite ion", zh: "亞硫酸根離子"}, symbol: "SO3", charge: -2, poly: true },
        { name: {en: "Sulphate ion", zh: "硫酸根離子"}, symbol: "SO4", charge: -2, poly: true },
        { name: {en: "Thiosulphate ion", zh: "硫代硫酸根離子"}, symbol: "S2O3", charge: -2, poly: true },
        { name: {en: "Carbonate ion", zh: "碳酸根離子"}, symbol: "CO3", charge: -2, poly: true },
        { name: {en: "Silicate ion", zh: "矽酸根離子"}, symbol: "SiO3", charge: -2, poly: true },
        { name: {en: "Chromate ion", zh: "鉻酸根離子"}, symbol: "CrO4", charge: -2, poly: true },
        { name: {en: "Dichromate ion", zh: "重鉻酸根離子"}, symbol: "Cr2O7", charge: -2, poly: true },
        { name: {en: "Nitride ion", zh: "氮化物離子"}, symbol: "N", charge: -3, poly: false },
        { name: {en: "Phosphide ion", zh: "磷化物離子"}, symbol: "P", charge: -3, poly: false },
        { name: {en: "Phosphate ion", zh: "磷酸根離子"}, symbol: "PO4", charge: -3, poly: true }
    ];

    let selectedCation = null;
    let selectedAnion = null;
    let currentStep = 0;

    function gcd(a, b) { return b ? gcd(b, a % b) : a; }

    function formatSymbol(symbol) {
        return symbol.replace(/(\d+)/g, '<span class="formula-subscript">$1</span>');
    }

    function formatCharge(val) {
        const absVal = Math.abs(val);
        const sign = val > 0 ? '+' : '-';
        return `<span class="formula-superscript">${absVal === 1 ? '' : absVal}${sign}</span>`;
    }

    function updateLanguageUI() {
        const t = translations[currentLang];
        document.getElementById('lang-text').innerText = currentLang === 'en' ? "繁體中文" : "English";
        document.getElementById('main-title').innerText = t.mainTitle;
        document.getElementById('main-subtitle').innerText = t.mainSubtitle;
        document.getElementById('title-cation').innerText = t.selectCation;
        document.getElementById('title-anion').innerText = t.selectAnion;
        document.getElementById('start-btn').innerText = t.startBtn;
        document.getElementById('reset-btn').innerText = t.resetBtn;
        document.getElementById('back-btn').innerText = t.backBtn;
        
        renderLists();
        if (!document.getElementById('simulation-view').classList.contains('hidden')) {
            runStep();
        }
    }

    document.getElementById('lang-btn').onclick = () => {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        updateLanguageUI();
    };

    function renderLists() {
        const cList = document.getElementById('cation-list');
        const aList = document.getElementById('anion-list');
        cList.innerHTML = '';
        aList.innerHTML = '';
        [cations, anions].forEach((list, idx) => {
            const container = idx === 0 ? cList : aList;
            list.forEach(ion => {
                const isSelected = (idx === 0 && selectedCation === ion) || (idx === 1 && selectedAnion === ion);
                const div = document.createElement('div');
                div.className = `ion-card p-3 rounded-lg border bg-white text-sm text-center ${isSelected ? 'selected-ion' : ''}`;
                div.innerHTML = `<div>${formatSymbol(ion.symbol)}${formatCharge(ion.charge)}</div><div class="text-[10px] text-slate-500 uppercase font-bold">${ion.name[currentLang]}</div>`;
                div.onclick = () => {
                    document.querySelectorAll(`#${container.id} .ion-card`).forEach(el => el.classList.remove('selected-ion'));
                    div.classList.add('selected-ion');
                    if (idx === 0) selectedCation = ion; else selectedAnion = ion;
                    checkReady();
                };
                container.appendChild(div);
            });
        });
    }

    function checkReady() {
        if (selectedCation && selectedAnion) document.getElementById('controls').classList.remove('hidden');
    }

    function clearMovingElements() {
        document.querySelectorAll('.moving-charge').forEach(el => el.remove());
    }

    function resetSimulationState() {
        selectedCation = null;
        selectedAnion = null;
        currentStep = 0;
        
        document.getElementById('simulation-view').classList.add('hidden');
        document.getElementById('setup-view').classList.remove('hidden');
        document.getElementById('controls').classList.add('hidden');
        
        const vCation = document.getElementById('v-cation');
        const vAnion = document.getElementById('v-anion');
        const vArea = document.getElementById('visual-area');
        vCation.classList.remove('merged-style');
        vAnion.classList.remove('merged-style');
        vArea.classList.remove('merge-gap', 'animate-success');
        
        renderLists();
        window.scrollTo(0, 0);
    }

    async function runStep() {
        const t = translations[currentLang];
        const vCation = document.getElementById('v-cation');
        const vAnion = document.getElementById('v-anion');
        const vOp = document.getElementById('v-operator');
        const vArea = document.getElementById('visual-area');
        const title = document.getElementById('step-title');
        const desc = document.getElementById('step-description');
        const nextBtn = document.getElementById('next-btn');
        const backBtn = document.getElementById('back-btn');

        const catVal = Math.abs(selectedCation.charge);
        const aniVal = Math.abs(selectedAnion.charge);
        const common = gcd(catVal, aniVal);
        
        const rawSubCat = aniVal;
        const rawSubAni = catVal;
        const simpCat = aniVal / common;
        const simpAni = catVal / common;

        clearMovingElements();
        
        if (currentStep === 0) {
            backBtn.classList.add('hidden');
        } else {
            backBtn.classList.remove('hidden');
        }

        switch(currentStep) {
            case 0:
                title.innerText = t.step1Title;
                vCation.innerHTML = `${formatSymbol(selectedCation.symbol)}<span id="c-charge" class="formula-superscript">${catVal === 1 ? '' : catVal}+</span>`;
                vAnion.innerHTML = `${formatSymbol(selectedAnion.symbol)}<span id="a-charge" class="formula-superscript">${aniVal === 1 ? '' : aniVal}-</span>`;
                vOp.style.opacity = "1";
                vOp.style.display = "block";
                vArea.classList.remove('merge-gap');
                vArea.classList.remove('animate-success');
                vCation.className = "ion-box-mobile relative p-6 rounded-2xl bg-blue-50 border-2 border-blue-200 text-blue-800 transition-all duration-500 min-w-[100px] md:min-w-[120px] text-center";
                vAnion.className = "ion-box-mobile relative p-6 rounded-2xl bg-red-50 border-2 border-red-200 text-red-800 transition-all duration-500 min-w-[100px] md:min-w-[120px] text-center";
                desc.innerHTML = t.step1Desc(selectedCation.name[currentLang], selectedAnion.name[currentLang]);
                nextBtn.innerText = t.crossBtn;
                break;

            case 1:
                title.innerText = t.step2Title;
                vOp.style.opacity = "0.2";
                vOp.style.display = "block";
                vArea.classList.remove('merge-gap');
                vCation.innerHTML = `${formatSymbol(selectedCation.symbol)}<span id="c-charge" class="formula-superscript">${catVal === 1 ? '' : catVal}+</span>`;
                vAnion.innerHTML = `${formatSymbol(selectedAnion.symbol)}<span id="a-charge" class="formula-superscript">${aniVal === 1 ? '' : aniVal}-</span>`;
                
                desc.innerHTML = t.step2Desc;
                
                setTimeout(() => {
                    const cChargeEl = document.getElementById('c-charge');
                    const aChargeEl = document.getElementById('a-charge');
                    if (!cChargeEl || !aChargeEl) return;
                    const cRect = cChargeEl.getBoundingClientRect();
                    const aRect = aChargeEl.getBoundingClientRect();
                    const scrollY = window.scrollY;

                    const floatC = document.createElement('div');
                    floatC.className = 'moving-charge text-blue-600 font-bold text-4xl';
                    floatC.innerText = catVal;
                    floatC.style.left = `${cRect.left}px`;
                    floatC.style.top = `${cRect.top + scrollY}px`;
                    
                    const floatA = document.createElement('div');
                    floatA.className = 'moving-charge text-red-600 font-bold text-4xl';
                    floatA.innerText = aniVal;
                    floatA.style.left = `${aRect.left}px`;
                    floatA.style.top = `${aRect.top + scrollY}px`;

                    document.body.appendChild(floatC);
                    document.body.appendChild(floatA);

                    cChargeEl.style.opacity = '0';
                    aChargeEl.style.opacity = '0';

                    setTimeout(() => {
                        const catContainer = vCation.getBoundingClientRect();
                        const aniContainer = vAnion.getBoundingClientRect();
                        floatC.style.left = `${aniContainer.right - (window.innerWidth < 640 ? 15 : 25)}px`;
                        floatC.style.top = `${aniContainer.bottom - (window.innerWidth < 640 ? 15 : 25) + scrollY}px`;
                        floatC.style.fontSize = window.innerWidth < 640 ? '1.4rem' : '1.8rem';
                        floatA.style.left = `${catContainer.right - (window.innerWidth < 640 ? 15 : 25)}px`;
                        floatA.style.top = `${catContainer.bottom - (window.innerWidth < 640 ? 15 : 25) + scrollY}px`;
                        floatA.style.fontSize = window.innerWidth < 640 ? '1.4rem' : '1.8rem';
                    }, 50);
                }, 100);

                nextBtn.innerText = t.simplifyBtn;
                break;

            case 2:
                title.innerText = t.step3Title;
                vOp.style.opacity = "0.2";
                vOp.style.display = "block";
                vArea.classList.remove('merge-gap');
                
                let cBody3 = formatSymbol(selectedCation.symbol);
                const showCatBrackets = simpCat > 1 && selectedCation.poly;
                if (showCatBrackets) {
                    cBody3 = `<span class="bracket-fade">(</span>${cBody3}<span class="bracket-fade">)</span>`;
                }
                
                let aBody3 = formatSymbol(selectedAnion.symbol);
                const showAniBrackets = simpAni > 1 && selectedAnion.poly;
                if (showAniBrackets) {
                    aBody3 = `<span class="bracket-fade">(</span>${aBody3}<span class="bracket-fade">)</span>`;
                }

                let bracketReminder = (showCatBrackets || showAniBrackets) ? 
                    `<div class='mt-2 text-sm text-blue-600 font-semibold'>${t.reminder}</div>` : "";

                if (common > 1) {
                    vCation.innerHTML = `${cBody3}<span class="formula-subscript text-blue-600 inline-flex items-center">
                        <span id="sub-cat-raw" class="strike-container">${rawSubCat}<span class="strike-line"></span></span>
                        <span id="sub-cat-simp" class="simplify-fade ml-1">${simpCat}</span>
                    </span>`;
                    vAnion.innerHTML = `${aBody3}<span class="formula-subscript text-red-600 inline-flex items-center">
                        <span id="sub-ani-raw" class="strike-container">${rawSubAni}<span class="strike-line"></span></span>
                        <span id="sub-ani-simp" class="simplify-fade ml-1">${simpAni}</span>
                    </span>`;
                    
                    desc.innerHTML = t.step3DescReduced(rawSubCat, rawSubAni, simpCat, simpAni) + bracketReminder;
                    
                    setTimeout(() => {
                        const rc = document.getElementById('sub-cat-raw');
                        const ra = document.getElementById('sub-ani-raw');
                        if(rc) rc.classList.add('strike-active');
                        if(ra) ra.classList.add('strike-active');
                        setTimeout(() => {
                            const sc = document.getElementById('sub-cat-simp');
                            const sa = document.getElementById('sub-ani-simp');
                            if(sc) sc.classList.add('simplify-visible');
                            if(sa) sa.classList.add('simplify-visible');
                        }, 500);
                    }, 800);

                } else {
                    vCation.innerHTML = `${cBody3}<span class="formula-subscript text-blue-600">${simpCat}</span>`;
                    vAnion.innerHTML = `${aBody3}<span class="formula-subscript text-red-600">${simpAni}</span>`;
                    desc.innerHTML = t.step3DescSimple(simpCat, simpAni) + bracketReminder;
                }
                
                setTimeout(() => {
                    document.querySelectorAll('.bracket-fade').forEach(el => el.classList.add('bracket-visible'));
                }, 100);

                nextBtn.innerText = t.finalizeBtn;
                break;

            case 3:
                title.innerText = t.step4Title;
                vOp.style.opacity = "0.2";
                
                let cStep4 = formatSymbol(selectedCation.symbol);
                if (simpCat > 1 && selectedCation.poly) cStep4 = `(${cStep4})`;
                let catSubscriptHtml = `<span id="final-sub-cat" class="formula-subscript ${simpCat === 1 ? 'subscript-fade-out' : ''}">${simpCat}</span>`;
                
                let aStep4 = formatSymbol(selectedAnion.symbol);
                if (simpAni > 1 && selectedAnion.poly) aStep4 = `(${aStep4})`;
                let aniSubscriptHtml = `<span id="final-sub-ani" class="formula-subscript ${simpAni === 1 ? 'subscript-fade-out' : ''}">${simpAni}</span>`;

                vCation.innerHTML = cStep4 + catSubscriptHtml;
                vAnion.innerHTML = aStep4 + aniSubscriptHtml;
                
                desc.innerHTML = t.step4Desc;

                setTimeout(() => {
                    vOp.style.opacity = "0";
                    vCation.classList.add('merged-style');
                    vAnion.classList.add('merged-style');
                    vArea.classList.add('merge-gap');
                    
                    const fsc = document.getElementById('final-sub-cat');
                    const fsa = document.getElementById('final-sub-ani');
                    if (simpCat === 1 && fsc) fsc.classList.add('fade-hidden');
                    if (simpAni === 1 && fsa) fsa.classList.add('fade-hidden');
                    
                    setTimeout(() => {
                        if(currentStep === 3) vOp.style.display = "none";
                        vArea.classList.add('animate-success');
                        
                        let successC = formatSymbol(selectedCation.symbol);
                        if (simpCat > 1) {
                            if (selectedCation.poly) successC = `(${successC})`;
                            successC += `<span class="formula-subscript">${simpCat}</span>`;
                        }
                        let successA = formatSymbol(selectedAnion.symbol);
                        if (simpAni > 1) {
                            if (selectedAnion.poly) successA = `(${successA})`;
                            successA += `<span class="formula-subscript">${simpAni}</span>`;
                        }
                        
                        desc.innerHTML = `
                            <div class="text-3xl font-bold text-green-600 mb-2">${t.success}</div>
                            ${t.resultText(successC + successA)}
                        `;
                    }, 800);
                }, 500);

                nextBtn.innerText = t.newBtn;
                break;
        }
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden');
        document.getElementById('simulation-view').classList.remove('hidden');
        currentStep = 0;
        runStep();
    };

    document.getElementById('next-btn').onclick = () => {
        if (currentStep < 3) {
            currentStep++;
            runStep();
        } else {
            resetSimulationState();
        }
    };

    document.getElementById('back-btn').onclick = () => {
        if (currentStep > 0) {
            currentStep--;
            runStep();
        }
    };

    document.getElementById('reset-btn').onclick = () => resetSimulationState();
    
    // Initial UI render
    updateLanguageUI();

    window.addEventListener('resize', () => {
        if (currentStep === 1) {
            clearMovingElements();
            runStep();
        }
    });
</script>
</body>
</html>
