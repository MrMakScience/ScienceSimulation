<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isotopes & Atomic Mass Simulator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }
        .electron-orbit {
            animation: orbit linear infinite;
        }
        .animate-shake {
            animation: shake 0.3s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Robust Inline SVG Icons
        const MinusIcon = ({ size = 16, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/></svg>
        );

        const PlusIcon = ({ size = 16, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14m-7-7v14"/></svg>
        );

        const Icon = ({ name, size = 16, className = "" }) => {
            const [path, setPath] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = window.lucide.createIcons({ icons: { [name]: iconData } });
                        setPath(tempDiv.querySelector('svg').innerHTML);
                    }
                }
            }, [name]);
            if (name === 'plus') return <PlusIcon size={size} className={className} />;
            if (name === 'minus') return <MinusIcon size={size} className={className} />;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
            );
        };

        const TRANSLATIONS = {
            en: {
                title: "Isotopes & Atomic Mass",
                subtitle: "Explore nuclear stability and isotopic abundance",
                chooseElement: "Choose Element",
                activeElement: "Active Element",
                modifyNucleus: "Modify Nucleus",
                protons: "Protons",
                neutrons: "Neutrons",
                electrons: "Electrons",
                stable: "Stable",
                unstable: "Unstable / Radioactive",
                isotopicData: "Isotopic Data",
                abundance: "Abundance in Nature",
                current: "Current",
                decayNote: "Due to its poor stability, it is not existing in nature as it will undergo radioactive decay and transform to other elements.",
                atomicNum: "Atomic Number (Z)",
                massNum: "Mass Number (A)",
                naturalIsotopes: "Natural Isotopes",
                relAtomicMass: "Relative Atomic Mass (Aᵣ)",
                result: "Result",
                massNote: "* Strictly speaking, mass number should not be used to calculate Aᵣ as it omits mass of electrons and the slight difference between mass of protons and neutrons.",
                whatIsIsotope: "What is an Isotope?",
                isotopeDesc: "Atoms with the same number of protons but different numbers of neutrons. They share chemical properties but differ in mass.",
                nuclearStability: "Nuclear Stability",
                stabilityDesc: "The balance between the strong nuclear force and electrostatic repulsion determines if an isotope is stable or decays.",
                relMassFooter: "Relative Atomic Mass",
                relMassDesc: "Calculated as the weighted average of all naturally occurring isotopes. This is the value found on the periodic table.",
                elements: {
                    Hydrogen: "Hydrogen", Helium: "Helium", Lithium: "Lithium", Beryllium: "Beryllium",
                    Boron: "Boron", Carbon: "Carbon", Nitrogen: "Nitrogen", Oxygen: "Oxygen",
                    Fluorine: "Fluorine", Neon: "Neon"
                }
            },
            zh: {
                title: "同位素與原子質量",
                subtitle: "探索核穩定性與同位素豐度",
                chooseElement: "選擇元素",
                activeElement: "當前元素",
                modifyNucleus: "修改原子核",
                protons: "質子",
                neutrons: "中子",
                electrons: "電子",
                stable: "穩定",
                unstable: "不穩定 / 具放射性",
                isotopicData: "同位素數據",
                abundance: "自然豐度",
                current: "當前",
                decayNote: "由於其穩定性較差，它在自然界中並不存在，因為它會發生放射性衰變並轉化為其他元素。",
                atomicNum: "原子序數 (Z)",
                massNum: "質量數 (A)",
                naturalIsotopes: "天然同位素",
                relAtomicMass: "相對原子質量 (Aᵣ)",
                result: "結果",
                massNote: "* 嚴格來說，不應使用質量數來計算 Aᵣ，因為它忽略了電子的質量以及質子和中子質量的微小差異。",
                whatIsIsotope: "什麼是同位素？",
                isotopeDesc: "具有相同質子數但中子數不同的原子。它們具有相同的化學性質，但質量不同。",
                nuclearStability: "核穩定性",
                stabilityDesc: "強核力與靜電排斥力之間的平衡決定了同位素是穩定還是會發生衰變。",
                relMassFooter: "相對原子質量",
                relMassDesc: "計算為所有天然存在同位素的加權平均值。這是週期表上顯示的數值。",
                elements: {
                    Hydrogen: "氫", Helium: "氦", Lithium: "鋰", Beryllium: "鈹",
                    Boron: "硼", Carbon: "碳", Nitrogen: "氮", Oxygen: "氧",
                    Fluorine: "氟", Neon: "氖"
                }
            }
        };

        const ELEMENTS = [
            { z: 1, symbol: 'H', name: 'Hydrogen', isotopes: [
                { n: 0, mass: 1.0078, abundance: 99.98, stable: true },
                { n: 1, mass: 2.0141, abundance: 0.02, stable: true },
                { n: 2, mass: 3.0160, abundance: 0.00, stable: false }
            ]},
            { z: 2, symbol: 'He', name: 'Helium', isotopes: [
                { n: 1, mass: 3.0160, abundance: 0.0001, stable: true },
                { n: 2, mass: 4.0026, abundance: 99.9999, stable: true }
            ]},
            { z: 3, symbol: 'Li', name: 'Lithium', isotopes: [
                { n: 3, mass: 6.0151, abundance: 7.59, stable: true },
                { n: 4, mass: 7.0160, abundance: 92.41, stable: true }
            ]},
            { z: 4, symbol: 'Be', name: 'Beryllium', isotopes: [
                { n: 5, mass: 9.0122, abundance: 100, stable: true }
            ]},
            { z: 5, symbol: 'B', name: 'Boron', isotopes: [
                { n: 5, mass: 10.0129, abundance: 19.9, stable: true },
                { n: 6, mass: 11.0093, abundance: 80.1, stable: true }
            ]},
            { z: 6, symbol: 'C', name: 'Carbon', isotopes: [
                { n: 6, mass: 12.0000, abundance: 98.93, stable: true },
                { n: 7, mass: 13.0034, abundance: 1.07, stable: true },
                { n: 8, mass: 14.0032, abundance: 0.00, stable: false }
            ]},
            { z: 7, symbol: 'N', name: 'Nitrogen', isotopes: [
                { n: 7, mass: 14.0031, abundance: 99.63, stable: true },
                { n: 8, mass: 15.0001, abundance: 0.37, stable: true }
            ]},
            { z: 8, symbol: 'O', name: 'Oxygen', isotopes: [
                { n: 8, mass: 15.9949, abundance: 99.757, stable: true },
                { n: 9, mass: 16.9991, abundance: 0.038, stable: true },
                { n: 10, mass: 17.9992, abundance: 0.205, stable: true }
            ]},
            { z: 9, symbol: 'F', name: 'Fluorine', isotopes: [
                { n: 10, mass: 18.9984, abundance: 100, stable: true }
            ]},
            { z: 10, symbol: 'Ne', name: 'Neon', isotopes: [
                { n: 10, mass: 19.9924, abundance: 90.48, stable: true },
                { n: 11, mass: 20.9938, abundance: 0.27, stable: true },
                { n: 12, mass: 21.9914, abundance: 9.25, stable: true }
            ]}
        ];

        const App = () => {
            const [selectedZ, setSelectedZ] = useState(1);
            const [neutrons, setNeutrons] = useState(0);
            const [lang, setLang] = useState('en');

            const t = TRANSLATIONS[lang];
            const element = useMemo(() => ELEMENTS.find(e => e.z === selectedZ), [selectedZ]);
            
            const firstStableNeutrons = useMemo(() => {
                const stableIsotopes = element.isotopes.filter(iso => iso.stable);
                if (stableIsotopes.length > 0) {
                    return Math.min(...stableIsotopes.map(iso => iso.n));
                }
                return element.isotopes[0].n;
            }, [element]);

            const maxNeutrons = useMemo(() => firstStableNeutrons + 5, [firstStableNeutrons]);

            const defaultNeutrons = useMemo(() => {
                const mostAbundant = [...element.isotopes].sort((a, b) => b.abundance - a.abundance)[0];
                return mostAbundant.n;
            }, [element]);

            const currentIsotope = useMemo(() => {
                return element.isotopes.find(i => i.n === neutrons) || {
                    n: neutrons,
                    mass: (element.z + neutrons),
                    abundance: 0,
                    stable: false,
                    isSynthetic: true
                };
            }, [element, neutrons]);

            const relativeAtomicMass = useMemo(() => {
                return element.isotopes.reduce((acc, iso) => {
                    const massNumber = element.z + iso.n;
                    return acc + (massNumber * (iso.abundance / 100));
                }, 0);
            }, [element]);

            useEffect(() => {
                setNeutrons(defaultNeutrons);
            }, [selectedZ, defaultNeutrons]);

            const nucleons = useMemo(() => {
                const particles = [];
                const total = element.z + neutrons;
                const phi = (Math.sqrt(5) + 1) / 2;
                const angleIncrement = 2 * Math.PI * phi;
                
                for (let i = 0; i < total; i++) {
                    const isProton = i < element.z;
                    const radius = 5 * Math.sqrt(i + 1); 
                    const angle = i * angleIncrement;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    const depthScale = 0.85 + (Math.sin(i * 123.456) * 0.15); 
                    const zIndex = Math.floor(depthScale * 100);

                    particles.push({
                        id: `${isProton ? 'p' : 'n'}-${i}`,
                        type: isProton ? 'proton' : 'neutron',
                        x, y, scale: depthScale, zIndex
                    });
                }
                return particles.sort((a, b) => a.zIndex - b.zIndex);
            }, [element.z, neutrons]);

            const electronShells = useMemo(() => {
                const count = element.z;
                const shells = [];
                const capacities = [2, 8]; 
                let remaining = count;
                for (let i = 0; i < capacities.length && remaining > 0; i++) {
                    const inShell = Math.min(remaining, capacities[i]);
                    shells.push({ level: i + 1, count: inShell });
                    remaining -= inShell;
                }
                return shells;
            }, [element.z]);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
                    <div className="max-w-6xl mx-auto relative">
                        
                        {/* Language Button Moved Above the Topic */}
                        <div className="flex justify-end mb-4">
                            <button 
                                onClick={() => setLang(lang === 'en' ? 'zh' : 'en')}
                                className="flex items-center gap-2 px-4 py-2 bg-white text-indigo-700 border border-slate-200 rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition-all text-sm font-bold shadow-sm"
                            >
                                <span className="text-lg">🌐</span>
                                {lang === 'en' ? '繁體中文' : 'English'}
                            </button>
                        </div>

                        <header className="flex flex-col gap-2 mb-8">
                            <h1 className="text-3xl font-bold tracking-tight flex items-center gap-2">
                                <Icon name="atom" size={32} className="text-indigo-600" />
                                {t.title}
                            </h1>
                            <p className="text-slate-500 mt-1">{t.subtitle}</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <Icon name="database" size={16} /> {t.chooseElement}
                                    </h3>
                                    <div className="grid grid-cols-5 gap-2">
                                        {ELEMENTS.map(el => (
                                            <button
                                                key={el.z}
                                                onClick={() => setSelectedZ(el.z)}
                                                className={`h-14 rounded-xl flex flex-col items-center justify-center transition-all border-2 ${
                                                    selectedZ === el.z 
                                                    ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' 
                                                    : 'bg-white border-slate-100 text-slate-600 hover:border-indigo-200'
                                                }`}
                                            >
                                                <span className="text-[10px] opacity-80">{el.z}</span>
                                                <span className="font-bold text-lg leading-tight">{el.symbol}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="mt-4 p-3 bg-indigo-50 rounded-xl flex items-center justify-center">
                                        <div className="text-center">
                                            <p className="text-xs text-indigo-400 font-medium uppercase">{t.activeElement}</p>
                                            <p className="font-bold text-indigo-900 text-lg">{t.elements[element.name]}</p>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <Icon name="activity" size={16} /> {t.modifyNucleus}
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-between">
                                            <span className="text-slate-600 font-medium flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-red-500"></span> {t.protons}
                                            </span>
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 text-center font-bold text-lg">{element.z}</span>
                                                <div className="flex gap-1">
                                                    <button disabled className="p-2 bg-slate-100 text-slate-400 rounded-lg cursor-not-allowed">
                                                        <MinusIcon />
                                                    </button>
                                                    <button disabled className="p-2 bg-slate-100 text-slate-400 rounded-lg cursor-not-allowed">
                                                        <PlusIcon />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <span className="text-slate-600 font-medium flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-slate-400"></span> {t.neutrons}
                                            </span>
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 text-center font-bold text-lg">{neutrons}</span>
                                                <div className="flex gap-1">
                                                    <button 
                                                        onClick={() => setNeutrons(Math.max(0, neutrons - 1))}
                                                        disabled={neutrons <= 0}
                                                        className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                                    >
                                                        <MinusIcon />
                                                    </button>
                                                    <button 
                                                        onClick={() => setNeutrons(neutrons + 1)}
                                                        disabled={neutrons >= maxNeutrons}
                                                        className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                                    >
                                                        <PlusIcon />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between opacity-80">
                                            <span className="text-slate-600 font-medium flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_4px_cyan]"></span> {t.electrons}
                                            </span>
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 text-center font-bold text-lg">{element.z}</span>
                                                <div className="flex gap-1">
                                                    <button disabled className="p-2 bg-slate-50 text-slate-300 rounded-lg cursor-not-allowed opacity-50">
                                                        <MinusIcon />
                                                    </button>
                                                    <button disabled className="p-2 bg-slate-50 text-slate-300 rounded-lg cursor-not-allowed opacity-50">
                                                        <PlusIcon />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <div className="lg:col-span-5 space-y-6">
                                <section className="bg-slate-900 rounded-3xl h-[480px] relative overflow-hidden shadow-2xl flex items-center justify-center border-4 border-white">
                                    <div className={`absolute top-6 left-6 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 z-50 transition-all duration-500 transform ${
                                        currentIsotope.stable 
                                        ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                                        : 'bg-rose-500/20 text-rose-400 border border-rose-500/30 animate-pulse'
                                    }`}>
                                        <Icon name="activity" size={14} />
                                        {currentIsotope.stable ? t.stable : t.unstable}
                                    </div>

                                    <div className="relative w-full h-full flex items-center justify-center">
                                        
                                        {electronShells.map((shell, sIdx) => {
                                            const radius = 95 + (sIdx * 65);
                                            return (
                                                <div key={`shell-${shell.level}`} className="absolute border border-cyan-400/20 rounded-full pointer-events-none shadow-[inset_0_0_15px_rgba(34,211,238,0.05)]" style={{ width: radius * 2, height: radius * 2 }}>
                                                    <div className="absolute inset-0 electron-orbit" style={{ animationDuration: `${(sIdx + 1) * 8}s` }}>
                                                        {[...Array(shell.count)].map((_, eIdx) => {
                                                            const angle = (eIdx / shell.count) * 2 * Math.PI;
                                                            return (
                                                                <div 
                                                                    key={`e-${shell.level}-${eIdx}`} 
                                                                    className="absolute w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_cyan,0_0_2px_white]"
                                                                    style={{ 
                                                                        left: '50%', 
                                                                        top: '50%', 
                                                                        transform: `translate(-50%, -50%) translate(${Math.cos(angle) * radius}px, ${Math.sin(angle) * radius}px)` 
                                                                    }}
                                                                >
                                                                    <div className="absolute inset-0 animate-ping bg-cyan-400 rounded-full opacity-40"></div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}

                                        <div 
                                            className={`relative transition-transform duration-200 ${!currentIsotope.stable ? 'animate-shake' : ''}`}
                                        >
                                            {nucleons.map((n) => (
                                                <div 
                                                    key={n.id} 
                                                    className={`w-4 h-4 rounded-full absolute border transition-all duration-500 ${
                                                        n.type === 'proton' 
                                                        ? 'bg-red-500 border-red-600 shadow-[inset_-1px_-1px_2px_rgba(0,0,0,0.3)]' 
                                                        : 'bg-slate-300 border-slate-400 shadow-[inset_-1px_-1px_2px_rgba(0,0,0,0.2)]'
                                                    }`}
                                                    style={{
                                                        transform: `translate(-50%, -50%) translate(${n.x}px, ${n.y}px) scale(${n.scale})`,
                                                        zIndex: n.zIndex
                                                    }}
                                                >
                                                     <div className="absolute top-0.5 left-0.5 w-1 h-1 rounded-full bg-white opacity-40 blur-[0.5px]"></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="absolute bottom-8 left-0 right-0 text-center z-[100]">
                                        <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/10">
                                           <div className="text-left leading-none">
                                              <div className="text-white text-[10px] opacity-60 font-bold">{element.z + neutrons}</div>
                                              <div className="text-white text-3xl font-black">{element.symbol}</div>
                                              <div className="text-white text-[10px] opacity-60 font-bold">{element.z}</div>
                                           </div>
                                           <div className="w-[1px] h-10 bg-white/20 mx-2"></div>
                                           <div className="text-left leading-tight">
                                              <div className="text-white font-bold">{t.elements[element.name]}</div>
                                           </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-full overflow-y-auto">
                                    <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-6 flex items-center gap-2">
                                        <Icon name="scale" size={16} /> {t.isotopicData}
                                    </h3>
                                    
                                    <div className="space-y-6">
                                        <div>
                                           <p className="text-xs font-bold text-slate-400 uppercase mb-2">{t.abundance}</p>
                                           <div className="relative pt-1">
                                              <div className="flex mb-2 items-center justify-between">
                                                <div>
                                                  <span className="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full text-indigo-600 bg-indigo-200">
                                                    {t.current}
                                                  </span>
                                                </div>
                                                <div className="text-right">
                                                  <span className="text-xs font-semibold inline-block text-indigo-600">
                                                    {currentIsotope.abundance}%
                                                  </span>
                                                </div>
                                              </div>
                                              <div className="overflow-hidden h-2 mb-4 text-xs flex rounded bg-indigo-100">
                                                <div style={{ width: `${currentIsotope.abundance}%` }} className="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-indigo-500 transition-all duration-700"></div>
                                              </div>
                                              
                                              {!currentIsotope.stable && (
                                                <div className="mt-2 p-2 bg-rose-50 border-l-2 border-rose-400 rounded-r-lg">
                                                    <p className="text-[10px] leading-snug text-rose-700 italic">
                                                        {t.decayNote}
                                                    </p>
                                                </div>
                                              )}
                                           </div>
                                        </div>

                                        <div className="p-4 bg-slate-50 rounded-xl space-y-3">
                                          <div className="flex justify-between items-center text-xs text-slate-500">
                                            <span>{t.atomicNum}</span>
                                            <span className="font-bold text-slate-700">{element.z}</span>
                                          </div>
                                          <div className="flex justify-between items-center text-xs text-slate-500">
                                            <span>{t.massNum}</span>
                                            <span className="font-bold text-slate-700">{element.z + neutrons}</span>
                                          </div>
                                        </div>

                                        <div className="border-t border-slate-50 pt-4">
                                          <h4 className="text-xs font-bold text-slate-400 uppercase mb-3">{t.naturalIsotopes}</h4>
                                          <div className="space-y-2">
                                            {element.isotopes.map((iso, idx) => (
                                              <div 
                                                key={idx}
                                                className={`p-2 rounded-lg flex items-center justify-between text-sm transition-colors ${iso.n === neutrons ? 'bg-indigo-50 text-indigo-700 border border-indigo-100' : 'text-slate-500'}`}
                                              >
                                                <span className="font-medium">{element.symbol}-{element.z + iso.n}</span>
                                                <span className="text-xs opacity-70">{iso.abundance}%</span>
                                              </div>
                                            ))}
                                          </div>
                                        </div>

                                        <div className="border-t border-slate-50 pt-4">
                                            <h4 className="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-1">
                                                <Icon name="calculator" size={12}/> {t.relAtomicMass}
                                            </h4>
                                            <div className="bg-indigo-50 p-3 rounded-xl">
                                                <div className="text-[10px] text-slate-500 font-mono space-y-1 mb-2">
                                                    {element.isotopes.filter(i => i.abundance > 0).map((iso, i) => (
                                                        <div key={i}>
                                                            ({element.z + iso.n} × {iso.abundance}%) {i < element.isotopes.filter(i => i.abundance > 0).length - 1 ? '+' : ''}
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex justify-between items-baseline mb-2">
                                                    <span className="text-xs font-semibold text-indigo-700">{t.result}:</span>
                                                    <span className="text-lg font-black text-indigo-900">{relativeAtomicMass.toFixed(2)}</span>
                                                </div>
                                                <p className="text-[9px] leading-tight text-slate-400 italic">
                                                    {t.massNote}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>

                        {/* Footer Info Cards */}
                        <div className="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="flex gap-4 p-5 bg-white rounded-2xl border border-slate-100">
                                <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center shrink-0">
                                    <Icon name="info" size={20} />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800">{t.whatIsIsotope}</h4>
                                    <p className="text-xs text-slate-500 mt-1">{t.isotopeDesc}</p>
                                </div>
                            </div>
                            <div className="flex gap-4 p-5 bg-white rounded-2xl border border-slate-100">
                                <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center shrink-0">
                                    <Icon name="activity" size={20} />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800">{t.nuclearStability}</h4>
                                    <p className="text-xs text-slate-500 mt-1">{t.stabilityDesc}</p>
                                </div>
                            </div>
                            <div className="flex gap-4 p-5 bg-white rounded-2xl border border-slate-100">
                                <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center shrink-0">
                                    <Icon name="weight" size={20} />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800">{t.relMassFooter}</h4>
                                    <p className="text-xs text-slate-500 mt-1">{t.relMassDesc}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
