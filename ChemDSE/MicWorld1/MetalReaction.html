<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metal Reactions in Water Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* Allow vertical scrolling on the whole page */
            touch-action: pan-y;
            overflow-x: hidden;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 40vh;
            min-height: 300px;
            background: #cbd5e1; 
            border-bottom: 8px solid #1e293b;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            /* Allow scrolling even when swiping on the canvas area */
            touch-action: pan-y;
        }

        /* The Trough */
        .trough {
            position: relative;
            width: 80%; 
            max-width: 600px;
            height: 65%; 
            background: transparent;
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-top: none;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 10;
        }

        #water-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%; 
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.4) 0%, rgba(3, 105, 161, 0.6) 100%);
            z-index: -1;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .water-surface {
            position: absolute;
            bottom: 70%;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            z-index: 15;
            pointer-events: none;
            transform: translateY(50%);
        }

        .control-panel {
            padding: 20px;
            background: #1e293b;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .metal-btn {
            transition: all 0.2s;
            letter-spacing: 1px;
            font-weight: bold;
            flex: 1 1 140px;
        }

        #observation-box {
            background: #0f172a;
            border-left: 4px solid #38bdf8;
            padding: 15px;
            border-radius: 4px;
            min-height: 150px;
            font-family: monospace;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
        }

        #h2-setup {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 220px;
            display: none;
            z-index: 18;
            pointer-events: none;
        }

        #funnel {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            clip-path: polygon(0% 100%, 100% 100%, 65% 20%, 35% 20%);
        }

        #test-tube {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 160px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            overflow: hidden;
        }

        #tube-water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(56, 189, 248, 0.3);
            transition: height 0.1s linear;
        }

        #litmus-paper {
            position: absolute;
            width: 40px;
            height: 120px;
            background: #f87171;
            border: 1px solid #b91c1c;
            cursor: grab;
            z-index: 50; 
            display: none;
            user-select: none;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            /* Block scrolling only when dragging the paper */
            touch-action: none; 
        }

        #litmus-wet-part {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #ef4444;
            transition: background 0.5s ease;
        }

        #litmus-paper.turned-blue #litmus-wet-part {
            background: #3b82f6;
        }

        @media (min-width: 768px) {
            #canvas-container { height: 50vh; }
            .trough { width: 50%; }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="trough" id="main-trough">
            <div id="water-body"></div>
            <div class="water-surface" id="surface-line"></div>
            
            <div id="h2-setup">
                <div id="test-tube">
                    <div id="tube-water"></div>
                </div>
                <div id="funnel"></div>
            </div>
            
            <div id="simulation-area" class="absolute inset-0 overflow-visible pointer-events-none"></div>
        </div>

        <div id="litmus-paper" style="left: 20px; top: 20px;">
            <div id="litmus-wet-part"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="flex flex-col gap-6">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="startReaction('sodium')" class="metal-btn bg-yellow-600 hover:bg-yellow-500 text-white py-4 px-6 rounded-xl shadow-lg active:scale-95">Sodium (Na)</button>
                <button onclick="startReaction('potassium')" class="metal-btn bg-purple-600 hover:bg-purple-500 text-white py-4 px-6 rounded-xl shadow-lg active:scale-95">Potassium (K)</button>
                <button onclick="startReaction('calcium')" class="metal-btn bg-gray-400 hover:bg-gray-300 text-slate-900 py-4 px-6 rounded-xl shadow-lg active:scale-95">Calcium (Ca)</button>
                <button onclick="resetSim()" class="metal-btn bg-red-800 hover:bg-red-700 text-white py-4 px-6 rounded-xl shadow-lg active:scale-95">Reset</button>
            </div>

            <div class="flex flex-wrap justify-center items-center gap-8 border-t border-slate-700 pt-6">
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" value="" class="sr-only peer" id="litmus-toggle" onchange="toggleLitmus()">
                    <div class="relative w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-red-500"></div>
                    <span class="ms-3 text-lg font-bold text-slate-300 group-active:text-white">Red Litmus Paper</span>
                </label>

                <div id="setup-toggle-container" class="opacity-30 pointer-events-none transition-all">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" value="" class="sr-only peer" id="setup-toggle" onchange="toggleSetup()">
                        <div class="relative w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-500"></div>
                        <span class="ms-3 text-lg font-bold text-slate-300 group-active:text-white">H<sub>2</sub> collection set-up</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="observation-box">
            <h3 class="text-sky-400 font-bold mb-2">Observations:</h3>
            <ul id="observation-list" class="text-sm list-disc list-inside space-y-1">
                <li>Select a metal to begin.</li>
            </ul>
            <div id="equation-container" class="mt-4 flex flex-col items-center gap-1 border-t border-slate-800 pt-3">
                <div id="chemical-equation" class="text-lg font-bold italic text-sky-200"></div>
                <div id="word-equation" class="text-xs text-sky-400 opacity-80 uppercase tracking-widest"></div>
            </div>
        </div>
    </div>

    <script>
        const simArea = document.getElementById('simulation-area');
        const obsList = document.getElementById('observation-list');
        const chemicalEqDiv = document.getElementById('chemical-equation');
        const wordEqDiv = document.getElementById('word-equation');
        const surfaceLine = document.getElementById('surface-line');
        const troughElement = document.getElementById('main-trough');
        const waterBody = document.getElementById('water-body');
        const litmusPaper = document.getElementById('litmus-paper');
        const litmusWetPart = document.getElementById('litmus-wet-part');
        const h2Setup = document.getElementById('h2-setup');
        const tubeWater = document.getElementById('tube-water');
        const setupToggleCont = document.getElementById('setup-toggle-container');
        const setupToggle = document.getElementById('setup-toggle');
        
        let audioCtx = null;
        let reactionInterval = null;
        let activeMetal = null;
        let isSolutionAlkaline = false;
        let gasVolumeInTube = 100;

        const DATA = {
            sodium: {
                equation: "2Na(s) + 2H₂O(l) → 2NaOH(aq) + H₂(g)",
                wordEquation: "Sodium + Water → Sodium hydroxide + Hydrogen",
                observations: ["Na melts to form a silvery ball.", "Hissing sound is generated.", "Na moves rapidly on water surface.", "Na burns with golden yellow flame.", "Solution turns red litmus blue."],
                color: "#cbd5e1", flameColor: "rgba(255, 215, 0, 0.9)",
                behavior: "float", shrinkSpeed: 0.08, moveSpeed: 4, bubbleProb: 0.5, hissPitch: 1400, hissVol: 0.03
            },
            potassium: {
                equation: "2K(s) + 2H₂O(l) → 2KOH(aq) + H₂(g)",
                wordEquation: "Potassium + Water → Potassium hydroxide + Hydrogen",
                observations: ["K melts to form a silvery ball.", "Hissing sound is generated.", "K moves rapidly on water surface.", "K burns with lilac flame.", "Solution turns red litmus blue."],
                color: "#cbd5e1", flameColor: "rgba(230, 190, 255, 0.9)",
                behavior: "float", shrinkSpeed: 0.22, moveSpeed: 8, bubbleProb: 0.95, hissPitch: 2200, hissVol: 0.12
            },
            calcium: {
                equation: "Ca(s) + 2H₂O(l) → Ca(OH)₂(aq) + H₂(g)",
                wordEquation: "Calcium + Water → Calcium hydroxide + Hydrogen",
                observations: ["Ca sinks and reacts steadily.", "Colourless gas bubbles are evolved.", "Solution turns red litmus blue."],
                color: "#94a3b8", flameColor: "transparent",
                behavior: "sink", shrinkSpeed: 0.07, moveSpeed: 0, bubbleProb: 1.0, hissPitch: 0, hissVol: 0
            }
        };

        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };

        function startDrag(clientX, clientY) {
            isDragging = true;
            const rect = litmusPaper.getBoundingClientRect();
            dragOffset.x = clientX - rect.left;
            dragOffset.y = clientY - rect.top;
        }

        function handleDrag(clientX, clientY) {
            if (!isDragging) return;
            const containerRect = document.getElementById('canvas-container').getBoundingClientRect();
            litmusPaper.style.left = (clientX - containerRect.left - dragOffset.x) + 'px';
            litmusPaper.style.top = (clientY - containerRect.top - dragOffset.y) + 'px';
            checkLitmusSubmersion();
        }

        litmusPaper.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);

        litmusPaper.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
            e.stopPropagation();
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const touch = e.touches[0];
            handleDrag(touch.clientX, touch.clientY);
            e.preventDefault(); // Only prevent scroll when actually dragging the paper
        }, { passive: false });

        window.addEventListener('touchend', () => isDragging = false);

        function checkLitmusSubmersion() {
            const paperRect = litmusPaper.getBoundingClientRect();
            const waterRect = waterBody.getBoundingClientRect();
            const troughRect = troughElement.getBoundingClientRect();
            const withinX = paperRect.right > troughRect.left && paperRect.left < troughRect.right;
            if (withinX && paperRect.bottom > waterRect.top) {
                const overlap = Math.min(paperRect.bottom, waterRect.bottom) - waterRect.top;
                const pct = Math.max(0, Math.min(100, (overlap / paperRect.height) * 100));
                if (pct > (parseFloat(litmusWetPart.style.height) || 0)) litmusWetPart.style.height = pct + '%';
                if (isSolutionAlkaline) litmusPaper.classList.add('turned-blue');
            }
        }

        function toggleLitmus() {
            litmusPaper.style.display = document.getElementById('litmus-toggle').checked ? 'block' : 'none';
        }

        function toggleSetup() {
            h2Setup.style.display = setupToggle.checked ? 'block' : 'none';
        }

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playExplosion(x, y, color) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
            gain.gain.setValueAtTime(1.5, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.5);
            
            for(let i=0; i<30; i++) {
                const spark = document.createElement('div');
                spark.className = 'particle';
                const s = Math.random() * 8 + 2;
                spark.style.width = s + 'px'; spark.style.height = s + 'px';
                spark.style.backgroundColor = i % 2 ? color : '#fff';
                spark.style.left = x + 'px'; spark.style.top = y + 'px';
                simArea.appendChild(spark);
                const ang = Math.random() * Math.PI * 2;
                const d = Math.random() * 150 + 50;
                const start = Date.now();
                const anim = () => {
                    const p = (Date.now() - start) / 1000;
                    if(p >= 1) { spark.remove(); return; }
                    spark.style.left = (x + Math.cos(ang) * d * p) + 'px';
                    spark.style.top = (y + Math.sin(ang) * d * p + (p * p * 300)) + 'px';
                    spark.style.opacity = 1 - p;
                    requestAnimationFrame(anim);
                };
                requestAnimationFrame(anim);
            }
        }

        function playHiss(active, type) {
            if (!audioCtx || !active || DATA[type].hissPitch === 0) {
                if (this.hissNode) {
                    this.hissNode.gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    this.hissNode = null;
                }
                return;
            }
            if (this.hissNode) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.value = DATA[type].hissPitch;
            const gain = audioCtx.createGain(); gain.gain.value = DATA[type].hissVol;
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
            this.hissNode = { noise, gain };
        }

        function createBubble(x, y) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 5 + 2;
            bubble.style.width = size + 'px'; bubble.style.height = size + 'px';
            bubble.style.left = x + 'px'; bubble.style.bottom = (troughElement.offsetHeight - y) + 'px';
            simArea.appendChild(bubble);

            const start = Date.now();
            const duration = 1200;
            const surfaceBottomPct = 70;

            const anim = () => {
                const p = (Date.now() - start) / duration;
                if (p >= 1) { bubble.remove(); return; }
                let curBottomPx = (troughElement.offsetHeight - y) + (p * 200);
                let curBottomPct = (curBottomPx / troughElement.offsetHeight) * 100;
                
                if (setupToggle.checked && activeMetal === 'calcium') {
                    const tubeHeight = 160; 
                    const setupHeight = 220;
                    if (curBottomPx > (setupHeight - tubeHeight) && Math.abs(x - troughElement.offsetWidth/2) < 15) {
                        gasVolumeInTube = Math.max(0, gasVolumeInTube - 0.2);
                        tubeWater.style.height = gasVolumeInTube + '%';
                        bubble.remove(); return;
                    }
                }
                if (curBottomPct >= surfaceBottomPct) { bubble.remove(); return; }
                bubble.style.bottom = curBottomPx + 'px';
                bubble.style.opacity = 1 - p;
                requestAnimationFrame(anim);
            };
            requestAnimationFrame(anim);
        }

        function createFlame(x, y, color, scale = 1) {
            const flame = document.createElement('div');
            flame.className = 'particle';
            const size = (Math.random() * 20 + 10) * scale;
            flame.style.width = size + 'px'; flame.style.height = size + 'px';
            flame.style.left = (x - size/2) + 'px'; flame.style.top = (y - size/2) + 'px';
            flame.style.backgroundColor = color; flame.style.filter = 'blur(5px)';
            simArea.appendChild(flame);
            const start = Date.now();
            const anim = () => {
                const p = (Date.now() - start) / 250;
                if (p >= 1) { flame.remove(); return; }
                flame.style.transform = `translateY(${-p * 30}px) scale(${1-p})`;
                flame.style.opacity = 1 - p;
                requestAnimationFrame(anim);
            };
            requestAnimationFrame(anim);
        }

        function resetSim() {
            clearInterval(reactionInterval);
            simArea.innerHTML = '';
            obsList.innerHTML = '<li>Select a metal to begin.</li>';
            chemicalEqDiv.innerHTML = ''; wordEqDiv.innerHTML = '';
            playHiss(false);
            activeMetal = null;
            isSolutionAlkaline = false;
            litmusPaper.classList.remove('turned-blue');
            litmusWetPart.style.height = '0%';
            setupToggleCont.style.opacity = "0.3";
            setupToggleCont.style.pointerEvents = "none";
            setupToggle.checked = false;
            h2Setup.style.display = 'none';
            gasVolumeInTube = 100;
            tubeWater.style.height = '100%';
        }

        function startReaction(type) {
            initAudio();
            resetSim();
            activeMetal = type;
            const metal = DATA[type];
            if (type === 'calcium') {
                setupToggleCont.style.opacity = "1";
                setupToggleCont.style.pointerEvents = "auto";
            }
            obsList.innerHTML = '';
            metal.observations.forEach(t => {
                const li = document.createElement('li');
                li.innerText = t;
                obsList.appendChild(li);
            });
            chemicalEqDiv.innerHTML = metal.equation;
            wordEqDiv.innerHTML = metal.wordEquation;

            const el = document.createElement('div');
            el.id = 'metal-piece';
            el.className = 'absolute z-30 shadow-md border border-white/20 transition-[border-radius] duration-1000';
            let size = 30;
            let posX = troughElement.offsetWidth / 2 - size/2;
            let posY = -50; 
            const surfaceTopPct = 30;
            const surfaceY = (troughElement.offsetHeight * surfaceTopPct) / 100;
            const floorY = troughElement.offsetHeight - 4;
            el.style.width = size + 'px'; el.style.height = size + 'px';
            el.style.backgroundColor = metal.color;
            el.style.left = posX + 'px'; el.style.top = posY + 'px';
            simArea.appendChild(el);

            let reacting = false;
            let angle = Math.random() * Math.PI * 2;
            let melted = false;
            let grounded = false;

            reactionInterval = setInterval(() => {
                if (!reacting) {
                    let target = metal.behavior === 'float' ? surfaceY - (size/2) : surfaceY;
                    if (posY < target) posY += 8;
                    else { posY = target; reacting = true; isSolutionAlkaline = true; playHiss(true, type); }
                } else {
                    size -= metal.shrinkSpeed;
                    if (!melted && type !== 'calcium' && size < 28) {
                        melted = true;
                        el.style.borderRadius = '50%';
                        el.style.boxShadow = 'inset -3px -3px 8px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.7)';
                    }
                    if (type === 'potassium' && size <= 12) {
                        playExplosion(posX + size/2, posY + size/2, metal.flameColor);
                        clearInterval(reactionInterval); el.remove(); playHiss(false); return;
                    }
                    if (size <= 4) { clearInterval(reactionInterval); el.remove(); playHiss(false); return; }

                    if (metal.behavior === 'float') {
                        posY = surfaceY - (size * 0.7);
                        posX += Math.cos(angle) * metal.moveSpeed;
                        if (Math.random() > 0.9) angle = Math.random() * Math.PI * 2;
                        const L = 10;
                        const R = troughElement.offsetWidth - size - 10;
                        if (posX < L || posX > R) angle += Math.PI;
                        posX = Math.max(L, Math.min(R, posX));
                        createFlame(posX + size/2, posY + size/2, metal.flameColor, type === 'potassium' ? 1.5 : 1);
                        if (Math.random() < metal.bubbleProb) createBubble(posX + size/2, posY + size);
                    } else {
                        if (!grounded) {
                            if (posY < floorY - size) posY += 6;
                            else { posY = floorY - size; grounded = true; }
                        } else posY = floorY - size;
                        if (Math.random() < metal.bubbleProb) createBubble(posX + Math.random() * size, posY);
                    }
                }
                el.style.width = size + 'px'; el.style.height = size + 'px';
                el.style.left = posX + 'px'; el.style.top = posY + 'px';
                checkLitmusSubmersion();
            }, 40);
        }
    </script>
</body>
</html>
