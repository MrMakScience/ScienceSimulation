<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ionic Compound Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0f172a; color: white; }
        
        /* Layout Structure */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Desktop specific layout override */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            #canvas-container { flex: 1; order: 2; height: 100vh !important; }
            .ui-sidebar { width: 340px; order: 1; height: 100vh; overflow-y: auto; position: relative; z-index: 50; }
            #mobile-key { display: none; }
            #desktop-lang-toggle { display: block; }
        }

        /* Mobile specific layout: Key at Top, Crystal in Middle, Panel at Bottom */
        @media (max-width: 767px) {
            .app-container { overflow-y: auto; height: auto; min-height: 100vh; }
            #mobile-key { order: 1; width: 100%; padding: 12px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 60; }
            #canvas-container { width: 100%; height: 50vh !important; order: 2; flex-shrink: 0; }
            .ui-sidebar { width: 100%; order: 3; padding: 16px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.1); }
            #desktop-info-panel { display: none; }
            #desktop-lang-toggle { display: none; }
        }

        #canvas-container { cursor: move; background: #0f172a; touch-action: none; position: relative; }
        
        .ui-card { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .disabled-ui { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        
        @keyframes pulse-border {
            0% { border-color: rgba(96, 165, 250, 0.4); box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.2); }
            50% { border-color: rgba(96, 165, 250, 1); box-shadow: 0 0 8px 2px rgba(96, 165, 250, 0.4); }
            100% { border-color: rgba(96, 165, 250, 0.4); box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.2); }
        }
        .instruction-highlight {
            animation: pulse-border 2s infinite;
        }

        .lang-btn {
            display: flex;
            items-center: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <!-- Desktop Lang Toggle (Absolute position over canvas) -->
    <div id="desktop-lang-toggle" class="fixed top-4 right-4 z-[100]">
        <button onclick="toggleLanguage()" class="lang-btn border border-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span id="lang-text-desktop">中文</span>
        </button>
    </div>

    <div class="app-container">
        <!-- Mobile Key (Top on phone only) -->
        <header id="mobile-key">
            <div class="flex flex-col gap-2">
                <div class="flex justify-around items-center bg-slate-800/50 rounded-lg py-2 px-4 border border-slate-700">
                    <div class="flex items-center">
                        <span id="m-ion-color-1" class="legend-dot bg-green-400"></span>
                        <span id="m-ion-label-1" class="text-xs font-medium">Cl⁻</span>
                    </div>
                    <div class="flex items-center">
                        <span id="m-ion-color-2" class="legend-dot bg-slate-300"></span>
                        <span id="m-ion-label-2" class="text-xs font-medium">Na⁺</span>
                    </div>
                </div>
                <!-- Mobile Lang Toggle (Below key) -->
                <div class="flex justify-end">
                    <button onclick="toggleLanguage()" class="lang-btn border border-slate-700">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        <span id="lang-text-mobile">中文</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 3D Canvas Container -->
        <main id="canvas-container"></main>

        <!-- Control Panel -->
        <aside class="ui-sidebar p-4 md:p-6">
            <div class="ui-card p-5 md:p-6 rounded-xl shadow-2xl h-full">
                <div class="mb-4">
                    <h1 id="ui-main-title" class="text-xl font-bold">3D Ionic Compound Simulator</h1>
                    <p id="ui-main-subtitle" class="text-xs text-slate-400 mt-1">Explore the arrangement of ions in ionic solids.</p>
                </div>
                
                <!-- Interaction Instructions -->
                <div class="flex flex-col gap-2 mb-6">
                    <div class="flex items-center gap-2 px-3 py-2 bg-blue-500/10 rounded-lg border border-blue-400/50 w-full instruction-highlight">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="m15 15 6 6m-6-6 6-6m-6 6-6 6m6-6-6-6"/></svg>
                        <span id="ui-instr-rotate" class="text-[11px] font-black uppercase tracking-widest text-blue-100">Drag Crystal to Rotate</span>
                    </div>
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-slate-800/50 rounded-lg border border-slate-700 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        <span id="ui-instr-zoom" class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Pinch or Scroll on Crystal to Zoom</span>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <div>
                        <label id="ui-label-structure" class="text-xs font-semibold uppercase text-slate-400 block mb-2">Structure</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-nacl" class="bg-blue-600 hover:bg-blue-500 py-2 px-3 rounded text-sm font-medium transition-colors border border-blue-400">NaCl</button>
                            <button id="btn-cscl" class="bg-slate-700 hover:bg-slate-600 py-2 px-3 rounded text-sm font-medium transition-colors border border-transparent">CsCl</button>
                        </div>
                    </div>

                    <div>
                        <label id="ui-label-view" class="text-xs font-semibold uppercase text-slate-400 block mb-2">Display Mode</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-unit" class="bg-blue-600 hover:bg-blue-500 py-2 px-3 rounded text-sm font-medium transition-colors border border-blue-400">Unit Cell</button>
                            <button id="btn-lattice" class="bg-slate-700 hover:bg-slate-600 py-2 px-3 rounded text-sm font-medium transition-colors border border-transparent">Lattice (3x3)</button>
                        </div>
                    </div>

                    <div>
                        <label id="ui-label-analysis" class="text-xs font-semibold uppercase text-slate-400 block mb-2">Analysis Tools</label>
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="check-sticks" checked class="w-5 h-5 rounded bg-slate-700 border-slate-600 text-blue-600">
                                <label for="check-sticks" id="ui-label-sticks" class="text-sm text-slate-300">Show Sticks</label>
                            </div>
                            <div id="ratio-mode-container" class="flex items-center gap-2 transition-all duration-300">
                                <input type="checkbox" id="check-ratio" class="w-5 h-5 rounded bg-slate-700 border-slate-600 text-blue-600">
                                <label for="check-ratio" id="ui-label-ratio" class="text-sm text-orange-300 font-bold">Unit Cell Ratio Mode</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="ratio-panel" class="hidden mt-6 pt-4 border-t border-orange-500/30">
                    <h3 id="ui-ratio-title" class="text-sm font-bold text-orange-400 mb-2">Atom Count Calculation</h3>
                    <div id="ratio-details" class="text-[11px] leading-relaxed font-mono text-slate-200"></div>
                </div>

                <div id="desktop-info-panel" class="mt-6 pt-4 border-t border-slate-700">
                    <h3 class="text-sm font-semibold mb-2" id="struct-title">Sodium Chloride (NaCl)</h3>
                    <div class="space-y-2 text-xs text-slate-300 mb-4">
                        <div class="flex items-center">
                            <span id="ion-color-1" class="legend-dot bg-green-400"></span>
                            <span id="ion-label-1">Cl⁻ (Chloride)</span>
                        </div>
                        <div class="flex items-center">
                            <span id="ion-color-2" class="legend-dot bg-slate-300"></span>
                            <span id="ion-label-2">Na⁺ (Sodium)</span>
                        </div>
                    </div>
                    <p class="text-[11px] italic text-slate-400 leading-relaxed" id="struct-desc"></p>
                </div>

                <div id="mobile-desc-only" class="md:hidden mt-6 pt-4 border-t border-slate-700">
                    <h3 class="text-sm font-semibold mb-2" id="m-struct-title">Sodium Chloride (NaCl)</h3>
                    <p class="text-[11px] italic text-slate-400 leading-relaxed" id="m-struct-desc"></p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let scene, camera, renderer, crystalGroup;
        let currentStructure = 'NaCl';
        let viewMode = 'unit'; 
        let showSticks = true;
        let ratioMode = false;
        let currentLang = 'en';
        
        let baseClippingPlanes = [];
        let activeClippingPlanes = [];

        const COLORS = {
            Na: 0xe5e7eb,   
            Cl: 0x4ade80,   
            Cs: 0x60a5fa,   
            stick: 0x94a3b8 
        };

        const TRANSLATIONS = {
            en: {
                mainTitle: "3D Ionic Compound Simulator",
                mainSubtitle: "Explore the arrangement of ions in ionic solids.",
                instrRotate: "Drag Crystal to Rotate",
                instrZoom: "Pinch or Scroll on Crystal to Zoom",
                labelStructure: "Structure",
                labelView: "Display Mode",
                labelAnalysis: "Analysis Tools",
                labelSticks: "Show Sticks",
                labelRatio: "Unit Cell Ratio Mode",
                ratioTitle: "Atom Count Calculation",
                btnUnit: "Unit Cell",
                btnLattice: "Lattice (3x3)",
                langBtn: "中文",
                NaCl: {
                    title: "Sodium Chloride (NaCl)",
                    desc: "FCC arrangement. Ions at corners (1/8), faces (1/2), edges (1/4), and center (1).",
                    ion1: "Cl⁻ (Chloride)",
                    ion2: "Na⁺ (Sodium)",
                    ratioHtml: `
                        <b class="text-green-400">Cl⁻ (Green):</b><br>
                        - 4 corners × 1/8 = 1/2<br>
                        Total Cl⁻ = 1/2<br><br>
                        <b class="text-slate-300">Na⁺ (White):</b><br>
                        - 4 corners × 1/8 = 1/2<br>
                        Total Na⁺ = 1/2<br><br>
                        <span class="text-orange-400">Ratio = 1:1</span>
                    `
                },
                CsCl: {
                    title: "Caesium Chloride (CsCl)",
                    desc: "Simple cubic with Cs⁺ at center (1) and Cl⁻ at corners (1/8).",
                    ion1: "Cl⁻ (Chloride)",
                    ion2: "Cs⁺ (Caesium)",
                    ratioHtml: `
                        <b class="text-green-400">Cl⁻ (Green):</b><br>
                        - 8 corners × 1/8 = 1<br>
                        Total Cl⁻ = 1<br><br>
                        <b class="text-blue-400">Cs⁺ (Blue):</b><br>
                        - 1 center × 1 = 1<br>
                        Total Cs⁺ = 1<br><br>
                        <span class="text-orange-400">Ratio = 1:1</span>
                    `
                }
            },
            zh: {
                mainTitle: "3D 離子化合物模擬器",
                mainSubtitle: "探索離子固體中離子的排列方式。",
                instrRotate: "拖動晶體以旋轉",
                instrZoom: "捏合或滾動以縮放",
                labelStructure: "結構",
                labelView: "顯示模式",
                labelAnalysis: "分析工具",
                labelSticks: "顯示連接棍",
                labelRatio: "晶胞比例模式",
                ratioTitle: "原子計數計算",
                btnUnit: "晶胞",
                btnLattice: "晶格 (3x3)",
                langBtn: "English",
                NaCl: {
                    title: "氯化鈉 (NaCl)",
                    desc: "面心立方排列。離子位於頂角 (1/8)、面心 (1/2)、棱邊 (1/4) 和中心 (1)。",
                    ion1: "Cl⁻ (氯離子)",
                    ion2: "Na⁺ (鈉離子)",
                    ratioHtml: `
                        <b class="text-green-400">Cl⁻ (綠色):</b><br>
                        - 4 個頂角 × 1/8 = 1/2<br>
                        Cl⁻ 總計 = 1/2<br><br>
                        <b class="text-slate-300">Na⁺ (白色):</b><br>
                        - 4 個頂角 × 1/8 = 1/2<br>
                        Na⁺ 總計 = 1/2<br><br>
                        <span class="text-orange-400">比例 = 1:1</span>
                    `
                },
                CsCl: {
                    title: "氯化銫 (CsCl)",
                    desc: "簡單立方結構，Cs⁺ 位於中心 (1)，Cl⁻ 位於頂角 (1/8)。",
                    ion1: "Cl⁻ (氯離子)",
                    ion2: "Cs⁺ (銫離子)",
                    ratioHtml: `
                        <b class="text-green-400">Cl⁻ (綠色):</b><br>
                        - 8 個頂角 × 1/8 = 1<br>
                        Cl⁻ 總計 = 1<br><br>
                        <b class="text-blue-400">Cs⁺ (藍色):</b><br>
                        - 1 個中心 × 1 = 1<br>
                        Cs⁺ 總計 = 1<br><br>
                        <span class="text-orange-400">比例 = 1:1</span>
                    `
                }
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateUI();
        }

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 10, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.localClippingEnabled = true; 
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const d1 = new THREE.DirectionalLight(0xffffff, 0.6);
            d1.position.set(10, 15, 10);
            scene.add(d1);

            crystalGroup = new THREE.Group();
            scene.add(crystalGroup);

            // Interaction state
            let isDragging = false;
            let prevCoords = { x: 0, y: 0 };
            let initialPinchDistance = null;

            const handleStart = (x, y) => {
                isDragging = true;
                prevCoords = { x, y };
            };

            const handleMove = (x, y) => {
                if (!isDragging) return;
                const dx = x - prevCoords.x;
                const dy = y - prevCoords.y;
                
                const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(dy * 0.005, dx * 0.005, 0, 'XYZ'));
                crystalGroup.quaternion.multiplyQuaternions(q, crystalGroup.quaternion);
                
                prevCoords = { x, y };
            };

            const handleEnd = () => {
                isDragging = false;
                initialPinchDistance = null;
            };

            const applyZoom = (delta) => {
                camera.position.multiplyScalar(1 + delta);
                const dist = camera.position.length();
                if (dist < 3) camera.position.setLength(3);
                if (dist > 50) camera.position.setLength(50);
                camera.lookAt(0, 0, 0);
            };

            // Canvas Interaction Handlers
            container.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', handleEnd);

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    handleStart(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging && !initialPinchDistance) return;
                
                if (e.touches.length === 1 && isDragging) {
                    e.preventDefault(); 
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2 && initialPinchDistance) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const currentDistance = Math.sqrt(dx * dx + dy * dy);
                    const delta = (initialPinchDistance - currentDistance) * 0.005;
                    applyZoom(delta);
                    initialPinchDistance = currentDistance;
                }
            }, { passive: false });

            window.addEventListener('touchend', handleEnd);

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                applyZoom(e.deltaY * 0.001);
            }, { passive: false });

            window.addEventListener('resize', onWindowResize);
            createStructure();
            updateUI();
            animate();
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function createSolidClippedSphere(color, radius, x, y, z) {
            const atomGroup = new THREE.Group();
            atomGroup.position.set(x, y, z);
            
            const shellGeom = new THREE.SphereGeometry(radius, 64, 32);
            const shellMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                clippingPlanes: activeClippingPlanes,
                clipShadows: true
            });
            const shell = new THREE.Mesh(shellGeom, shellMat);
            atomGroup.add(shell);

            if (ratioMode) {
                const spacing = 4.0;
                const b = spacing / 2;
                const planeConfigs = [
                    { n: new THREE.Vector3(-1, 0, 0), c: b },
                    { n: new THREE.Vector3(1, 0, 0),  c: b },
                    { n: new THREE.Vector3(0, -1, 0), c: b },
                    { n: new THREE.Vector3(0, 1, 0),  c: b },
                    { n: new THREE.Vector3(0, 0, -1), c: b },
                    { n: new THREE.Vector3(0, 0, 1),  c: b }
                ];

                planeConfigs.forEach((config) => {
                    const dist = config.n.x * x + config.n.y * y + config.n.z * z + config.c;
                    if (Math.abs(dist) < radius) {
                        const capRadius = Math.sqrt(radius * radius - dist * dist);
                        const capGeom = new THREE.CircleGeometry(capRadius, 64);
                        const capMat = new THREE.MeshPhongMaterial({ 
                            color: color, 
                            side: THREE.DoubleSide,
                            clippingPlanes: activeClippingPlanes 
                        });
                        const cap = new THREE.Mesh(capGeom, capMat);
                        cap.position.copy(config.n).multiplyScalar(-dist);
                        cap.lookAt(cap.position.clone().add(config.n));
                        atomGroup.add(cap);
                    }
                });
            }
            return atomGroup;
        }

        function createStick(p1, p2) {
            const distance = p1.distanceTo(p2);
            const position = p2.clone().add(p1).divideScalar(2);
            const material = new THREE.MeshPhongMaterial({ 
                color: COLORS.stick, 
                transparent: true, 
                opacity: ratioMode ? 0.2 : 1.0 
            });
            const geometry = new THREE.CylinderGeometry(0.08, 0.08, distance, 8);
            const stick = new THREE.Mesh(geometry, material);
            stick.position.copy(position);
            stick.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
            return stick;
        }

        function setupPlanes(spacing) {
            baseClippingPlanes = [];
            activeClippingPlanes = [];
            if (!ratioMode) return;

            const b = spacing / 2;
            const normals = [
                new THREE.Vector3(-1, 0, 0), new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0, 1)
            ];

            normals.forEach(n => {
                const plane = new THREE.Plane(n, b);
                baseClippingPlanes.push(plane);
                activeClippingPlanes.push(plane.clone());
            });
        }

        function createStructure() {
            while(crystalGroup.children.length > 0) crystalGroup.remove(crystalGroup.children[0]);

            const spacing = 4.0; 
            setupPlanes(spacing);

            const range = viewMode === 'unit' ? 1 : 2;
            const offset = -(range * spacing) / 2;

            if (currentStructure === 'NaCl') {
                for (let x = 0; x <= range; x++) {
                    for (let y = 0; y <= range; y++) {
                        for (let z = 0; z <= range; z++) {
                            const pX = x * spacing + offset;
                            const pY = y * spacing + offset;
                            const pZ = z * spacing + offset;
                            const isNa = (x + y + z) % 2 !== 0;

                            if (ratioMode && (x > 1 || y > 1 || z > 1)) continue;

                            crystalGroup.add(createSolidClippedSphere(
                                isNa ? COLORS.Na : COLORS.Cl, 
                                isNa ? 0.52 : 0.75, 
                                pX, pY, pZ
                            ));

                            if (showSticks) {
                                const p1 = new THREE.Vector3(pX, pY, pZ);
                                if (x < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX + spacing, pY, pZ)));
                                if (y < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY + spacing, pZ)));
                                if (z < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY, pZ + spacing)));
                            }
                        }
                    }
                }
            } else {
                for (let x = 0; x <= range; x++) {
                    for (let y = 0; y <= range; y++) {
                        for (let z = 0; z <= range; z++) {
                            const pX = x * spacing + offset;
                            const pY = y * spacing + offset;
                            const pZ = z * spacing + offset;

                            if (ratioMode && (x > 1 || y > 1 || z > 1)) continue;

                            crystalGroup.add(createSolidClippedSphere(COLORS.Cl, 0.75, pX, pY, pZ));
                            
                            if (showSticks) {
                                const p1 = new THREE.Vector3(pX, pY, pZ);
                                if (x < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX + spacing, pY, pZ)));
                                if (y < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY + spacing, pZ)));
                                if (z < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY, pZ + spacing)));
                            }

                            if (x < range && y < range && z < range) {
                                const midX = pX + spacing/2;
                                const midY = pY + spacing/2;
                                const midZ = pZ + spacing/2;
                                crystalGroup.add(createSolidClippedSphere(COLORS.Cs, 0.65, midX, midY, midZ));
                                
                                if (showSticks) {
                                    const pMid = new THREE.Vector3(midX, midY, midZ);
                                    for(let dx=0; dx<=1; dx++) for(let dy=0; dy<=1; dy++) for(let dz=0; dz<=1; dz++) {
                                        crystalGroup.add(createStick(pMid, new THREE.Vector3(pX+dx*spacing, pY+dy*spacing, pZ+dz*spacing)));
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function updateUI() {
            const t = TRANSLATIONS[currentLang];
            const data = t[currentStructure];

            // Global UI text
            document.getElementById('ui-main-title').innerText = t.mainTitle;
            document.getElementById('ui-main-subtitle').innerText = t.mainSubtitle;
            document.getElementById('ui-instr-rotate').innerText = t.instrRotate;
            document.getElementById('ui-instr-zoom').innerText = t.instrZoom;
            document.getElementById('ui-label-structure').innerText = t.labelStructure;
            document.getElementById('ui-label-view').innerText = t.labelView;
            document.getElementById('ui-label-analysis').innerText = t.labelAnalysis;
            document.getElementById('ui-label-sticks').innerText = t.labelSticks;
            document.getElementById('ui-label-ratio').innerText = t.labelRatio;
            document.getElementById('ui-ratio-title').innerText = t.ratioTitle;
            document.getElementById('btn-unit').innerText = t.btnUnit;
            document.getElementById('btn-lattice').innerText = t.btnLattice;
            document.getElementById('lang-text-desktop').innerText = t.langBtn;
            document.getElementById('lang-text-mobile').innerText = t.langBtn;

            // Desktop panel info
            document.getElementById('struct-title').innerText = data.title;
            document.getElementById('struct-desc').innerText = data.desc;
            document.getElementById('ion-label-1').innerText = data.ion1;
            document.getElementById('ion-label-2').innerText = data.ion2;
            document.getElementById('ion-color-1').className = 'legend-dot ' + (currentStructure === 'NaCl' ? 'bg-green-400' : 'bg-green-400');
            document.getElementById('ion-color-2').className = 'legend-dot ' + (currentStructure === 'NaCl' ? 'bg-slate-300' : 'bg-blue-400');

            // Mobile specific updates
            document.getElementById('m-struct-title').innerText = data.title;
            document.getElementById('m-struct-desc').innerText = data.desc;
            document.getElementById('m-ion-label-1').innerText = data.ion1.split(' ')[0];
            document.getElementById('m-ion-label-2').innerText = data.ion2.split(' ')[0];
            document.getElementById('m-ion-color-1').className = 'legend-dot ' + (currentStructure === 'NaCl' ? 'bg-green-400' : 'bg-green-400');
            document.getElementById('m-ion-color-2').className = 'legend-dot ' + (currentStructure === 'NaCl' ? 'bg-slate-300' : 'bg-blue-400');

            document.getElementById('ratio-details').innerHTML = data.ratioHtml;

            document.getElementById('ratio-panel').classList.toggle('hidden', !ratioMode);
            document.getElementById('desktop-info-panel').classList.toggle('hidden', ratioMode);
            document.getElementById('mobile-desc-only').classList.toggle('hidden', ratioMode);

            const ratioContainer = document.getElementById('ratio-mode-container');
            const ratioCheckbox = document.getElementById('check-ratio');
            
            if (viewMode === 'lattice') {
                ratioContainer.classList.add('disabled-ui');
                ratioCheckbox.disabled = true;
            } else {
                ratioContainer.classList.remove('disabled-ui');
                ratioCheckbox.disabled = false;
            }

            ['btn-nacl', 'btn-cscl', 'btn-unit', 'btn-lattice'].forEach(id => {
                const b = document.getElementById(id);
                if(b) {
                    b.classList.remove('bg-blue-600', 'border-blue-400');
                    b.classList.add('bg-slate-700', 'border-transparent');
                }
            });
            
            document.getElementById(currentStructure === 'NaCl' ? 'btn-nacl' : 'btn-cscl').classList.replace('bg-slate-700', 'bg-blue-600');
            document.getElementById(viewMode === 'unit' ? 'btn-unit' : 'btn-lattice').classList.replace('bg-slate-700', 'bg-blue-600');
        }

        function animate() {
            requestAnimationFrame(animate);
            if (ratioMode) {
                crystalGroup.updateMatrixWorld();
                for (let i = 0; i < baseClippingPlanes.length; i++) {
                    activeClippingPlanes[i].copy(baseClippingPlanes[i]).applyMatrix4(crystalGroup.matrixWorld);
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-nacl').onclick = () => { currentStructure = 'NaCl'; createStructure(); updateUI(); };
        document.getElementById('btn-cscl').onclick = () => { currentStructure = 'CsCl'; createStructure(); updateUI(); };
        document.getElementById('btn-unit').onclick = () => { viewMode = 'unit'; createStructure(); updateUI(); };
        document.getElementById('btn-lattice').onclick = () => { 
            viewMode = 'lattice'; 
            ratioMode = false;
            document.getElementById('check-ratio').checked = false;
            createStructure(); 
            updateUI(); 
        };
        document.getElementById('check-sticks').onchange = (e) => { showSticks = e.target.checked; createStructure(); };
        document.getElementById('check-ratio').onchange = (e) => { ratioMode = e.target.checked; createStructure(); updateUI(); };

        window.onload = init;
    </script>
</body>
</html>
