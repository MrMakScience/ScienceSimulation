<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Bond Formation Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lowercase-label { text-transform: none !important; }
        .electron { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .orbit {
            border: 1px dashed rgba(156, 163, 175, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .preference-label { 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); 
            z-index: 100;
        }
        
        .ion-bracket {
            position: absolute;
            top: -10px;
            bottom: -10px;
            width: 15px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        .bracket-visible { opacity: 1; }
        /* Spacing set to -35px to avoid electron obstruction in Period 3 atoms */
        .bracket-left { left: -35px; border-right: 0; }
        .bracket-right { right: -35px; border-left: 0; }
        
        .charge-display {
            position: absolute;
            top: -10px;
            right: -28px;
            font-weight: 900;
            font-size: 1rem;
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-2 md:p-8">

    <div class="max-w-4xl w-full bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <div class="bg-slate-700 p-4 md:p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div>
                    <h1 id="main-title" class="text-xl md:text-2xl font-bold text-blue-400">Ionic Bond Simulator</h1>
                    <p id="main-subtitle" class="text-slate-300 text-xs md:text-sm">Understanding Electron Transfer</p>
                </div>
                
                <!-- Updated Language Toggle Panel -->
                <button onclick="toggleLanguage()" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800/80 hover:bg-slate-600 transition-all border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.15)] group" title="Switch Language / 切換語言">
                    <div class="p-1 rounded-full bg-blue-600/20 group-hover:bg-blue-600/40 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <span id="lang-label" class="text-xs font-bold uppercase tracking-wider text-slate-300 group-hover:text-white">EN</span>
                </button>
            </div>
            
            <div class="flex gap-1 md:gap-2" id="example-selector">
                <button onclick="selectExample('LiS')" id="btn-LiS" class="px-3 py-1.5 md:px-4 md:py-2 rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors text-xs md:text-sm font-medium">Li + S</button>
                <button onclick="selectExample('AlO')" id="btn-AlO" class="px-3 py-1.5 md:px-4 md:py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors text-xs md:text-sm font-medium">Al + O</button>
                <button onclick="selectExample('NaCl')" id="btn-NaCl" class="px-3 py-1.5 md:px-4 md:py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors text-xs md:text-sm font-medium">Na + Cl</button>
            </div>
        </div>

        <div class="relative h-[400px] w-full bg-slate-900 flex items-center justify-center overflow-hidden" id="stage"></div>

        <div class="p-4 md:p-6 bg-slate-800 border-t border-slate-700">
            <div id="instruction-box" class="mb-4 md:mb-6 min-h-[100px]">
                <h2 id="step-title" class="text-lg md:text-xl font-semibold text-yellow-400 mb-2">Step 1: Individual Atoms</h2>
                <p id="step-text" class="text-sm md:text-base text-slate-200"></p>
                <p id="step-note" class="text-xs md:text-sm text-blue-300 mt-2 italic font-medium"></p>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span id="progress-label" class="hidden xs:inline text-[10px] text-slate-400 uppercase tracking-widest">Progress</span>
                    <div class="flex gap-1" id="progress-dots">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-500"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                    </div>
                </div>
                
                <div class="flex gap-2 md:gap-4">
                    <button id="prev-btn" onclick="prevStep()" class="hidden px-4 py-2 md:px-6 md:py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-all flex items-center gap-2 text-sm">
                        <span id="prev-text">← Back</span>
                    </button>
                    <button id="next-btn" onclick="nextStep()" class="px-5 py-2 md:px-8 md:py-3 rounded-xl bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all font-bold flex items-center gap-2 text-sm">
                        <span id="next-text">Next Step</span><span class="text-lg">→</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Ionic Bond Simulator",
                subtitle: "Understanding Electron Transfer",
                langLabel: "EN",
                progress: "Progress",
                back: "← Back",
                next: "Next Step →",
                restart: "Restart ⟳",
                steps: ["Step 1: Individual Atoms", "Step 2: Identifying electron gain/lose", "Step 3: Transfer & Ion Formation"],
                metalNames: { Lithium: "Lithium", Aluminum: "Aluminum", Sodium: "Sodium" },
                nonMetalNames: { Sulfur: "Sulfur", Oxygen: "Oxygen", Chlorine: "Chlorine" },
                prefLose: "lose",
                prefGain: "gain",
                note2: "Metals lose electrons to form cations; Non-metals gain to form anions.",
                step1: (m, nm) => `Atoms of ${m} and ${nm} are unstable. They react to achieve a stable noble gas electronic arrangement.`,
                step2: (m, nm) => `${m} loses outermost shell electrons, while ${nm} gains them to fill its outermost shell.`,
                step3: (mCount, mName, mPlural, mVal, ePlural, nmCount, nmName, nmPlural) => `Ionic bond is formed when ${mCount} ${mName} ${mPlural} each transfer ${mVal} ${ePlural} to ${nmCount} ${nmName} ${nmPlural}, which forms ${mName} ions and ${nmName} ions with stable electronic arrangement of noble gas atoms.`
            },
            zh: {
                title: "離子鍵的形成",
                subtitle: "理解電子轉移過程",
                langLabel: "中文",
                progress: "進度",
                back: "← 返回",
                next: "下一步 →",
                restart: "重新開始 ⟳",
                steps: ["步驟 1: 獨立原子", "步驟 2: 確定電子得失傾向", "步驟 3: 電子轉移與離子形成"],
                metalNames: { Lithium: "鋰", Aluminum: "鋁", Sodium: "鈉" },
                nonMetalNames: { Sulfur: "硫", Oxygen: "氧", Chlorine: "氯" },
                prefLose: "失去",
                prefGain: "得到",
                note2: "金屬失去電子形成陽離子；非金屬得到電子形成陰離子。",
                step1: (m, nm) => `${m}和${nm}的原子是不穩定的。它們透過反應來達到穩定的貴氣體原子的電子排佈。`,
                step2: (m, nm) => `${m}會失去最外層電子，而${nm}會得到電子以填滿其最外層。`,
                step3: (mCount, mName, mPlural, mVal, ePlural, nmCount, nmName, nmPlural) => `當 ${mCount} 個${mName}原子各自轉移 ${mVal} 個電子給 ${nmCount} 個${nmName}原子時，便形成了離子鍵。這產生了具有穩定貴氣體電子排佈的${mName}離子和${nmName}離子。`
            }
        };

        let currentLang = 'en';
        let currentExample = 'LiS';
        let currentStep = 1;

        const config = {
            LiS: { metal: { name: 'Lithium', symbol: 'Li', electrons: [2, 1], color: '#60a5fa', count: 2 }, nonMetal: { name: 'Sulfur', symbol: 'S', electrons: [2, 8, 6], color: '#facc15', count: 1 }, formula: 'Li₂S' },
            AlO: { metal: { name: 'Aluminum', symbol: 'Al', electrons: [2, 8, 3], color: '#94a3b8', count: 2 }, nonMetal: { name: 'Oxygen', symbol: 'O', electrons: [2, 6], color: '#f87171', count: 3 }, formula: 'Al₂O₃' },
            NaCl: { metal: { name: 'Sodium', symbol: 'Na', electrons: [2, 8, 1], color: '#fb923c', count: 1 }, nonMetal: { name: 'Chlorine', symbol: 'Cl', electrons: [2, 8, 7], color: '#4ade80', count: 1 }, formula: 'NaCl' }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            updateUIStrings();
            render();
        }

        function updateUIStrings() {
            const t = translations[currentLang];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-subtitle').innerText = t.subtitle;
            document.getElementById('lang-label').innerText = t.langLabel;
            document.getElementById('progress-label').innerText = t.progress;
            document.getElementById('prev-text').innerText = t.back;
        }

        function selectExample(key) {
            currentExample = key; currentStep = 1;
            ['LiS', 'AlO', 'NaCl'].forEach(k => {
                const btn = document.getElementById(`btn-${k}`);
                btn.className = k === key ? "px-3 py-1.5 md:px-4 md:py-2 rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors text-xs md:text-sm font-medium" : "px-3 py-1.5 md:px-4 md:py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors text-xs md:text-sm font-medium";
            });
            render();
        }

        function nextStep() { if (currentStep < 3) currentStep++; else currentStep = 1; render(); }
        function prevStep() { if (currentStep > 1) { currentStep--; render(); } }

        function render() {
            const stage = document.getElementById('stage');
            const data = config[currentExample];
            const t = translations[currentLang];
            const dots = document.getElementById('progress-dots').children;
            for(let i=0; i<3; i++) dots[i].className = `w-2.5 h-2.5 rounded-full ${i < currentStep ? 'bg-blue-500' : 'bg-slate-600'}`;

            stage.innerHTML = '';
            document.getElementById('prev-btn').classList.toggle('hidden', currentStep === 1);
            document.getElementById('next-text').innerText = currentStep === 3 ? t.restart : t.next;
            
            const stepTitle = document.getElementById('step-title');
            const stepText = document.getElementById('step-text');
            const stepNote = document.getElementById('step-note');
            stepNote.innerText = "";

            const mName = t.metalNames[data.metal.name];
            const nmName = t.nonMetalNames[data.nonMetal.name];

            if (currentStep === 1) {
                stepTitle.innerText = t.steps[0];
                stepText.innerText = t.step1(mName, nmName);
                drawAtoms(stage, data, false, false);
            } else if (currentStep === 2) {
                stepTitle.innerText = t.steps[1];
                stepText.innerText = t.step2(mName, nmName);
                stepNote.innerText = t.note2;
                drawAtoms(stage, data, true, false);
            } else {
                stepTitle.innerText = t.steps[2];
                const mVal = data.metal.electrons[data.metal.electrons.length - 1];
                const mPlural = currentLang === 'en' ? (data.metal.count > 1 ? "atoms" : "atom") : "";
                const nmPlural = currentLang === 'en' ? (data.nonMetal.count > 1 ? "atoms" : "atom") : "";
                const ePlural = currentLang === 'en' ? (mVal > 1 ? "electrons" : "electron") : "";
                
                stepText.innerText = t.step3(data.metal.count, mName, mPlural, mVal, ePlural, data.nonMetal.count, nmName, nmPlural);
                drawAtoms(stage, data, true, true);
            }
        }

        function drawAtoms(container, data, showPreferences, animateTransfer) {
            const metalBox = document.createElement('div');
            metalBox.className = "flex flex-col gap-2 md:gap-4 items-center justify-center w-1/2 h-full border-r border-slate-800 p-1 md:p-2 relative";
            const nonMetalBox = document.createElement('div');
            nonMetalBox.className = "flex flex-col gap-2 md:gap-4 items-center justify-center w-1/2 h-full p-1 md:p-2 relative";

            const metalAtoms = [];
            const nonMetalAtoms = [];

            for (let i = 0; i < (animateTransfer ? data.metal.count : 1); i++) {
                const el = createAtomUI(data.metal, 'metal', showPreferences, animateTransfer);
                metalBox.appendChild(el);
                metalAtoms.push(el);
            }
            for (let i = 0; i < (animateTransfer ? data.nonMetal.count : 1); i++) {
                const el = createAtomUI(data.nonMetal, 'nonmetal', showPreferences, animateTransfer);
                nonMetalBox.appendChild(el);
                nonMetalAtoms.push(el);
            }

            container.appendChild(metalBox);
            container.appendChild(nonMetalBox);

            if (animateTransfer) {
                let nMIdx = 0, slotsUsed = 0;
                const neededPerNM = 8 - data.nonMetal.electrons[data.nonMetal.electrons.length - 1];
                metalAtoms.forEach((mAtom, mI) => {
                    mAtom.querySelectorAll('.valence-electron').forEach((e) => {
                        if (slotsUsed >= neededPerNM) { nMIdx++; slotsUsed = 0; }
                        const targetAtom = nonMetalAtoms[nMIdx];
                        if (!targetAtom) return;
                        const targetSlot = targetAtom.querySelectorAll('.empty-slot')[slotsUsed];
                        if (targetSlot) {
                            const rectFrom = e.getBoundingClientRect();
                            const rectTo = targetSlot.getBoundingClientRect();
                            setTimeout(() => {
                                e.style.transform = `translate(${rectTo.left - rectFrom.left}px, ${rectTo.top - rectFrom.top}px)`;
                                setTimeout(() => { targetSlot.style.opacity = '1'; e.style.opacity = '0'; }, 1200);
                            }, 500 + (mI * 300) + (slotsUsed * 100));
                        }
                        slotsUsed++;
                    });
                });
            }
        }

        function createAtomUI(atomData, type, showPrefs, animate) {
            const wrapper = document.createElement('div');
            wrapper.className = "relative flex items-center justify-center";
            const isMobile = window.innerWidth < 640;
            const availableSpace = isMobile ? (window.innerWidth / 2) - 40 : 200;
            const baseSize = 180;
            let responsiveScale = Math.min(0.9, availableSpace / baseSize);
            
            if (isMobile) {
                if (animate) responsiveScale *= (atomData.count > 1 ? 0.55 : 0.75);
                else responsiveScale *= 0.9;
            } else {
                responsiveScale *= (animate && atomData.count > 1 ? 0.7 : 0.95);
            }
            
            wrapper.style.width = `${baseSize * responsiveScale}px`;
            wrapper.style.height = `${baseSize * responsiveScale}px`;
            wrapper.style.transform = `scale(${responsiveScale})`;

            if (animate) {
                const bL = document.createElement('div'); bL.className = "ion-bracket bracket-left";
                const bR = document.createElement('div'); bR.className = "ion-bracket bracket-right";
                const ch = document.createElement('div'); ch.className = "charge-display";
                const v = atomData.electrons[atomData.electrons.length - 1];
                ch.innerHTML = type === 'metal' ? (v === 1 ? "+" : v+"+") : ((8-v) === 1 ? "&ndash;" : (8-v)+"&ndash;");
                bR.appendChild(ch); wrapper.appendChild(bL); wrapper.appendChild(bR);
                setTimeout(() => { bL.classList.add('bracket-visible'); bR.classList.add('bracket-visible'); }, 1800);
            }

            const core = document.createElement('div');
            core.className = "z-10 w-9 h-9 rounded-full flex items-center justify-center font-bold text-base shadow-lg border-2 border-white/20 absolute";
            core.style.backgroundColor = atomData.color; core.style.top = "50%"; core.style.left = "50%"; core.style.transform = "translate(-50%, -50%)";
            core.innerText = atomData.symbol; wrapper.appendChild(core);

            atomData.electrons.forEach((count, orbitIdx) => {
                const r = 35 + (orbitIdx * 22); 
                const isOuter = orbitIdx === atomData.electrons.length - 1;
                const orbit = document.createElement('div');
                orbit.className = "orbit"; orbit.style.width = `${r * 2}px`; orbit.style.height = `${r * 2}px`;
                if (animate && type === 'metal' && isOuter) { orbit.style.transition = "opacity 0.5s ease 1.2s"; setTimeout(() => orbit.style.opacity = '0', 1200); }
                wrapper.appendChild(orbit);

                for (let e = 0; e < count; e++) {
                    const el = document.createElement('div');
                    el.className = `electron absolute w-2.5 h-2.5 rounded-full z-20 shadow-sm ${isOuter && type === 'metal' ? 'valence-electron' : ''}`;
                    el.style.backgroundColor = isOuter ? '#FFF' : '#cbd5e1';
                    const p = getPos(e, count, r);
                    el.style.left = `calc(50% + ${p.x}px - 5px)`; el.style.top = `calc(50% + ${p.y}px - 5px)`;
                    wrapper.appendChild(el);
                }

                if (animate && type === 'nonmetal' && isOuter) {
                    for (let n = 0; n < (8 - count); n++) {
                        const slot = document.createElement('div');
                        slot.className = "empty-slot absolute w-2.5 h-2.5 rounded-full z-10 opacity-0 bg-blue-400 shadow-[0_0_8px_#60a5fa]";
                        const p = getPos(count + n, 8, r);
                        slot.style.left = `calc(50% + ${p.x}px - 5px)`; slot.style.top = `calc(50% + ${p.y}px - 5px)`;
                        wrapper.appendChild(slot);
                    }
                }
            });

            if (showPrefs && !animate) {
                const lb = document.createElement('div');
                lb.className = "preference-label lowercase-label absolute left-1/2 -translate-x-1/2 whitespace-nowrap px-3 py-1.5 rounded-lg bg-slate-700 text-sm md:text-base font-black border-2 border-white/30 z-[100] transition-all";
                lb.style.bottom = "-55px"; 
                const v = atomData.electrons[atomData.electrons.length - 1];
                const t = translations[currentLang];
                lb.innerHTML = type === 'metal' ? `${t.prefLose} ${v} e-` : `${t.prefGain} ${8-v} e-`;
                lb.classList.add(type === 'metal' ? "text-blue-300" : "text-yellow-300");
                wrapper.appendChild(lb);
            }
            return wrapper;
        }

        function getPos(i, n, r) {
            if (n <= 2) { const a = (i === 0) ? -Math.PI / 2 : Math.PI / 2; return { x: Math.cos(a) * r, y: Math.sin(a) * r }; }
            const pI = Math.floor(i / 2), sP = i % 2 === 1, bA = [ -Math.PI/2, Math.PI/2, 0, Math.PI ];
            let x = Math.cos(bA[pI]) * r, y = Math.sin(bA[pI]) * r;
            const pairOffset = 5.5; 
            if (pI < 2) x += sP ? pairOffset : -pairOffset; else y += sP ? pairOffset : -pairOffset;
            return { x, y };
        }

        window.addEventListener('resize', render);
        window.onload = () => {
            updateUIStrings();
            render();
        };
    </script>
</body>
</html>
