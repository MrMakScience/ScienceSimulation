<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Simulation: Metallic Bonding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Allow scrolling on mobile */
            overflow-y: auto;
            min-height: 100vh;
        }
        canvas {
            background: radial-gradient(circle, #1a252f 0%, #000000 100%);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            height: 400px;
            /* Ensure touch actions inside canvas don't prevent scrolling the page unless intended */
            touch-action: none;
        }
        .hammer-cursor {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0-.83-.83-.83-2.17 0-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="m20.91 11.7-1.25-1.25c-.6-.6-.9-1.4-.8-2.22l.1-1.49c.04-.62-.34-1.18-.93-1.34l-1.47-.4c-.8-.22-1.48-.73-1.9-1.41L13.89 2.3c-.32-.54-.96-.83-1.57-.7l-1.5.31c-.81.17-1.65-.03-2.31-.56L7.33.3c-.47-.38-1.14-.42-1.65-.11L4.35 1.12c-.52.31-.76.92-.58 1.5l.46 1.45c.25.79.2 1.65-.14 2.4l-.62 1.38c-.26.58-.15 1.25.29 1.71l1.06 1.1c.58.6.93 1.39.99 2.22l.1 1.49c.04.62.34-1.18.93-1.34l1.47.4c.8.22-1.48.73-1.9 1.41l.78 1.29c.32.54.96.83-1.57.7l1.5-.31c.81-.17-1.65.03-2.31.56l1.18 1.05c.47.38-1.14.42-1.65.11l1.33-.82c.52-.31.76-.92.58-1.5l-.46-1.45c-.25-.79-.2 1.65.14-2.4l.62-1.38c.26-.58.15-1.25-.29-1.71l-1.06-1.1Z"/></svg>') 16 16, auto;
        }
        .hand-container {
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }
        .pulling .hand-left { transform: translateX(-45px); }
        .pulling .hand-right { transform: translateX(45px); }

        .terminal {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 40px;
            color: transparent;
            transition: all 0.4s ease;
            background: transparent;
            pointer-events: none;
            z-index: 10;
        }
        .terminal-neg { left: 0; }
        .terminal-pos { right: 0; }

        .voltage-on .terminal-neg {
            background: linear-gradient(to right, rgba(231, 76, 60, 0.6), transparent);
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px #e74c3c;
        }
        .voltage-on .terminal-pos {
            background: linear-gradient(to left, rgba(52, 152, 219, 0.6), transparent);
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px #3498db;
        }
        
        .burner {
            position: absolute;
            bottom: -20px;
            width: 100px;
            height: 60px;
            background: radial-gradient(circle at top, #ff5500, transparent 70%);
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .heating-on .burner {
            opacity: 0.8;
            animation: flicker 0.1s infinite alternate;
        }
        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body class="flex flex-col items-center py-8 px-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-6 space-y-6 mb-8">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-slate-800">Metallic Bonding Properties</h1>
            <div class="flex justify-center mt-4 border-b flex-wrap">
                <button id="tabMalleability" class="px-6 py-2 font-bold border-b-4 border-blue-600 text-blue-600 transition-all">Malleability</button>
                <button id="tabDuctility" class="px-6 py-2 font-bold border-b-4 border-transparent text-slate-400 hover:text-slate-600 transition-all">Ductility</button>
                <button id="tabConductivity" class="px-6 py-2 font-bold border-b-4 border-transparent text-slate-400 hover:text-slate-600 transition-all">Electrical Conductivity</button>
                <button id="tabThermal" class="px-6 py-2 font-bold border-b-4 border-transparent text-slate-400 hover:text-slate-600 transition-all">Thermal Conductivity</button>
            </div>
        </header>

        <div id="canvasWrapper" class="relative overflow-hidden rounded-xl bg-black">
            <canvas id="simCanvas"></canvas>
            
            <div id="feedback" class="absolute top-4 right-4 bg-yellow-400 text-black px-3 py-1 rounded-full text-sm font-bold opacity-0 transition-opacity">
                CLANG!
            </div>

            <div id="leftDuctilityAssets" class="absolute top-1/2 -translate-y-1/2 opacity-0 transition-opacity duration-300 pointer-events-none">
                <div class="hand-container hand-left">
                    <svg width="70" height="70" viewBox="0 0 100 100" style="transform: scaleX(-1);">
                        <path d="M30,70 Q25,70 25,65 L25,45 Q25,40 30,40 L35,40 Q35,30 40,30 L45,30 Q45,25 50,25 L55,25 Q55,20 60,20 L65,20 Q70,20 70,25 L70,55 Q70,60 65,65 L45,75 Z" fill="white" stroke="#2c3e50" stroke-width="2"/>
                    </svg>
                </div>
            </div>
            <div id="rightDuctilityAssets" class="absolute top-1/2 -translate-y-1/2 opacity-0 transition-opacity duration-300 pointer-events-none">
                <div class="hand-container hand-right">
                    <svg width="70" height="70" viewBox="0 0 100 100">
                        <path d="M30,70 Q25,70 25,65 L25,45 Q25,40 30,40 L35,40 Q35,30 40,30 L45,30 Q45,25 50,25 L55,25 Q55,20 60,20 L65,20 Q70,20 70,25 L70,55 Q70,60 65,65 L45,75 Z" fill="white" stroke="#2c3e50" stroke-width="2"/>
                    </svg>
                </div>
            </div>

            <div id="terminals" class="hidden opacity-0 transition-opacity duration-300">
                <div class="terminal terminal-neg">&minus;</div>
                <div class="terminal terminal-pos">+</div>
            </div>

            <div id="burner" class="burner"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            <div id="instructionsPanel" class="space-y-4">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h3 id="panelTitle" class="font-bold text-blue-800 flex items-center gap-2">Malleability Simulation</h3>
                    <ul id="panelList" class="text-sm text-blue-700 mt-2 list-disc ml-5">
                        <li><strong>Click</strong> to hammer the metal gently.</li>
                        <li>The ions slide over each other without breaking the non-directional metallic bond.</li>
                        <li>The sea of delocalized electrons moves and forms metallic bond again in the new shape.</li>
                    </ul>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center md:justify-end items-center">
                <button id="actionBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hidden">Pull Metal</button>
                <button id="condBtn" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hidden">Apply Voltage: OFF</button>
                <button id="heatBtn" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hidden">Apply Heat: OFF</button>
                <button id="resetBtn" class="bg-slate-700 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Reset Simulation</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const resetBtn = document.getElementById('resetBtn');
        const actionBtn = document.getElementById('actionBtn');
        const condBtn = document.getElementById('condBtn');
        const heatBtn = document.getElementById('heatBtn');
        const feedback = document.getElementById('feedback');
        const tabMall = document.getElementById('tabMalleability');
        const tabDuct = document.getElementById('tabDuctility');
        const tabCond = document.getElementById('tabConductivity');
        const tabThermal = document.getElementById('tabThermal');
        const panelTitle = document.getElementById('panelTitle');
        const panelList = document.getElementById('panelList');
        const leftAssets = document.getElementById('leftDuctilityAssets');
        const rightAssets = document.getElementById('rightDuctilityAssets');
        const terminals = document.getElementById('terminals');
        const burner = document.getElementById('burner');

        let currentMode = 'malleability'; 
        let width, height;
        let ions = [];
        let electrons = [];
        let isConducting = false;
        let isHeating = false;
        let pullCount = 0;
        
        const ION_RADIUS = 20;
        const COLLISION_RADIUS = 40;
        const SPACING = 50;
        const ELECTRON_RADIUS = 6; 
        const E_PER_ION = 3;

        let audioCtx = null;
        function playClingSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.setValueAtTime(1000, now);
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.5, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);

            const frequencies = [800, 1240, 2030]; 
            frequencies.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.5);
            });
            noise.start(now);
        }

        class Ion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.baseX = x;
                this.baseY = y;
                this.temp = 0; 
            }

            update() {
                if (currentMode === 'conductivity') {
                    this.x = this.baseX;
                    this.y = this.baseY;
                    return;
                }

                if (currentMode === 'thermal') {
                    this.temp *= 0.995;
                    const vib = this.temp * 6;
                    this.x = this.baseX + (Math.random() - 0.5) * vib;
                    this.y = this.baseY + (Math.random() - 0.5) * vib;
                    return; 
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.85; 
                this.vy *= 0.85;

                if (currentMode === 'ductility') {
                    const centerY = height / 2;
                    const neckingIntensity = Math.min(0.02, pullCount * 0.002);
                    this.vy += (centerY - this.y) * neckingIntensity;
                }

                for (let other of ions) {
                    if (other === this) continue;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distSq = dx*dx + dy*dy;
                    const minSq = COLLISION_RADIUS * COLLISION_RADIUS;
                    if (distSq < minSq) {
                        const dist = Math.sqrt(distSq);
                        const overlap = (COLLISION_RADIUS - dist) * 0.5;
                        const nx = dx/dist; const ny = dy/dist;
                        this.x -= nx * overlap; this.y -= ny * overlap;
                        other.x += nx * overlap; other.y += ny * overlap;
                    }
                }
                this.x = Math.max(ION_RADIUS, Math.min(width - ION_RADIUS, this.x));
                this.y = Math.max(ION_RADIUS, Math.min(height - ION_RADIUS, this.y));
            }

            draw() {
                const grad = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, ION_RADIUS);
                if (currentMode === 'thermal') {
                    grad.addColorStop(0, `rgb(${236 + this.temp * 19}, ${240 - this.temp * 140}, ${241 - this.temp * 200})`);
                    grad.addColorStop(1, `rgb(${127 + this.temp * 100}, ${140 - this.temp * 60}, ${141 - this.temp * 80})`);
                } else {
                    grad.addColorStop(0, '#ecf0f1');
                    grad.addColorStop(1, '#7f8c8d');
                }
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, ION_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x - 4, this.y); ctx.lineTo(this.x + 4, this.y);
                ctx.moveTo(this.x, this.y - 4); ctx.lineTo(this.x, this.y + 4);
                ctx.stroke();
            }
        }

        class Electron {
            constructor(startX, startY) { 
                this.x = startX || Math.random() * width;
                this.y = startY || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5; 
                this.vy = (Math.random() - 0.5) * 1.5;
                this.ke = 0; 
            }

            update() {
                if (currentMode === 'conductivity') {
                    if (isConducting) this.vx += 0.045; 
                    else { this.vx *= 0.97; this.vy *= 0.97; }
                }

                if (currentMode === 'thermal') {
                    if (isHeating) {
                        const distToBurner = Math.abs(this.x - burnerPos);
                        if (distToBurner < 70) this.ke = Math.min(1, this.ke + 0.06);
                    }
                    this.ke *= 0.9985;
                    for (let other of electrons) {
                        if (other === this) continue;
                        const dx = other.x - this.x;
                        const dy = other.y - this.y;
                        if (dx*dx + dy*dy < 1600) { 
                            const diff = (this.ke - other.ke) * 0.18;
                            this.ke -= diff;
                            other.ke += diff;
                        }
                    }
                    ions.forEach(ion => {
                        const dx = this.x - ion.x;
                        const dy = this.y - ion.y;
                        if (dx*dx + dy*dy < 600) {
                            ion.temp += (this.ke - ion.temp) * 0.1;
                        }
                    });
                } else this.ke = 0;

                const speedFactor = 1 + this.ke * 6; 
                this.x += this.vx * speedFactor; 
                this.y += this.vy * speedFactor;

                if (this.x > width + 10) this.x = -10;
                if (this.x < -10) this.x = width + 10;
                if (this.y > height + 10) this.y = -10;
                if (this.y < -10) this.y = height + 10;

                this.vx += (Math.random() - 0.5) * 0.15;
                this.vy += (Math.random() - 0.5) * 0.15;

                let closest = null, minDistSq = Infinity;
                ions.forEach(ion => {
                    const dx = this.x - ion.x;
                    const dy = this.y - ion.y;
                    const d2 = dx*dx + dy*dy;
                    if (d2 < minDistSq) { minDistSq = d2; closest = ion; }
                    const repulseRadius = ION_RADIUS * 0.75;
                    if (d2 < repulseRadius * repulseRadius) {
                        const dist = Math.sqrt(d2) || 1;
                        const force = (repulseRadius - dist) * 0.05;
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }
                });

                if (closest && Math.sqrt(minDistSq) > SPACING * 0.85) {
                    this.vx += (closest.x - this.x) * 0.005;
                    this.vy += (closest.y - this.y) * 0.005;
                }

                this.vx *= 0.985; this.vy *= 0.985;
                const baseMax = isConducting ? 4.5 : 2.8;
                const maxSpeed = baseMax * speedFactor;
                const speedSq = this.vx*this.vx + this.vy*this.vy;
                if (speedSq > maxSpeed*maxSpeed) {
                    const s = Math.sqrt(speedSq);
                    this.vx = (this.vx/s) * maxSpeed;
                    this.vy = (this.vy/s) * maxSpeed;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, ELECTRON_RADIUS + (this.ke * 3), 0, Math.PI * 2);
                if (currentMode === 'thermal') {
                    const r = 241 + (231 - 241) * this.ke;
                    const g = 196 + (76 - 196) * this.ke;
                    const b = 15 + (60 - 15) * this.ke;
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    if (this.ke > 0.1) {
                        ctx.shadowBlur = 3 + this.ke * 15;
                        ctx.shadowColor = `rgba(231, 76, 60, ${this.ke})`;
                    }
                } else {
                    ctx.fillStyle = isConducting ? '#ffffff' : '#f1c40f';
                    if (isConducting) { ctx.shadowBlur = 8; ctx.shadowColor = '#fff'; }
                }
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#2c3e50';
                ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('−', this.x, this.y);
            }
        }

        let burnerPos = 0;

        function initSim() {
            ions = []; electrons = [];
            isConducting = false; isHeating = false; pullCount = 0;
            
            condBtn.innerText = "Apply Voltage: OFF";
            condBtn.className = "bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg " + (currentMode === 'conductivity' ? 'block' : 'hidden');
            
            heatBtn.innerText = "Apply Heat: OFF";
            heatBtn.className = "bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg " + (currentMode === 'thermal' ? 'block' : 'hidden');
            
            terminals.classList.remove('voltage-on');
            canvasWrapper.classList.remove('heating-on');

            const midX = width / 2; const midY = height / 2;
            let rows, cols;
            if (currentMode === 'conductivity') {
                cols = Math.ceil(width / SPACING) + 1; rows = 5;
                const sy = midY - ((rows - 1) * SPACING) / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) ions.push(new Ion(c * SPACING + (r%2 ? SPACING/2 : 0), sy + r * SPACING));
                }
            } else if (currentMode === 'malleability' || currentMode === 'thermal') {
                cols = 8; rows = 4;
                const sx = midX - ((cols - 1) * SPACING) / 2;
                const sy = midY - ((rows - 1) * SPACING) / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) ions.push(new Ion(sx + c * SPACING, sy + r * SPACING));
                }
                if (currentMode === 'thermal') {
                    burnerPos = sx + SPACING;
                    burner.style.left = `${burnerPos - 50}px`;
                }
            } else { 
                cols = 6; rows = 5; 
                const sx = midX - ((cols - 1) * SPACING) / 2;
                const sy = midY - ((rows - 1) * SPACING) / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) ions.push(new Ion(sx + c * SPACING, sy + r * SPACING));
                }
            }

            const eCount = ions.length * E_PER_ION;
            for (let i = 0; i < eCount; i++) {
                const randomIon = ions[Math.floor(Math.random() * ions.length)];
                electrons.push(new Electron(randomIon.x + (Math.random()-0.5)*100, randomIon.y + (Math.random()-0.5)*100));
            }
            updateDuctilityAssets();
        }

        function updateDuctilityAssets() {
            if (currentMode !== 'ductility' || ions.length === 0) return;
            let minX = width, maxX = 0;
            ions.forEach(ion => { if (ion.x < minX) minX = ion.x; if (ion.x > maxX) maxX = ion.x; });
            leftAssets.style.left = `${minX - 50}px`;
            rightAssets.style.left = `${maxX - 20}px`;
        }

        function hammer(mx, my) {
            if (currentMode !== 'malleability') return;
            playClingSound();
            feedback.style.opacity = '1';
            setTimeout(() => feedback.style.opacity = '0', 500);
            ions.forEach(ion => {
                const dx = ion.x - mx, dy = ion.y - my;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < 100) {
                    const f = (100 - d) / 20;
                    ion.vx += (dx / d) * f;
                    ion.vy += (dy / d) * f;
                }
            });
        }

        function pull() {
            if (currentMode !== 'ductility') return;
            pullCount++;
            canvasWrapper.classList.add('pulling');
            setTimeout(() => canvasWrapper.classList.remove('pulling'), 200);
            ions.forEach(ion => ion.vx += (ion.x < width/2 ? -0.7 : 0.7));
        }

        function toggleVoltage() {
            isConducting = !isConducting;
            if (isConducting) {
                condBtn.innerText = "Apply Voltage: ON";
                condBtn.classList.replace('bg-amber-500', 'bg-green-600');
                terminals.classList.add('voltage-on');
            } else {
                condBtn.innerText = "Apply Voltage: OFF";
                condBtn.classList.replace('bg-green-600', 'bg-amber-500');
                terminals.classList.remove('voltage-on');
            }
        }

        function toggleHeat() {
            isHeating = !isHeating;
            if (isHeating) {
                heatBtn.innerText = "Apply Heat: ON";
                heatBtn.classList.replace('bg-orange-600', 'bg-red-600');
                canvasWrapper.classList.add('heating-on');
            } else {
                heatBtn.innerText = "Apply Heat: OFF";
                heatBtn.classList.replace('bg-red-600', 'bg-orange-600');
                canvasWrapper.classList.remove('heating-on');
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for(let i=0; i<2; i++) ions.forEach(ion => ion.update());
            if (currentMode === 'ductility') updateDuctilityAssets();
            
            ions.forEach(ion => {
                const g = ctx.createRadialGradient(ion.x, ion.y, 0, ion.x, ion.y, ION_RADIUS * 2.8);
                g.addColorStop(0, `rgba(52, 152, 219, ${currentMode === 'thermal' ? 0.15 + ion.temp * 0.1 : 0.15})`);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath();
                ctx.arc(ion.x, ion.y, ION_RADIUS * 2.8, 0, Math.PI*2); ctx.fill();
            });

            electrons.forEach(e => { e.update(); e.draw(); });
            ions.forEach(ion => ion.draw());
            requestAnimationFrame(animate);
        }

        function setMode(mode) {
            currentMode = mode;
            [tabMall, tabDuct, tabCond, tabThermal].forEach(t => {
                t.className = "px-6 py-2 font-bold border-b-4 border-transparent text-slate-400 hover:text-slate-600 transition-all";
            });
            
            actionBtn.classList.add('hidden');
            condBtn.classList.add('hidden');
            heatBtn.classList.add('hidden');
            terminals.classList.add('hidden');
            terminals.classList.remove('voltage-on');
            terminals.style.opacity = '0';
            canvas.classList.remove('hammer-cursor');
            leftAssets.style.opacity = '0';
            rightAssets.style.opacity = '0';
            canvasWrapper.classList.remove('heating-on');

            if (mode === 'malleability') {
                tabMall.className = "px-6 py-2 font-bold border-b-4 border-blue-600 text-blue-600 transition-all";
                panelTitle.innerText = "Malleability Simulation";
                panelList.innerHTML = `<li><strong>Click</strong> to hammer the metal gently.</li><li>The ions slide over each other without breaking the non-directional metallic bond.</li><li>The sea of delocalized electrons moves and forms metallic bond again in the new shape.</li>`;
                canvas.classList.add('hammer-cursor');
            } else if (mode === 'ductility') {
                tabDuct.className = "px-6 py-2 font-bold border-b-4 border-blue-600 text-blue-600 transition-all";
                panelTitle.innerText = "Ductility Simulation";
                panelList.innerHTML = `<li><strong>Click 'Pull Metal'</strong> to stretch.</li><li>Observe the lattice thinning into a wire shape.</li><li>Electrons follow the shifting lattice.</li>`;
                actionBtn.classList.remove('hidden');
                leftAssets.style.opacity = '1'; rightAssets.style.opacity = '1';
            } else if (mode === 'conductivity') {
                tabCond.className = "px-6 py-2 font-bold border-b-4 border-blue-600 text-blue-600 transition-all";
                panelTitle.innerText = "Electrical Conductivity Simulation";
                panelList.innerHTML = `<li><strong>Apply Voltage</strong> to see drift.</li><li>Delocalized electrons move toward positive (+).</li><li>The sea flows between the gaps in the fixed lattice.</li>`;
                condBtn.classList.remove('hidden');
                terminals.classList.remove('hidden'); terminals.style.opacity = '1';
            } else if (mode === 'thermal') {
                tabThermal.className = "px-6 py-2 font-bold border-b-4 border-blue-600 text-blue-600 transition-all";
                panelTitle.innerText = "Thermal Conductivity Simulation";
                panelList.innerHTML = `<li><strong>Apply Heat</strong> to the metal block.</li><li>Delocalized electrons can propagate kinetic energy quickly to other particles due to its small size and mobility.</li><li>Observe the <strong>ions vibrate</strong> as they absorb thermal energy.</li>`;
                heatBtn.classList.remove('hidden');
            }
            initSim();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            hammer(e.clientX - rect.left, e.clientY - rect.top);
        });

        // Add touch support for malleability mode
        canvas.addEventListener('touchstart', (e) => {
            if (currentMode !== 'malleability') return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            hammer(touch.clientX - rect.left, touch.clientY - rect.top);
        }, { passive: true });
        
        tabMall.onclick = () => setMode('malleability');
        tabDuct.onclick = () => setMode('ductility');
        tabCond.onclick = () => setMode('conductivity');
        tabThermal.onclick = () => setMode('thermal');
        actionBtn.onclick = pull;
        condBtn.onclick = toggleVoltage;
        heatBtn.onclick = toggleHeat;
        resetBtn.onclick = initSim;

        window.onload = function () {
            width = canvas.parentElement.clientWidth;
            height = 400; canvas.width = width; canvas.height = height;
            setMode('malleability'); animate();
        };

        window.addEventListener('resize', () => {
            width = canvas.parentElement.clientWidth; canvas.width = width;
            initSim();
        });
    </script>
</body>
</html>
