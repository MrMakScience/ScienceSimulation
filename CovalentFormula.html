<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covalent Compound Formula Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .cancel-line { position: relative; display: inline-block; }
        .cancel-line::after {
            content: '';
            position: absolute;
            left: -2px; top: 50%;
            width: 0; height: 2px;
            background: #ef4444;
            transform: rotate(-15deg);
            transition: width 0.5s ease;
        }
        .cancel-active::after { width: calc(100% + 4px); }

        /* Animation for numbers in Step 2 */
        .move-num {
            animation: moveNum 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.3s;
        }
        @keyframes moveNum {
            0% { transform: translate(0, 0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: var(--translate-path); opacity: 0; }
        }

        .appear-sub {
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
            animation-delay: 1.3s;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Covalent Formula Builder</h1>
            <p class="text-slate-600 mt-2">Master the step-by-step process of covalent bonding.</p>
        </header>

        <!-- Selection Screen -->
        <div id="selection-screen" class="bg-white rounded-2xl shadow-xl p-6 border border-slate-200">
            <h2 class="text-xl font-semibold mb-4 text-slate-700 text-center">Choose a pair of elements:</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="pair-list">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Step Container -->
        <div id="step-container" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-4">
                <button onclick="resetSim()" class="text-blue-600 font-medium hover:underline flex items-center gap-1">
                    ← Change Elements
                </button>
                <div id="step-indicator" class="text-sm font-bold text-slate-400 tracking-widest uppercase">Step 1 of 5</div>
            </div>

            <!-- Visualizer Card -->
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-200 min-h-[500px] flex flex-col items-center justify-center relative overflow-hidden">
                
                <!-- Display Area -->
                <div id="display-area" class="w-full flex flex-col items-center"></div>

                <!-- Guidance Text -->
                <div id="guidance-box" class="mt-8 p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg w-full">
                    <p id="guidance-text" class="text-blue-800"></p>
                </div>

                <!-- Navigation -->
                <div class="mt-8 w-full flex justify-between">
                    <button id="prev-btn" onclick="prevStep()" class="text-slate-500 px-6 py-3 rounded-full font-bold hover:bg-slate-100 transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        <span>Back</span>
                    </button>
                    <button id="next-btn" onclick="nextStep()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition shadow-lg flex items-center gap-2">
                        <span>Continue</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ELEMENT_ORDER = ['B', 'Si', 'C', 'P', 'N', 'H', 'S', 'I', 'Br', 'Cl', 'O', 'F'];
        const DATA = {
            'C': { sym: 'C', name: 'Carbon', start: '2, 4', full: '2, 8', needs: 4 },
            'O': { sym: 'O', name: 'Oxygen', start: '2, 6', full: '2, 8', needs: 2 },
            'H': { sym: 'H', name: 'Hydrogen', start: '1', full: '2', needs: 1 },
            'N': { sym: 'N', name: 'Nitrogen', start: '2, 5', full: '2, 8', needs: 3 },
            'S': { sym: 'S', name: 'Sulfur', start: '2, 8, 6', full: '2, 8, 8', needs: 2 },
            'Cl': { sym: 'Cl', name: 'Chlorine', start: '2, 8, 7', full: '2, 8, 8', needs: 1 },
            'F': { sym: 'F', name: 'Fluorine', start: '2, 7', full: '2, 8', needs: 1 }
        };

        const PAIRS = [['C', 'O'], ['H', 'O'], ['N', 'H'], ['S', 'Cl'], ['H', 'F'], ['C', 'Cl'], ['C', 'H']];
        const PREFIXES = ["", "mono", "di", "tri", "tetra", "penta", "hexa"];
        const SPECIAL_NAMES = { 
            "H2O": "Water", 
            "NH3": "Ammonia", 
            "CH4": "Methane", 
            "HF": "Hydrogen fluoride",
            "CCl4": "Carbon tetrachloride<br><span class='text-sm font-normal text-blue-400'>(Tetrachloromethane)</span>"
        };

        let currentPair = null;
        let currentStep = 1;

        function init() {
            const list = document.getElementById('pair-list');
            PAIRS.forEach(pair => {
                const btn = document.createElement('button');
                btn.className = "p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-left flex justify-between items-center group";
                btn.onclick = () => startSimulation(pair);
                btn.innerHTML = `<span class="text-lg font-bold text-slate-700">${pair[0]} & ${pair[1]}</span><span class="opacity-0 group-hover:opacity-100 text-blue-500 text-sm font-bold transition">Start →</span>`;
                list.appendChild(btn);
            });
        }

        function startSimulation(pair) {
            currentPair = [...pair].sort((a, b) => ELEMENT_ORDER.indexOf(a) - ELEMENT_ORDER.indexOf(b)).map(sym => DATA[sym]);
            currentStep = 1;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('step-container').classList.remove('hidden');
            renderStep();
        }

        function resetSim() {
            document.getElementById('selection-screen').classList.remove('hidden');
            document.getElementById('step-container').classList.add('hidden');
        }

        function nextStep() {
            if (currentStep < 5) {
                currentStep++;
                renderStep();
            } else {
                resetSim();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                renderStep();
            }
        }

        function renderStep() {
            const display = document.getElementById('display-area');
            const guidance = document.getElementById('guidance-text');
            const indicator = document.getElementById('step-indicator');
            const nextBtnText = document.querySelector('#next-btn span');
            const prevBtn = document.getElementById('prev-btn');
            
            indicator.innerText = `Step ${currentStep} of 5`;
            display.innerHTML = '';

            // Toggle Back button visibility
            if (currentStep === 1) {
                prevBtn.style.visibility = 'hidden';
            } else {
                prevBtn.style.visibility = 'visible';
            }
            
            const [el1, el2] = currentPair;
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const commonFactor = gcd(el1.needs, el2.needs);

            if (currentStep === 1) {
                nextBtnText.innerText = "Continue";
                guidance.innerText = `Decide how many electrons are missing for each element to reach the closest stable configuration.`;
                display.innerHTML = `
                    <div class="flex gap-8 items-start fade-in">
                        ${[el1, el2].map(el => `
                        <div class="text-center p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm w-40">
                            <div class="w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-4">${el.sym}</div>
                            <div class="mb-2"><p class="text-[10px] text-slate-500 uppercase font-bold">Original</p><p class="font-mono font-bold text-slate-700">${el.start}</p></div>
                            <div class="mb-2"><p class="text-[10px] text-blue-500 uppercase font-bold">Target</p><p class="font-mono font-bold text-blue-600">${el.full}</p></div>
                            <div class="pt-2 border-t border-slate-200"><p class="text-xs font-medium">Missing: <span class="text-red-500 font-bold">${el.needs}</span></p></div>
                        </div>`).join('')}
                    </div>
                `;
            }

            else if (currentStep === 2) {
                nextBtnText.innerText = "Continue";
                guidance.innerText = `Watch the missing electrons "cross over" to become subscripts for the opposite element.`;
                display.innerHTML = `
                    <div class="relative w-80 h-64">
                        <!-- Top Elements -->
                        <div class="absolute top-0 left-0 text-center w-20">
                            <div class="text-4xl font-bold text-slate-800">${el1.sym}</div>
                            <div class="text-3xl font-bold text-blue-600 move-num" style="--translate-path: translate(220px, 130px)">${el1.needs}</div>
                        </div>
                        <div class="absolute top-0 right-0 text-center w-20">
                            <div class="text-4xl font-bold text-slate-800">${el2.sym}</div>
                            <div class="text-3xl font-bold text-blue-600 move-num" style="--translate-path: translate(-220px, 130px)">${el2.needs}</div>
                        </div>

                        <!-- Bottom Symbols (Subscripts will appear) -->
                        <div class="absolute bottom-0 left-0 text-center w-20">
                            <div class="text-5xl font-bold text-slate-800">${el1.sym}<sub class="text-blue-600 appear-sub">${el2.needs}</sub></div>
                        </div>
                        <div class="absolute bottom-0 right-0 text-center w-20">
                            <div class="text-5xl font-bold text-slate-800">${el2.sym}<sub class="text-blue-600 appear-sub">${el1.needs}</sub></div>
                        </div>
                    </div>
                `;
            }

            else if (currentStep === 3) {
                nextBtnText.innerText = "Continue";
                const sub1 = el2.needs / commonFactor;
                const sub2 = el1.needs / commonFactor;
                
                let text = "";
                if (commonFactor > 1) {
                    text = `Simplify subscripts by dividing by the common factor (${commonFactor}). `;
                }
                if (sub1 === 1 || sub2 === 1) {
                    text += `Remember to cancel any "1"s!`;
                } else if (commonFactor === 1) {
                    text = "No common factor found, subscripts remain as they are.";
                }

                guidance.innerText = text;
                
                display.innerHTML = `
                    <div class="text-5xl font-bold flex flex-col items-center gap-8 fade-in">
                        <div class="flex items-center gap-4">
                            <div>${el1.sym}<sub class="cancel-line ${commonFactor > 1 ? 'cancel-active' : ''}">${el2.needs}</sub>${el2.sym}<sub class="cancel-line ${commonFactor > 1 ? 'cancel-active' : ''}">${el1.needs}</sub></div>
                            <div class="mx-4 text-slate-300">→</div>
                            <div class="${commonFactor > 1 ? 'text-green-600' : ''}">${el1.sym}<sub class="cancel-line ${sub1 === 1 ? 'cancel-active' : ''}">${sub1}</sub>${el2.sym}<sub class="cancel-line ${sub2 === 1 ? 'cancel-active' : ''}">${sub2}</sub></div>
                        </div>
                        ${(sub1 === 1 || sub2 === 1) ? `
                        <div class="bg-red-50 text-red-600 text-sm px-4 py-2 rounded-full border border-red-100 flex items-center gap-2">
                             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                             Cancel the 1!
                        </div>` : ''}
                    </div>
                `;
                
                setTimeout(() => {
                   document.querySelectorAll('.cancel-active').forEach(el => el.classList.add('cancel-active'));
                }, 100);
            }

            else if (currentStep === 4) {
                nextBtnText.innerText = "Continue";
                const sub1 = el2.needs / commonFactor;
                const sub2 = el1.needs / commonFactor;
                guidance.innerText = `Combine the atoms together to form the chemical formula.`;
                display.innerHTML = `
                    <div class="text-center fade-in">
                        <div class="text-8xl font-extrabold text-slate-800 tracking-tighter">
                            ${el1.sym}${sub1 === 1 ? '' : `<sub class="text-5xl">${sub1}</sub>`}${el2.sym}${sub2 === 1 ? '' : `<sub class="text-5xl">${sub2}</sub>`}
                        </div>
                    </div>
                `;
            }

            else if (currentStep === 5) {
                nextBtnText.innerText = "Finish";
                const sub1 = el2.needs / commonFactor;
                const sub2 = el1.needs / commonFactor;
                const formula = `${el1.sym}${sub1 === 1 ? '' : sub1}${el2.sym}${sub2 === 1 ? '' : sub2}`;
                
                let finalName = "";
                if (SPECIAL_NAMES[formula]) {
                    finalName = SPECIAL_NAMES[formula];
                } else {
                    const prefix1 = sub1 > 1 ? PREFIXES[sub1] : "";
                    const skipMono = (el1.sym === 'H' && sub1 === 1 && sub2 === 1);
                    const prefix2 = (sub2 === 1 && skipMono) ? "" : PREFIXES[sub2];
                    
                    let root2 = el2.sym === 'O' ? 'oxide' : 
                                el2.sym === 'Cl' ? 'chloride' : 
                                el2.sym === 'F' ? 'fluoride' : 
                                el2.sym === 'S' ? 'sulfide' : 
                                el2.sym === 'H' ? 'hydride' : el2.name.toLowerCase() + 'ide';
                    
                    let p2 = prefix2;
                    if (p2 && (p2.endsWith('a') || p2.endsWith('o')) && root2.startsWith('o')) p2 = p2.slice(0, -1);
                    
                    const part1 = prefix1 + el1.name.toLowerCase();
                    const part2 = p2 + root2;
                    
                    finalName = (part1.charAt(0).toUpperCase() + part1.slice(1)) + " " + part2;
                }

                guidance.innerText = `Apply naming rules to give the compound its full name.`;
                display.innerHTML = `
                    <div class="w-full flex flex-col md:flex-row gap-6 items-start">
                        <div class="flex-1 text-center bg-slate-900 text-white p-8 rounded-2xl shadow-xl fade-in w-full self-stretch flex flex-col justify-center">
                            <div class="text-4xl font-bold mb-2">${formula.replace(/(\d+)/g, '<sub>$1</sub>')}</div>
                            <div class="text-2xl font-bold text-blue-300 border-t border-slate-700 pt-4 leading-tight">${finalName}</div>
                        </div>
                        <div class="flex-1 bg-amber-50 p-6 rounded-2xl border border-amber-200 text-xs space-y-3 w-full">
                            <h4 class="font-bold text-amber-800 text-sm border-b border-amber-200 pb-1 uppercase">Naming Rules</h4>
                            <ol class="list-decimal list-inside text-amber-900 space-y-1">
                                <li>Arrange the atoms by this order: <strong>B, Si, C, P, N, H, S, I, Br, Cl, O, F</strong></li>
                                <li>Second element name ends in <strong>"-ide"</strong></li>
                                <li>Use prefixes (<strong>mono, di, tri, tetra...</strong>) for atom counts</li>
                            </ol>
                            <div class="bg-white/70 p-3 rounded-lg border border-amber-200 shadow-sm mt-2">
                                <p class="font-bold text-amber-800 mb-1 italic">Notes:</p>
                                <ul class="list-disc list-inside space-y-1.5 text-amber-900">
                                    <li>For cases with only 1 possibility, no need for the prefix.</li>
                                    <li><span class="font-semibold text-red-700">Exceptions:</span> H<sub>2</sub>O (Water), H<sub>2</sub>O<sub>2</sub> (Hydrogen peroxide), NH<sub>3</sub> (Ammonia), CH<sub>4</sub> (Methane).</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
