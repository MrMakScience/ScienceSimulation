<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnesium Mass Spectrometer Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        canvas { border-radius: 8px; background: #1e293b; touch-action: none; display: block; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .progress-bar {
            transition: width 0.1s linear;
        }
        .active-iso {
            border: 2px solid #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.1);
        }
        .timeline-divider {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(15, 23, 42, 0.8);
            z-index: 10;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-purple-400">Automated Mass Spectrometry</h1>
            <p class="text-slate-400 mt-2">Precision Trajectory Alignment | Magnesium Analysis</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-panel p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-4">
                        <div id="scanStatus" class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-slate-500" id="statusDot"></span>
                            <span id="statusText" class="text-sm font-bold uppercase tracking-widest text-slate-300">Ready</span>
                        </div>
                        <div class="flex gap-4">
                            <div id="legend24" class="px-3 py-1 rounded-lg flex items-center gap-2 transition-all duration-300">
                                <div class="w-3 h-3 rounded-full bg-purple-300"></div> <span class="text-xs font-bold">m/z 24</span>
                            </div>
                            <div id="legend25" class="px-3 py-1 rounded-lg flex items-center gap-2 transition-all duration-300">
                                <div class="w-3 h-3 rounded-full bg-purple-500"></div> <span class="text-xs font-bold">m/z 25</span>
                            </div>
                            <div id="legend26" class="px-3 py-1 rounded-lg flex items-center gap-2 transition-all duration-300">
                                <div class="w-3 h-3 rounded-full bg-purple-900"></div> <span class="text-xs font-bold">m/z 26</span>
                            </div>
                        </div>
                    </div>

                    <div class="relative w-full aspect-[16/10] min-h-[350px]">
                        <canvas id="simCanvas" class="w-full h-full"></canvas>
                    </div>
                    
                    <div class="mt-6 space-y-4">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-xs text-slate-400 block mb-1">TUNED B-FIELD</span>
                                <span id="bValue" class="text-3xl text-purple-400 font-mono font-bold">0.00 T</span>
                            </div>
                            <button id="startBtn" class="px-10 py-4 bg-purple-600 hover:bg-purple-500 active:scale-95 transition-all rounded-full font-bold shadow-lg shadow-purple-900/40">
                                Start Sequence
                            </button>
                        </div>
                        
                        <div class="relative w-full bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                            <div class="timeline-divider" style="left: 25%"></div>
                            <div class="timeline-divider" style="left: 50%"></div>
                            <div class="timeline-divider" style="left: 75%"></div>
                            <div id="scanProgress" class="progress-bar bg-purple-500 h-full w-0 relative z-0 shadow-[0_0_15px_rgba(168,85,247,0.5)]"></div>
                        </div>
                        <div class="flex justify-between text-[9px] text-slate-500 font-bold tracking-tighter">
                            <span class="w-1/4 text-center">WINDOW 1 (m/z=23)</span>
                            <span class="w-1/4 text-center">WINDOW 2 (m/z=24)</span>
                            <span class="w-1/4 text-center">WINDOW 3 (m/z=25)</span>
                            <span class="w-1/4 text-center">WINDOW 4 (m/z=26)</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-panel p-6 rounded-xl border-t-4 border-purple-500">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        Cumulative Ion Count
                    </h2>
                    <div class="space-y-4 font-mono text-xl">
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                            <span class="text-purple-300 text-sm">m/z 24:</span>
                            <span id="total24" class="font-bold">0</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                            <span class="text-purple-500 text-sm">m/z 25:</span>
                            <span id="total25" class="font-bold">0</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                            <span class="text-purple-900 text-sm">m/z 26:</span>
                            <span id="total26" class="font-bold">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-xl">
                    <h2 class="text-lg font-bold mb-4">Relative Abundance</h2>
                    <div class="h-56 flex items-end justify-around gap-4 relative border-b-2 border-l-2 border-slate-700 pb-2 pl-2">
                        <div class="flex flex-col items-center w-full group h-full justify-end">
                            <div id="bar24" class="w-full bg-purple-300 transition-all duration-500 rounded-t" style="height: 0%"></div>
                            <span class="text-[10px] mt-2 font-bold">24</span>
                        </div>
                        <div class="flex flex-col items-center w-full group h-full justify-end">
                            <div id="bar25" class="w-full bg-purple-500 transition-all duration-500 rounded-t" style="height: 0%"></div>
                            <span class="text-[10px] mt-2 font-bold">25</span>
                        </div>
                        <div class="flex flex-col items-center w-full group h-full justify-end">
                            <div id="bar26" class="w-full bg-purple-900 transition-all duration-500 rounded-t" style="height: 0%"></div>
                            <span class="text-[10px] mt-2 font-bold">26</span>
                        </div>
                    </div>
                    <div class="mt-4 grid grid-cols-3 text-center text-sm font-mono font-bold">
                        <div id="val24" class="text-purple-300">0%</div>
                        <div id="val25" class="text-purple-500">0%</div>
                        <div id="val26" class="text-purple-700">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const bValueDisp = document.getElementById('bValue');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const scanProgress = document.getElementById('scanProgress');

        const EMISSION_DURATION = 9000; 
        const SETTLE_DURATION = 1500;   
        const CYCLE_TOTAL = EMISSION_DURATION + SETTLE_DURATION; 
        
        const scanWindows = [
            { targetMz: 23, bField: 0.96 },
            { targetMz: 24, bField: 1.00 }, 
            { targetMz: 25, bField: 1.04 }, 
            { targetMz: 26, bField: 1.08 }
        ];

        const sampleComposition = [
            { mz: 24, abundance: 79, color: '#d8b4fe' }, 
            { mz: 25, abundance: 10, color: '#a855f7' }, 
            { mz: 26, abundance: 11, color: '#581c87' } 
        ];

        let particles = [];
        let recordedData = { 24: 0, 25: 0, 26: 0 };
        let isRunning = false;
        let currentScanIndex = -1;
        let startTime = 0;
        let emittedCounts = { 24: 0, 25: 0, 26: 0 };

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            particles.forEach(p => {
                p.w = rect.width;
                p.h = rect.height;
            });
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(mzValue, scanIndexAtBirth) {
                this.isoData = sampleComposition.find(i => i.mz === mzValue);
                this.mz = mzValue;
                this.color = this.isoData.color;
                
                const rect = canvas.getBoundingClientRect();
                this.w = rect.width;
                this.h = rect.height;

                // Initial position at source
                this.startX = 40;
                this.startY = this.h - 40;
                this.x = this.startX;
                this.y = this.startY;
                
                this.speed = (this.w / 800) * 8.5;
                this.vx = this.speed;
                this.vy = 0;
                
                this.history = [];
                this.active = true;
                this.detected = false;
                this.scanIndexAtBirth = scanIndexAtBirth;
            }

            update() {
                if (!this.active) return;
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 12) this.history.shift();

                const entryX = this.w * 0.25; 
                const detX = this.w - 100;
                const detY = 45; 

                if (this.x < entryX) {
                    this.x += this.vx;
                } else {
                    const windowData = scanWindows[this.scanIndexAtBirth];
                    if (!windowData) { this.active = false; return; }
                    
                    const targetMz = windowData.targetMz;
                    
                    // The arc must pass through (entryX, bottomY) and (detX, detY)
                    // only when mz == targetMz.
                    const dx = detX - entryX;
                    const dy = this.startY - detY;
                    
                    // R_ideal is the radius required for a particle to hit the center of the detector.
                    const R_ideal = (dx * dx + dy * dy) / (2 * dy);
                    
                    // Actual radius depends on mass/charge. 
                    // Lower mass = smaller radius = hits to the left of the detector.
                    // Higher mass = larger radius = hits to the right of the detector.
                    const radius = R_ideal * (this.mz / targetMz);
                    
                    const angleStep = this.speed / radius;
                    const currentAngle = Math.atan2(this.vy, this.vx);
                    const newAngle = currentAngle - angleStep;
                    
                    this.vx = Math.cos(newAngle) * this.speed;
                    this.vy = Math.sin(newAngle) * this.speed;
                    this.x += this.vx;
                    this.y += this.vy;
                }

                // Tight detection zone (only 6px wide) to ensure strict filtering
                if (this.y < detY + 4) {
                    if (Math.abs(this.x - detX) < 6) { 
                        this.detected = true;
                        // Extra verification: ensure we only record if it's the specific target isotope
                        const windowData = scanWindows[this.scanIndexAtBirth];
                        if (isRunning && windowData && this.mz === windowData.targetMz) {
                            recordedData[this.mz]++;
                            updateCumulativeDisplay();
                            updateSpectrum();
                        }
                    }
                    this.active = false;
                }
                
                // Cleanup
                if (this.x > this.w + 100 || this.y < -100 || this.y > this.h + 100 || this.x < -100) {
                    this.active = false;
                }
            }

            draw() {
                if (!this.active && !this.detected) return;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = 0.15;
                ctx.lineWidth = 1.5;
                this.history.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
                
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEnvironment() {
            const rect = canvas.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const entryX = w * 0.25;
            const detX = w - 100;
            
            // Magnetic field region
            const grad = ctx.createLinearGradient(entryX, 0, w, 0);
            grad.addColorStop(0, 'rgba(168, 85, 247, 0.12)');
            grad.addColorStop(1, 'rgba(168, 85, 247, 0.02)');
            ctx.fillStyle = grad;
            ctx.fillRect(entryX, 0, w - entryX, h);
            
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(168, 85, 247, 0.4)';
            ctx.beginPath(); ctx.moveTo(entryX, 0); ctx.lineTo(entryX, h); ctx.stroke();
            ctx.setLineDash([]);

            // Source box
            ctx.fillStyle = '#334155'; ctx.fillRect(0, h - 70, 60, 50);
            ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('ION SOURCE', 10, h - 75);
            
            // Detector Housing
            ctx.fillStyle = '#1e293b'; ctx.fillRect(detX - 120, 0, 240, 45);
            ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.strokeRect(detX - 120, 0, 240, 45);
            
            // Slit visualization - tighter opening
            ctx.clearRect(detX - 8, 40, 16, 10);
            ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 8; ctx.beginPath();
            ctx.moveTo(detX - 8, 45); ctx.lineTo(detX - 120, 45);
            ctx.moveTo(detX + 8, 45); ctx.lineTo(detX + 120, 45); ctx.stroke();
            
            ctx.fillStyle = '#a855f7'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('DETECTOR SLIT', detX, 25);
        }

        function updateCumulativeDisplay() {
            if(document.getElementById('total24')) document.getElementById('total24').innerText = recordedData[24];
            if(document.getElementById('total25')) document.getElementById('total25').innerText = recordedData[25];
            if(document.getElementById('total26')) document.getElementById('total26').innerText = recordedData[26];
        }

        function updateSpectrum() {
            const total = recordedData[24] + recordedData[25] + recordedData[26];
            if (total === 0) return;
            [24, 25, 26].forEach(m => {
                const perc = (recordedData[m] / total * 100).toFixed(1);
                document.getElementById(`bar${m}`).style.height = `${perc}%`;
                document.getElementById(`val${m}`).innerText = `${perc}%`;
            });
        }

        function handleScanLogic(timestamp) {
            if (!isRunning) return;
            const elapsed = timestamp - startTime;
            const cycleIndex = Math.floor(elapsed / CYCLE_TOTAL);
            
            if (cycleIndex < scanWindows.length) {
                const windowTime = elapsed % CYCLE_TOTAL;
                const isSettling = windowTime > EMISSION_DURATION;

                if (currentScanIndex !== cycleIndex) {
                    currentScanIndex = cycleIndex;
                    const windowData = scanWindows[cycleIndex];
                    if (windowData) {
                        bValueDisp.innerText = `${windowData.bField.toFixed(2)} T`;
                        emittedCounts = { 24: 0, 25: 0, 26: 0 };
                        
                        [24, 25, 26].forEach(m => {
                            const el = document.getElementById(`legend${m}`);
                            if (el) el.classList.toggle('active-iso', m === windowData.targetMz);
                        });
                    }
                }

                scanProgress.style.width = `${(elapsed / (CYCLE_TOTAL * scanWindows.length)) * 100}%`;

                if (!isSettling) {
                    const windowData = scanWindows[cycleIndex];
                    if (windowData) {
                        statusText.innerText = `Scanning: m/z = ${windowData.targetMz}`;
                        statusDot.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
                        
                        // Emit all isotopes to show them missing the slit
                        sampleComposition.forEach((iso) => {
                            const targetForCycle = iso.abundance;
                            const schedule = (windowTime / EMISSION_DURATION) * targetForCycle;
                            
                            while (emittedCounts[iso.mz] < schedule) {
                                particles.push(new Particle(iso.mz, cycleIndex));
                                emittedCounts[iso.mz]++;
                            }
                        });
                    }
                } else {
                    statusText.innerText = `Calibrating Field...`;
                    statusDot.className = "w-3 h-3 rounded-full bg-yellow-500";
                }
            } else {
                isRunning = false;
                statusText.innerText = "Scan Sequence Complete";
                statusDot.className = "w-3 h-3 rounded-full bg-blue-500";
                startBtn.disabled = false;
                startBtn.innerText = "Restart Analysis";
                scanProgress.style.width = "100%";
                [24, 25, 26].forEach(m => {
                    const el = document.getElementById(`legend${m}`);
                    if (el) el.classList.remove('active-iso');
                });
            }
        }

        startBtn.onclick = () => {
            isRunning = true;
            startTime = performance.now();
            currentScanIndex = -1;
            recordedData = { 24: 0, 25: 0, 26: 0 };
            particles = []; 
            updateCumulativeDisplay();
            updateSpectrum();
            startBtn.disabled = true;
            startBtn.innerText = "Scanning...";
        };

        function animate(timestamp) {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            drawEnvironment();
            handleScanLogic(timestamp);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (!p.active && !p.detected) {
                    particles.splice(i, 1);
                } else if (p.detected) {
                    // Visual feedback for detection: ion travels into housing
                    p.y -= 2.5; 
                    if (p.y < -10) particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            requestAnimationFrame(animate);
        };
    </script>
</body>
</html>
