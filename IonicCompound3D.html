<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ionic Compound Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #0f172a; touch-action: none; }
        #canvas-container { width: 100%; height: 100vh; cursor: move; }
        .ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 50; pointer-events: none; }
        .ui-card { pointer-events: auto; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        input[type="checkbox"] { pointer-events: auto; }
        .disabled-ui { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay flex flex-col gap-4">
        <div class="ui-card p-6 rounded-xl shadow-2xl text-white w-80">
            <div class="flex justify-between items-start mb-2">
                <h1 class="text-xl font-bold">3D Ionic Compound Simulator</h1>
            </div>
            <p class="text-sm text-slate-300 mb-4">Explore the arrangement of ions in ionic solids.</p>
            
            <!-- Rotation Hint -->
            <div class="flex items-center gap-2 mb-4 px-3 py-1.5 bg-slate-800/50 rounded-lg border border-slate-700 w-fit">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="m15 15 6 6m-6-6 6-6m-6 6-6 6m6-6-6-6"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Drag to rotate</span>
            </div>

            <div class="flex flex-col gap-3">
                <label class="text-xs font-semibold uppercase text-slate-400">Structure</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-nacl" class="bg-blue-600 hover:bg-blue-500 py-2 px-3 rounded text-sm font-medium transition-colors border border-blue-400">NaCl</button>
                    <button id="btn-cscl" class="bg-slate-700 hover:bg-slate-600 py-2 px-3 rounded text-sm font-medium transition-colors border border-transparent">CsCl</button>
                </div>

                <label class="text-xs font-semibold uppercase text-slate-400 mt-2">Display Mode</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-unit" class="bg-blue-600 hover:bg-blue-500 py-2 px-3 rounded text-sm font-medium transition-colors border border-blue-400">Unit Cell</button>
                    <button id="btn-lattice" class="bg-slate-700 hover:bg-slate-600 py-2 px-3 rounded text-sm font-medium transition-colors border border-transparent">Lattice (3x3)</button>
                </div>

                <label class="text-xs font-semibold uppercase text-slate-400 mt-2">Analysis Tools</label>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="check-sticks" checked class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-blue-600">
                        <label for="check-sticks" class="text-sm text-slate-300">Show Sticks</label>
                    </div>
                    <div id="ratio-mode-container" class="flex items-center gap-2 transition-all duration-300">
                        <input type="checkbox" id="check-ratio" class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-blue-600">
                        <label for="check-ratio" class="text-sm text-orange-300 font-bold">Unit Cell Ratio Mode</label>
                    </div>
                </div>
            </div>

            <div id="ratio-panel" class="hidden mt-6 pt-4 border-t border-orange-500/30">
                <h3 class="text-sm font-bold text-orange-400 mb-2">Atom Count Calculation</h3>
                <div id="ratio-details" class="text-[11px] leading-relaxed font-mono text-slate-200"></div>
            </div>

            <div id="info-panel" class="mt-6 pt-4 border-t border-slate-700">
                <h3 class="text-sm font-semibold mb-2" id="struct-title">Sodium Chloride (NaCl)</h3>
                <div class="space-y-2 text-xs text-slate-300">
                    <div class="flex items-center">
                        <span id="ion-color-1" class="legend-dot bg-green-400"></span>
                        <span id="ion-label-1">Cl⁻ (Chloride)</span>
                    </div>
                    <div class="flex items-center">
                        <span id="ion-color-2" class="legend-dot bg-slate-300"></span>
                        <span id="ion-label-2">Na⁺ (Sodium)</span>
                    </div>
                </div>
                <p class="mt-4 text-xs italic text-slate-400" id="struct-desc"></p>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, crystalGroup;
        let currentStructure = 'NaCl';
        let viewMode = 'unit'; 
        let showSticks = true;
        let ratioMode = false;
        
        let baseClippingPlanes = [];
        let activeClippingPlanes = [];

        const COLORS = {
            Na: 0xe5e7eb,   
            Cl: 0x4ade80,   
            Cs: 0x60a5fa,   
            stick: 0x94a3b8 
        };

        const DATA = {
            NaCl: {
                title: "Sodium Chloride (NaCl)",
                desc: "FCC arrangement. Ions at corners (1/8), faces (1/2), edges (1/4), and center (1).",
                ion1: "Cl⁻ (Chloride)", color1: "bg-green-400",
                ion2: "Na⁺ (Sodium)", color2: "bg-slate-300",
                ratioHtml: `
                    <b class="text-green-400">Cl⁻ (Green):</b><br>
                    - 4 corners × 1/8 = 1/2<br>
                    Total Cl⁻ = 1/2<br><br>
                    <b class="text-slate-300">Na⁺ (White):</b><br>
                    - 4 corners × 1/8 = 1/2<br>
                    Total Na⁺ = 1/2<br><br>
                    <span class="text-orange-400">Ratio = 1:1</span>
                `
            },
            CsCl: {
                title: "Caesium Chloride (CsCl)",
                desc: "Simple cubic with Cs⁺ at center (1) and Cl⁻ at corners (1/8).",
                ion1: "Cl⁻ (Chloride)", color1: "bg-green-400",
                ion2: "Cs⁺ (Caesium)", color2: "bg-blue-400",
                ratioHtml: `
                    <b class="text-green-400">Cl⁻ (Green):</b><br>
                    - 8 corners × 1/8 = 1<br>
                    Total Cl⁻ = 1<br><br>
                    <b class="text-blue-400">Cs⁺ (Blue):</b><br>
                    - 1 center × 1 = 1<br>
                    Total Cs⁺ = 1<br><br>
                    <span class="text-orange-400">Ratio = 1:1</span>
                `
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.localClippingEnabled = true; 
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const d1 = new THREE.DirectionalLight(0xffffff, 0.6);
            d1.position.set(10, 15, 10);
            scene.add(d1);

            crystalGroup = new THREE.Group();
            scene.add(crystalGroup);

            // Interaction state
            let isDragging = false;
            let prevCoords = { x: 0, y: 0 };

            // Unified handlers for Mouse and Touch
            const handleStart = (x, y) => {
                isDragging = true;
                prevCoords = { x, y };
            };

            const handleMove = (x, y) => {
                if (!isDragging) return;
                const dx = x - prevCoords.x;
                const dy = y - prevCoords.y;
                
                const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(dy * 0.005, dx * 0.005, 0, 'XYZ'));
                crystalGroup.quaternion.multiplyQuaternions(q, crystalGroup.quaternion);
                
                prevCoords = { x, y };
            };

            const handleEnd = () => {
                isDragging = false;
            };

            // Mouse Events
            window.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', handleEnd);

            // Touch Events (iPad compatibility)
            window.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    handleStart(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && isDragging) {
                    e.preventDefault(); // Prevent scrolling while rotating
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            window.addEventListener('touchend', handleEnd);

            window.addEventListener('wheel', (e) => {
                camera.position.multiplyScalar(1 + e.deltaY * 0.001);
                camera.lookAt(0, 0, 0);
            });

            window.addEventListener('resize', onWindowResize);
            createStructure();
            updateUI();
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function createSolidClippedSphere(color, radius, x, y, z) {
            const atomGroup = new THREE.Group();
            atomGroup.position.set(x, y, z);
            
            const shellGeom = new THREE.SphereGeometry(radius, 64, 32);
            const shellMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                clippingPlanes: activeClippingPlanes,
                clipShadows: true
            });
            const shell = new THREE.Mesh(shellGeom, shellMat);
            atomGroup.add(shell);

            if (ratioMode) {
                const spacing = 4.0;
                const b = spacing / 2;
                const planeConfigs = [
                    { n: new THREE.Vector3(-1, 0, 0), c: b },
                    { n: new THREE.Vector3(1, 0, 0),  c: b },
                    { n: new THREE.Vector3(0, -1, 0), c: b },
                    { n: new THREE.Vector3(0, 1, 0),  c: b },
                    { n: new THREE.Vector3(0, 0, -1), c: b },
                    { n: new THREE.Vector3(0, 0, 1),  c: b }
                ];

                planeConfigs.forEach((config) => {
                    const dist = config.n.x * x + config.n.y * y + config.n.z * z + config.c;
                    if (Math.abs(dist) < radius) {
                        const capRadius = Math.sqrt(radius * radius - dist * dist);
                        const capGeom = new THREE.CircleGeometry(capRadius, 64);
                        const capMat = new THREE.MeshPhongMaterial({ 
                            color: color, 
                            side: THREE.DoubleSide,
                            clippingPlanes: activeClippingPlanes 
                        });
                        const cap = new THREE.Mesh(capGeom, capMat);
                        cap.position.copy(config.n).multiplyScalar(-dist);
                        cap.lookAt(cap.position.clone().add(config.n));
                        atomGroup.add(cap);
                    }
                });
            }
            return atomGroup;
        }

        function createStick(p1, p2) {
            const distance = p1.distanceTo(p2);
            const position = p2.clone().add(p1).divideScalar(2);
            const material = new THREE.MeshPhongMaterial({ 
                color: COLORS.stick, 
                transparent: true, 
                opacity: ratioMode ? 0.2 : 1.0 
            });
            const geometry = new THREE.CylinderGeometry(0.08, 0.08, distance, 8);
            const stick = new THREE.Mesh(geometry, material);
            stick.position.copy(position);
            stick.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
            return stick;
        }

        function setupPlanes(spacing) {
            baseClippingPlanes = [];
            activeClippingPlanes = [];
            if (!ratioMode) return;

            const b = spacing / 2;
            const normals = [
                new THREE.Vector3(-1, 0, 0), new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0, 1)
            ];

            normals.forEach(n => {
                const plane = new THREE.Plane(n, b);
                baseClippingPlanes.push(plane);
                activeClippingPlanes.push(plane.clone());
            });
        }

        function createStructure() {
            while(crystalGroup.children.length > 0) crystalGroup.remove(crystalGroup.children[0]);

            const spacing = 4.0; 
            setupPlanes(spacing);

            const range = viewMode === 'unit' ? 1 : 2;
            const offset = -(range * spacing) / 2;

            if (currentStructure === 'NaCl') {
                for (let x = 0; x <= range; x++) {
                    for (let y = 0; y <= range; y++) {
                        for (let z = 0; z <= range; z++) {
                            const pX = x * spacing + offset;
                            const pY = y * spacing + offset;
                            const pZ = z * spacing + offset;
                            const isNa = (x + y + z) % 2 !== 0;

                            if (ratioMode && (x > 1 || y > 1 || z > 1)) continue;

                            crystalGroup.add(createSolidClippedSphere(
                                isNa ? COLORS.Na : COLORS.Cl, 
                                isNa ? 0.52 : 0.75, 
                                pX, pY, pZ
                            ));

                            if (showSticks) {
                                const p1 = new THREE.Vector3(pX, pY, pZ);
                                if (x < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX + spacing, pY, pZ)));
                                if (y < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY + spacing, pZ)));
                                if (z < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY, pZ + spacing)));
                            }
                        }
                    }
                }
            } else {
                for (let x = 0; x <= range; x++) {
                    for (let y = 0; y <= range; y++) {
                        for (let z = 0; z <= range; z++) {
                            const pX = x * spacing + offset;
                            const pY = y * spacing + offset;
                            const pZ = z * spacing + offset;

                            if (ratioMode && (x > 1 || y > 1 || z > 1)) continue;

                            crystalGroup.add(createSolidClippedSphere(COLORS.Cl, 0.75, pX, pY, pZ));
                            
                            if (showSticks) {
                                const p1 = new THREE.Vector3(pX, pY, pZ);
                                if (x < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX + spacing, pY, pZ)));
                                if (y < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY + spacing, pZ)));
                                if (z < range) crystalGroup.add(createStick(p1, new THREE.Vector3(pX, pY, pZ + spacing)));
                            }

                            if (x < range && y < range && z < range) {
                                const midX = pX + spacing/2;
                                const midY = pY + spacing/2;
                                const midZ = pZ + spacing/2;
                                crystalGroup.add(createSolidClippedSphere(COLORS.Cs, 0.65, midX, midY, midZ));
                                
                                if (showSticks) {
                                    const pMid = new THREE.Vector3(midX, midY, midZ);
                                    for(let dx=0; dx<=1; dx++) for(let dy=0; dy<=1; dy++) for(let dz=0; dz<=1; dz++) {
                                        crystalGroup.add(createStick(pMid, new THREE.Vector3(pX+dx*spacing, pY+dy*spacing, pZ+dz*spacing)));
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function updateUI() {
            const data = DATA[currentStructure];
            document.getElementById('struct-title').innerText = data.title;
            document.getElementById('struct-desc').innerText = data.desc;
            document.getElementById('ion-label-1').innerText = data.ion1;
            document.getElementById('ion-label-2').innerText = data.ion2;
            document.getElementById('ion-color-1').className = 'legend-dot ' + data.color1;
            document.getElementById('ion-color-2').className = 'legend-dot ' + data.color2;
            document.getElementById('ratio-details').innerHTML = data.ratioHtml;

            document.getElementById('ratio-panel').classList.toggle('hidden', !ratioMode);
            document.getElementById('info-panel').classList.toggle('hidden', ratioMode);

            const ratioContainer = document.getElementById('ratio-mode-container');
            const ratioCheckbox = document.getElementById('check-ratio');
            
            if (viewMode === 'lattice') {
                ratioContainer.classList.add('disabled-ui');
                ratioCheckbox.disabled = true;
            } else {
                ratioContainer.classList.remove('disabled-ui');
                ratioCheckbox.disabled = false;
            }

            ['btn-nacl', 'btn-cscl', 'btn-unit', 'btn-lattice'].forEach(id => {
                const b = document.getElementById(id);
                b.classList.remove('bg-blue-600', 'border-blue-400');
                b.classList.add('bg-slate-700', 'border-transparent');
            });
            
            document.getElementById(currentStructure === 'NaCl' ? 'btn-nacl' : 'btn-cscl').classList.replace('bg-slate-700', 'bg-blue-600');
            document.getElementById(viewMode === 'unit' ? 'btn-unit' : 'btn-lattice').classList.replace('bg-slate-700', 'bg-blue-600');
        }

        function animate() {
            requestAnimationFrame(animate);
            if (ratioMode) {
                crystalGroup.updateMatrixWorld();
                for (let i = 0; i < baseClippingPlanes.length; i++) {
                    activeClippingPlanes[i].copy(baseClippingPlanes[i]).applyMatrix4(crystalGroup.matrixWorld);
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-nacl').onclick = () => { currentStructure = 'NaCl'; createStructure(); updateUI(); };
        document.getElementById('btn-cscl').onclick = () => { currentStructure = 'CsCl'; createStructure(); updateUI(); };
        document.getElementById('btn-unit').onclick = () => { viewMode = 'unit'; createStructure(); updateUI(); };
        document.getElementById('btn-lattice').onclick = () => { 
            viewMode = 'lattice'; 
            ratioMode = false;
            document.getElementById('check-ratio').checked = false;
            createStructure(); 
            updateUI(); 
        };
        document.getElementById('check-sticks').onchange = (e) => { showSticks = e.target.checked; createStructure(); };
        document.getElementById('check-ratio').onchange = (e) => { ratioMode = e.target.checked; createStructure(); updateUI(); };

        window.onload = init;
    </script>
</body>
</html>
