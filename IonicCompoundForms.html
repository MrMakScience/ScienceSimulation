<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Bond Formation Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force lowercase for the labels to bypass any font auto-capitalization */
        .lowercase-label {
            text-transform: none !important;
        }

        .electron { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .orbit {
            border: 1px dashed rgba(156, 163, 175, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .preference-label {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        /* Ion Brackets Styling */
        .ion-bracket {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 12px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        .bracket-visible {
            opacity: 1;
        }
        .bracket-left {
            left: -10px;
            border-right: 0;
        }
        .bracket-right {
            right: -10px;
            border-left: 0;
        }
        .charge-display {
            position: absolute;
            top: -15px;
            right: -25px;
            font-weight: 900;
            font-size: 1.1rem;
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <!-- Header -->
        <div class="bg-slate-700 p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Ionic Bond Simulator</h1>
                <p class="text-slate-300 text-sm">Understanding Electron Transfer</p>
            </div>
            <div class="flex gap-2" id="example-selector">
                <button onclick="selectExample('LiS')" id="btn-LiS" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors font-medium">Li + S</button>
                <button onclick="selectExample('AlO')" id="btn-AlO" class="px-4 py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors font-medium">Al + O</button>
                <button onclick="selectExample('NaCl')" id="btn-NaCl" class="px-4 py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors font-medium">Na + Cl</button>
            </div>
        </div>

        <!-- Simulation Area: Trimmed height for a more compact UI -->
        <div class="relative h-[400px] w-full bg-slate-900 flex items-center justify-center overflow-hidden" id="stage">
            <!-- Content generated by JS -->
        </div>

        <!-- Controls & Instructions -->
        <div class="p-6 bg-slate-800 border-t border-slate-700">
            <div id="instruction-box" class="mb-6 min-h-[100px]">
                <h2 id="step-title" class="text-xl font-semibold text-yellow-400 mb-2">Step 1: Individual Atoms</h2>
                <p id="step-text" class="text-slate-200"></p>
                <p id="step-note" class="text-blue-300 mt-2 italic font-medium"></p>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 uppercase tracking-widest">Progress</span>
                    <div class="flex gap-1" id="progress-dots">
                        <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button id="prev-btn" onclick="prevStep()" class="hidden px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 disabled:opacity-50 transition-all flex items-center gap-2">
                        <span>← Back</span>
                    </button>
                    <button id="next-btn" onclick="nextStep()" class="px-8 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all font-bold flex items-center gap-2">
                        <span>Next Step</span>
                        <span class="text-xl">→</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            LiS: {
                metal: { name: 'Lithium', symbol: 'Li', electrons: [2, 1], color: '#60a5fa', count: 2 },
                nonMetal: { name: 'Sulfur', symbol: 'S', electrons: [2, 8, 6], color: '#facc15', count: 1 },
                formula: 'Li₂S'
            },
            AlO: {
                metal: { name: 'Aluminum', symbol: 'Al', electrons: [2, 8, 3], color: '#94a3b8', count: 2 },
                nonMetal: { name: 'Oxygen', symbol: 'O', electrons: [2, 6], color: '#f87171', count: 3 },
                formula: 'Al₂O₃'
            },
            NaCl: {
                metal: { name: 'Sodium', symbol: 'Na', electrons: [2, 8, 1], color: '#fb923c', count: 1 },
                nonMetal: { name: 'Chlorine', symbol: 'Cl', electrons: [2, 8, 7], color: '#4ade80', count: 1 },
                formula: 'NaCl'
            }
        };

        let currentExample = 'LiS';
        let currentStep = 1;

        function selectExample(key) {
            currentExample = key;
            currentStep = 1;
            ['LiS', 'AlO', 'NaCl'].forEach(k => {
                const btn = document.getElementById(`btn-${k}`);
                btn.className = k === key ? 
                    "px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors font-medium" : 
                    "px-4 py-2 rounded-lg bg-slate-600 hover:bg-blue-500 transition-colors font-medium";
            });
            render();
        }

        function nextStep() {
            if (currentStep < 3) currentStep++;
            else currentStep = 1;
            render();
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                render();
            }
        }

        function render() {
            const stage = document.getElementById('stage');
            const stepTitle = document.getElementById('step-title');
            const stepText = document.getElementById('step-text');
            const stepNote = document.getElementById('step-note');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const data = config[currentExample];

            const dots = document.getElementById('progress-dots').children;
            for(let i=0; i<3; i++) {
                dots[i].className = `w-3 h-3 rounded-full ${i < currentStep ? 'bg-blue-500' : 'bg-slate-600'}`;
            }

            stage.innerHTML = '';
            prevBtn.classList.toggle('hidden', currentStep === 1);
            nextBtn.innerHTML = currentStep === 3 ? 'Restart Simulation ⟳' : 'Next Step →';
            stepNote.innerText = "";

            if (currentStep === 1) {
                stepTitle.innerText = "Step 1: Individual Atoms";
                stepText.innerText = `Here are the atoms for ${data.metal.name} and ${data.nonMetal.name}. Atoms want to achieve duplet/ octet structure for stability by undergoing reaction.`;
                drawAtoms(stage, data, false, false);
            } 
            else if (currentStep === 2) {
                stepTitle.innerText = "Step 2: Identifying Preferences";
                stepText.innerText = `${data.metal.name} prefers to LOSE its outermost shell electrons. ${data.nonMetal.name} prefers to GAIN electrons to fill its outer shell.`;
                stepNote.innerText = "Note: Metals prefer losing electrons. Non-metals prefer gaining electrons.";
                drawAtoms(stage, data, true, false);
            } 
            else if (currentStep === 3) {
                stepTitle.innerText = "Step 3: Electron Transfer & Ion Formation";
                
                const metalValence = data.metal.electrons[data.metal.electrons.length - 1];
                const metalPlural = data.metal.count > 1 ? "atoms" : "atom";
                const nonMetalPlural = data.nonMetal.count > 1 ? "atoms" : "atom";
                const electronPlural = metalValence > 1 ? "electrons" : "electron";

                stepText.innerText = `Ionic bond is formed when ${data.metal.count} ${data.metal.name} ${metalPlural} each transfer ${metalValence} ${electronPlural} to ${data.nonMetal.count} ${data.nonMetal.name} ${nonMetalPlural}, which forms ${data.metal.name} ions and ${data.nonMetal.name} ions with stable electronic arrangement of noble gas.`;
                
                drawAtoms(stage, data, true, true);
            }
        }

        function drawAtoms(container, data, showPreferences, animateTransfer) {
            const metalBox = document.createElement('div');
            metalBox.className = "flex flex-col gap-4 items-center justify-center w-1/2 h-full border-r border-slate-800 p-2 relative";
            
            const nonMetalBox = document.createElement('div');
            nonMetalBox.className = "flex flex-col gap-4 items-center justify-center w-1/2 h-full p-2 relative";

            const metalCount = animateTransfer ? data.metal.count : 1;
            const nonMetalCount = animateTransfer ? data.nonMetal.count : 1;

            const metalAtoms = [];
            const nonMetalAtoms = [];

            for (let i = 0; i < metalCount; i++) {
                const el = createAtomUI(data.metal, 'metal', i, showPreferences, animateTransfer);
                metalBox.appendChild(el);
                metalAtoms.push(el);
            }
            for (let i = 0; i < nonMetalCount; i++) {
                const el = createAtomUI(data.nonMetal, 'nonmetal', i, showPreferences, animateTransfer);
                nonMetalBox.appendChild(el);
                nonMetalAtoms.push(el);
            }

            container.appendChild(metalBox);
            container.appendChild(nonMetalBox);

            if (animateTransfer) {
                let nonMetalIdx = 0;
                let slotsUsed = 0;
                const neededPerNonMetal = 8 - data.nonMetal.electrons[data.nonMetal.electrons.length - 1];

                metalAtoms.forEach((mAtom, mI) => {
                    const electrons = mAtom.querySelectorAll('.valence-electron');
                    electrons.forEach((e) => {
                        if (slotsUsed >= neededPerNonMetal) {
                            nonMetalIdx++;
                            slotsUsed = 0;
                        }
                        const targetAtom = nonMetalAtoms[nonMetalIdx];
                        if (!targetAtom) return;

                        const targetSlots = targetAtom.querySelectorAll('.empty-slot');
                        const targetSlot = targetSlots[slotsUsed];
                        
                        if (targetSlot) {
                            const rectFrom = e.getBoundingClientRect();
                            const rectTo = targetSlot.getBoundingClientRect();
                            
                            const deltaX = rectTo.left - rectFrom.left;
                            const deltaY = rectTo.top - rectFrom.top;

                            setTimeout(() => {
                                e.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                                e.style.backgroundColor = '#60a5fa'; 
                                
                                setTimeout(() => {
                                    targetSlot.style.opacity = '1';
                                    e.style.opacity = '0';
                                }, 1200);
                            }, 500 + (mI * 300) + (slotsUsed * 100));
                        }
                        slotsUsed++;
                    });
                });
            }
        }

        function getElectronPosition(index, count, radius) {
            if (count <= 2) {
                const angle = (index === 0) ? -Math.PI / 2 : Math.PI / 2;
                return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
            }
            const pairIndex = Math.floor(index / 2);
            const isSecondInPair = index % 2 === 1;
            const baseAngles = [ -Math.PI/2, Math.PI/2, 0, Math.PI ];
            const offset = 6.5; 
            let x = Math.cos(baseAngles[pairIndex]) * radius;
            let y = Math.sin(baseAngles[pairIndex]) * radius;
            if (pairIndex < 2) x += isSecondInPair ? offset : -offset;
            else y += isSecondInPair ? offset : -offset;
            return { x, y };
        }

        function createAtomUI(atomData, type, index, showPrefs, animate) {
            const wrapper = document.createElement('div');
            wrapper.className = "relative flex items-center justify-center";
            const scale = (atomData.count > 1 && animate) ? 0.7 : 1;
            wrapper.style.width = `${180 * scale}px`;
            wrapper.style.height = `${180 * scale}px`;
            wrapper.style.transform = `scale(${scale})`;

            if (animate) {
                const bLeft = document.createElement('div');
                bLeft.className = "ion-bracket bracket-left";
                const bRight = document.createElement('div');
                bRight.className = "ion-bracket bracket-right";
                const charge = document.createElement('div');
                charge.className = "charge-display";
                
                if (type === 'metal') {
                    const v = atomData.electrons[atomData.electrons.length - 1];
                    charge.innerHTML = v === 1 ? "+" : `${v}+`;
                } else {
                    const v = 8 - atomData.electrons[atomData.electrons.length - 1];
                    charge.innerHTML = v === 1 ? "&ndash;" : `${v}&ndash;`;
                }
                
                bRight.appendChild(charge);
                wrapper.appendChild(bLeft);
                wrapper.appendChild(bRight);

                setTimeout(() => {
                    bLeft.classList.add('bracket-visible');
                    bRight.classList.add('bracket-visible');
                }, 1800);
            }

            const core = document.createElement('div');
            core.className = "z-10 w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl shadow-lg border-2 border-white/20 absolute";
            core.style.backgroundColor = atomData.color;
            core.style.top = "50%";
            core.style.left = "50%";
            core.style.transform = "translate(-50%, -50%)";
            core.innerText = atomData.symbol;
            wrapper.appendChild(core);

            const maxRadius = 45 + ((atomData.electrons.length - 1) * 25);

            atomData.electrons.forEach((count, orbitIdx) => {
                const radius = 45 + (orbitIdx * 25);
                const isOuter = orbitIdx === atomData.electrons.length - 1;
                
                const orbit = document.createElement('div');
                orbit.className = "orbit";
                orbit.style.width = `${radius * 2}px`;
                orbit.style.height = `${radius * 2}px`;
                if (animate && type === 'metal' && isOuter) {
                    orbit.style.transition = "opacity 0.5s ease 1.2s";
                    setTimeout(() => orbit.style.opacity = '0', 1200);
                }
                wrapper.appendChild(orbit);

                for (let e = 0; e < count; e++) {
                    const electron = document.createElement('div');
                    electron.className = "electron absolute w-3 h-3 rounded-full z-20 shadow-sm";
                    electron.style.backgroundColor = isOuter ? '#FFF' : '#cbd5e1';
                    
                    if (isOuter && type === 'metal') electron.classList.add('valence-electron');

                    const pos = getElectronPosition(e, count, radius);
                    electron.style.left = `calc(50% + ${pos.x}px - 6px)`;
                    electron.style.top = `calc(50% + ${pos.y}px - 6px)`;
                    wrapper.appendChild(electron);
                }

                if (animate && type === 'nonmetal' && isOuter) {
                    const needed = 8 - count;
                    for (let n = 0; n < needed; n++) {
                        const slot = document.createElement('div');
                        slot.className = "empty-slot absolute w-3 h-3 rounded-full z-10 opacity-0 bg-blue-400 shadow-[0_0_8px_#60a5fa]";
                        const pos = getElectronPosition(count + n, 8, radius);
                        slot.style.left = `calc(50% + ${pos.x}px - 6px)`;
                        slot.style.top = `calc(50% + ${pos.y}px - 6px)`;
                        wrapper.appendChild(slot);
                    }
                }
            });

            if (showPrefs && !animate) {
                const label = document.createElement('div');
                label.className = "preference-label lowercase-label absolute left-1/2 -translate-x-1/2 whitespace-nowrap px-3 py-1.5 rounded bg-slate-700 text-[10px] font-bold border border-slate-600 z-50 transition-all";
                label.style.top = `${50 + (maxRadius / 100 * 50) + 15}%`; 
                
                const v = atomData.electrons[atomData.electrons.length - 1];
                if (type === 'metal') {
                    label.innerHTML = `lose ${v} e-`; 
                    label.classList.add("text-blue-300");
                } else {
                    label.innerHTML = `gain ${8 - v} e-`;
                    label.classList.add("text-yellow-300");
                }
                wrapper.appendChild(label);
            }
            return wrapper;
        }

        window.onload = () => render();
    </script>
</body>
</html>
