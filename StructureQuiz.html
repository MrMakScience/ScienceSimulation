<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structure of Substances Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .option-card:hover {
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Structure of Substances</h1>
            <p class="text-indigo-100 mt-1">Test your understanding of chemical structures</p>
        </div>

        <!-- Progress Area -->
        <div class="px-8 pt-6">
            <div class="flex justify-between items-center mb-2">
                <span id="progress-text" class="text-sm font-medium text-gray-500">Question 1 of 15</span>
                <span id="score-text" class="text-sm font-medium text-indigo-600">Score: 0</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full progress-bar" style="width: 6.6%"></div>
            </div>
        </div>

        <!-- Question Section -->
        <div id="quiz-container" class="p-8">
            <div class="mb-8 text-center">
                <h2 class="text-lg text-gray-600 mb-2">Identify the structure of:</h2>
                <div id="substance-display" class="text-4xl font-bold text-gray-900 bg-gray-50 py-8 rounded-xl border-2 border-dashed border-gray-200 min-h-[120px] flex items-center justify-center px-4">
                    Loading...
                </div>
            </div>

            <!-- Options Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="checkAnswer('A')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-left hover:border-indigo-500 hover:bg-indigo-50 group">
                    <span class="inline-block w-8 h-8 bg-gray-100 group-hover:bg-indigo-200 rounded-lg text-center leading-8 font-bold mr-3">A</span>
                    <span class="text-gray-700 font-semibold">Giant metallic structure</span>
                </button>
                <button onclick="checkAnswer('B')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-left hover:border-indigo-500 hover:bg-indigo-50 group">
                    <span class="inline-block w-8 h-8 bg-gray-100 group-hover:bg-indigo-200 rounded-lg text-center leading-8 font-bold mr-3">B</span>
                    <span class="text-gray-700 font-semibold">Giant covalent structure</span>
                </button>
                <button onclick="checkAnswer('C')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-left hover:border-indigo-500 hover:bg-indigo-50 group">
                    <span class="inline-block w-8 h-8 bg-gray-100 group-hover:bg-indigo-200 rounded-lg text-center leading-8 font-bold mr-3">C</span>
                    <span class="text-gray-700 font-semibold">Giant ionic structure</span>
                </button>
                <button onclick="checkAnswer('D')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-left hover:border-indigo-500 hover:bg-indigo-50 group">
                    <span class="inline-block w-8 h-8 bg-gray-100 group-hover:bg-indigo-200 rounded-lg text-center leading-8 font-bold mr-3">D</span>
                    <span class="text-gray-700 font-semibold">Simple molecular structure</span>
                </button>
            </div>
        </div>

        <!-- Result Section (Hidden by default) -->
        <div id="result-container" class="hidden p-8 text-center">
            <div class="mb-6">
                <div id="result-icon" class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-gray-900">Quiz Completed!</h2>
                <p id="final-score" class="text-xl text-gray-600 mt-2 font-semibold">Your score: 0/15</p>
            </div>
            <button onclick="restartQuiz()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">
                Try Again
            </button>
        </div>

        <!-- Feedback Modal -->
        <div id="feedback-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
                <div id="feedback-icon" class="text-4xl mb-2"></div>
                <h3 id="feedback-title" class="text-xl font-bold mb-2"></h3>
                <p id="feedback-msg" class="text-gray-600 mb-6"></p>
                <button onclick="nextQuestion()" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-black">
                    Continue
                </button>
            </div>
        </div>
    </div>

    <script>
        const substances = [
            // Giant Metallic (A)
            { name: "Copper", symbol: "Cu", type: "A", detail: "Metals consist of giant metallic lattices." },
            { name: "Magnesium", symbol: "Mg", type: "A", detail: "Mg is a metal with a giant metallic structure." },
            { name: "Iron", symbol: "Fe", type: "A", detail: "A typical transition metal with metallic bonding." },
            { name: "Aluminium", symbol: "Al", type: "A", detail: "A metal with a giant metallic structure." },
            
            // Giant Covalent (B)
            { name: "Diamond", symbol: "C (Diamond)", type: "B", detail: "An allotrope of carbon with a giant covalent tetrahedral structure." },
            { name: "Silicon", symbol: "Si", type: "B", detail: "Silicon elements form a giant covalent lattice similar to diamond." },
            { name: "Silicon dioxide", symbol: "SiO₂", type: "B", detail: "Also known as silica, this has a giant covalent structure." },
            { name: "Graphite", symbol: "C (Graphite)", type: "B", detail: "Layers of carbon atoms held by strong covalent bonds in a giant lattice." },
            
            // Giant Ionic (C)
            { name: "Sodium Chloride", symbol: "NaCl", type: "C", detail: "Composed of Na+ and Cl- ions in a giant lattice." },
            { name: "Ammonium Chloride", symbol: "NH₄Cl", type: "C", detail: "Contains polyatomic ammonium ions (NH₄+) and Cl- ions." },
            { name: "Magnesium Oxide", symbol: "MgO", type: "C", detail: "A giant ionic lattice with Mg2+ and O2- ions." },
            { name: "Ammonium Nitrate", symbol: "NH₄NO₃", type: "C", detail: "An ionic compound formed from ammonium and nitrate ions." },
            { name: "Potassium Bromide", symbol: "KBr", type: "C", detail: "A giant ionic lattice of K+ and Br- ions." },
            { name: "Calcium Carbonate", symbol: "CaCO₃", type: "C", detail: "Contains Ca2+ and CO3 2- ions in an ionic lattice." },
            
            // Simple Molecular (D)
            { name: "Water", symbol: "H₂O", type: "D", detail: "Small discrete molecules held by weak intermolecular forces." },
            { name: "Carbon Dioxide", symbol: "CO₂", type: "D", detail: "Gas at RT, consists of simple discrete molecules." },
            { name: "Iodine", symbol: "I₂", type: "D", detail: "Simple molecules held together by weak Van der Waals forces." },
            { name: "Chlorine", symbol: "Cl₂", type: "D", detail: "A diatomic gas with a simple molecular structure." },
            { name: "Methane", symbol: "CH₄", type: "D", detail: "A simple molecular gas with covalent bonds." },
            { name: "Oxygen", symbol: "O₂", type: "D", detail: "Double covalent bonds within simple diatomic molecules." },
            { name: "Ammonia", symbol: "NH₃", type: "D", detail: "Simple molecular structure with polar covalent bonds." }
        ];

        let currentQuestion = 0;
        let score = 0;
        let quizData = [];
        const TOTAL_QUESTIONS = 15;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initQuiz() {
            // Group substances by type
            const typeA = shuffle(substances.filter(s => s.type === 'A'));
            const typeB = shuffle(substances.filter(s => s.type === 'B'));
            const typeC = shuffle(substances.filter(s => s.type === 'C'));
            const typeD = shuffle(substances.filter(s => s.type === 'D'));

            // Select exactly 2 from A and B as requested
            const selectedA = typeA.slice(0, 2);
            const selectedB = typeB.slice(0, 2);
            
            // Remaining 11 questions from C and D (approx half each)
            const remainingPool = shuffle([...typeC, ...typeD]);
            const selectedOthers = remainingPool.slice(0, 11);

            // Combine and shuffle the final set of 15
            const finalPool = shuffle([...selectedA, ...selectedB, ...selectedOthers]);
            
            quizData = finalPool.map(q => {
                const showSymbol = Math.random() > 0.5;
                return {
                    ...q,
                    displayText: showSymbol ? q.symbol : q.name
                };
            });
            
            currentQuestion = 0;
            score = 0;
            updateUI();
            
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
        }

        function updateUI() {
            const q = quizData[currentQuestion];
            document.getElementById('substance-display').innerText = q.displayText;
            document.getElementById('progress-text').innerText = `Question ${currentQuestion + 1} of ${TOTAL_QUESTIONS}`;
            document.getElementById('score-text').innerText = `Score: ${score}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / TOTAL_QUESTIONS) * 100}%`;
        }

        function checkAnswer(choice) {
            const q = quizData[currentQuestion];
            const modal = document.getElementById('feedback-modal');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-msg');

            if (choice === q.type) {
                score++;
                icon.innerText = "✅";
                title.innerText = "Correct!";
                title.className = "text-xl font-bold mb-2 text-green-600";
            } else {
                icon.innerText = "❌";
                title.innerText = "Incorrect";
                title.className = "text-xl font-bold mb-2 text-red-600";
            }
            
            const types = {
                'A': 'Giant metallic structure',
                'B': 'Giant covalent structure',
                'C': 'Giant ionic structure',
                'D': 'Simple molecular structure'
            };
            
            msg.innerHTML = `<strong>${q.name} (${q.symbol})</strong> is a <strong>${types[q.type]}</strong>.<br><small class="text-gray-500 mt-2 block">${q.detail}</small>`;
            modal.classList.remove('hidden');
        }

        function nextQuestion() {
            document.getElementById('feedback-modal').classList.add('hidden');
            currentQuestion++;
            
            if (currentQuestion < TOTAL_QUESTIONS) {
                updateUI();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Your score: ${score} / ${TOTAL_QUESTIONS}`;
            
            const icon = document.getElementById('result-icon');
            if (score === TOTAL_QUESTIONS) icon.innerText = "👑";
            else if (score >= 12) icon.innerText = "🌟";
            else if (score >= 8) icon.innerText = "👍";
            else icon.innerText = "📚";
        }

        function restartQuiz() {
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
